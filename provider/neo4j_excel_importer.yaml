identity:
  author: wxj
  name: neo4j_excel_importer
  label:
    en_US: Neo4j Excel Graph Importer
    zh_Hans: Neo4j Excel 图谱导入器
  description:
    en_US: Import a structured Excel knowledge-graph file (nodes + relationships) into a Neo4j database.
    zh_Hans: 将结构化的 Excel 知识图谱文件（节点 + 关系）导入 Neo4j 数据库。
  icon: icon.svg

credentials_for_provider:
  neo4j_uri:
    type: text-input
    required: true
    label:
      en_US: Neo4j URI
      zh_Hans: Neo4j 连接地址
    placeholder:
      en_US: "bolt://localhost:7687"
      zh_Hans: "bolt://localhost:7687"
    help:
      en_US: Bolt or neo4j+s URI, e.g. bolt://host:7687
      zh_Hans: Bolt 或 neo4j+s 连接串，如 bolt://host:7687
  neo4j_user:
    type: text-input
    required: true
    label:
      en_US: Neo4j Username
      zh_Hans: Neo4j 用户名
    placeholder:
      en_US: "neo4j"
      zh_Hans: "neo4j"
  neo4j_password:
    type: secret-input
    required: true
    label:
      en_US: Neo4j Password
      zh_Hans: Neo4j 密码

  group_id:
    type: text-input
    required: false
    label:
      en_US: Default Group ID
      zh_Hans: 默认分组 ID
    placeholder:
      en_US: "e.g. my-project"
      zh_Hans: "如 my-project"
    help:
      en_US: Default group_id for all tools. Tool-level parameter takes precedence when set.
      zh_Hans: 所有工具的默认 group_id。工具参数单独设置时优先使用工具参数。
  embedding_model:
    type: model-selector
    scope: text-embedding
    required: false
    label:
      en_US: Default Embedding Model
      zh_Hans: 默认向量模型
    help:
      en_US: Default text-embedding model for all tools. Tool-level parameter takes precedence when set.
      zh_Hans: 所有工具的默认向量模型。工具参数单独设置时优先使用工具参数。

tools:
  - tools/import_graph.yaml
  - tools/extract_graph_data.yaml
  - tools/neo4j_query.yaml
  - tools/query_node_by_id.yaml
  - tools/query_nodes_by_nids.yaml
  - tools/query_nodes_fuzzy.yaml
  - tools/query_relations_by_node.yaml
  - tools/query_relations_between_nodes.yaml
  - tools/query_group_graph.yaml
  - tools/get_group_labels.yaml
  - tools/copy_group_data.yaml
  - tools/save_nodes_batch.yaml
  - tools/save_node_single.yaml
  - tools/save_relations_batch.yaml
  - tools/save_relation_single.yaml

extra:
  python:
    source: provider/neo4j_excel_importer.py
