identity:
  author: wxj
  name: neo4j_excel_importer
  label:
    en_US: Neo4j Excel Graph Importer
    zh_Hans: Neo4j Excel 图谱导入器
  description:
    en_US: Import a structured Excel knowledge-graph file (nodes + relationships) into a Neo4j database.
    zh_Hans: 将结构化的 Excel 知识图谱文件（节点 + 关系）导入 Neo4j 数据库。
  icon: icon.svg

credentials_for_provider:
  neo4j_uri:
    type: text-input
    required: true
    label:
      en_US: Neo4j URI
      zh_Hans: Neo4j 连接地址
    placeholder:
      en_US: "bolt://localhost:7687"
      zh_Hans: "bolt://localhost:7687"
    help:
      en_US: Bolt or neo4j+s URI, e.g. bolt://host:7687
      zh_Hans: Bolt 或 neo4j+s 连接串，如 bolt://host:7687
  neo4j_user:
    type: text-input
    required: true
    label:
      en_US: Neo4j Username
      zh_Hans: Neo4j 用户名
    placeholder:
      en_US: "neo4j"
      zh_Hans: "neo4j"
  neo4j_password:
    type: secret-input
    required: true
    label:
      en_US: Neo4j Password
      zh_Hans: Neo4j 密码

tools:
  - tools/import_graph.yaml
  - tools/neo4j_query.yaml
  - tools/save_nodes_batch.yaml
  - tools/save_node_single.yaml
  - tools/save_relations_batch.yaml
  - tools/save_relation_single.yaml

extra:
  python:
    source: provider/neo4j_excel_importer.py
