version: 0.0.51
type: "plugin"
author: "wxj"
name: "neo4j_excel_importer"
label:
  en_US: "Neo4j Graph Import, Query & Editor"
  zh_Hans: "Neo4j 图谱导入、查询与编辑器"
description:
  en_US: "Import Excel knowledge graphs into Neo4j, query nodes and relations, and manage group graph data through endpoints."
  zh_Hans: "将 Excel 知识图谱导入 Neo4j，支持节点关系查询，并通过端点管理分组图谱数据。"
created_at: "2026-05-11T00:00:00Z"
icon: "icon.svg"
resource:
  memory: 268435456
  permission:
    endpoint:
      enabled: true
    model:
      enabled: true
      text_embedding: true
    storage:
      enabled: true
      size: 1048576
plugins:
  tools:
    - "provider/neo4j_excel_importer.yaml"
  endpoints:
    - "provider/neo4j_graph_endpoint.yaml"
meta:
  version: 0.0.51
  arch:
    - "amd64"
    - "arm64"
  runner:
    language: "python"
    version: "3.12"
    entrypoint: "main"
privacy: "./privacy.md"
