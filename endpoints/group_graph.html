<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D3 Graph — Neural Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f0f2f7;
    --surface:  #ffffff;
    --surface2: #f5f7fb;
    --border:   rgba(80,100,160,0.14);
    --border2:  rgba(80,100,160,0.22);
    --text:     #1a1d2e;
    --muted:    #7a82a0;
    --faint:    #b0b8d0;

    --cyan:     #0ea5c8;
    --blue:     #3b6ef5;
    --purple:   #7c54e8;
    --amber:    #d97706;
    --rose:     #e8445a;
    --green:    #0fa96b;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(100,120,200,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  #app { position: relative; width: 100vw; height: 100vh; }

  #graph-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #graph-svg:active { cursor: grabbing; }

  .link { fill: none; transition: stroke-opacity 0.25s, stroke-width 0.25s; }
  .link.dimmed     { stroke-opacity: 0.06 !important; }
  .link.highlighted { stroke-width: 2.5px !important; stroke-opacity: 1 !important; }
  .link.dimmed-arrow { marker-end: url(#arr-end-dimmed); }
  .link.highlighted-arrow { marker-end: url(#arr-end); }

  .edge-label-group { pointer-events: auto; cursor: pointer; }
  .edge-label-bg  { fill: var(--surface); stroke: var(--border2); stroke-width: 0.8; }
  .edge-label-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 400; letter-spacing: 0.03em;
    dominant-baseline: middle; text-anchor: middle;
    fill: var(--muted);
    pointer-events: none;
  }
  .edge-label-group.dimmed   { opacity: 0.05; }
  .edge-label-group.highlighted .edge-label-text { font-weight: 600; }
  .edge-label-group.highlighted .edge-label-bg   { stroke: var(--border2); }

  .node-group { cursor: pointer; }
  .node-ring { fill: none; animation: pulse-ring 2.6s ease-out infinite; }
  .node-group.dimmed  { opacity: 0.13; }
  .node-group.selected .node-circle { filter: drop-shadow(0 0 6px currentColor); }

  .node-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
    dominant-baseline: middle; text-anchor: middle;
    pointer-events: none;
  }

  @keyframes pulse-ring {
    0%   { r: 14px; opacity: 0.45; }
    65%  { r: 28px; opacity: 0; }
    100% { r: 28px; opacity: 0; }
  }

  #stats {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 1px; z-index: 10;
    background: var(--border); border-radius: 10px; overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    box-shadow: 0 1px 4px rgba(80,100,160,0.1);
  }
  .stat-cell { background: var(--surface); padding: 8px 16px; text-align: center; }
  .stat-cell .n { font-size: 15px; font-weight: 600; color: var(--blue); }
  .stat-cell .l { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  #controls {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10;
  }
  .ctrl-btn {
    width: 34px; height: 34px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px; color: var(--muted);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    box-shadow: 0 1px 3px rgba(80,100,160,0.08);
  }
  .ctrl-btn:hover {
    background: var(--surface2); border-color: var(--blue);
    color: var(--blue); box-shadow: 0 2px 8px rgba(59,110,245,0.15);
  }

  #legend {
    position: absolute; bottom: 28px; right: 28px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 12px; padding: 14px 18px; z-index: 10;
    box-shadow: 0 2px 8px rgba(80,100,160,0.08);
  }
  #legend h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.1em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; color: var(--text); margin-bottom: 6px;
  }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }

  #info-panel {
    position: absolute; top: 26px; right: 28px; width: 238px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 14px; padding: 20px; z-index: 10;
    opacity: 0; pointer-events: none;
    transform: translateX(12px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    box-shadow: 0 4px 18px rgba(80,100,160,0.1);
  }
  #info-panel.visible { opacity: 1; pointer-events: auto; transform: translateX(0); }
  #info-panel .p-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px;
  }
  #info-panel .p-name {
    font-size: 20px; font-weight: 700; line-height: 1.15;
    margin-bottom: 14px; color: var(--text);
  }
  #info-panel .p-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  }
  #info-panel .p-row:last-child { border-bottom: none; }
  #info-panel .p-key { color: var(--muted); }
  #info-panel .p-val { font-weight: 600; color: var(--text); }
  #info-panel .close-btn {
    position: absolute; top: 13px; right: 13px;
    background: none; border: none; color: var(--faint);
    font-size: 17px; cursor: pointer; font-family: 'Syne', sans-serif;
    line-height: 1; padding: 2px 5px; border-radius: 4px;
  }
  #info-panel .close-btn:hover { color: var(--text); background: var(--surface2); }

  #tooltip {
    position: absolute; z-index: 20;
    background: var(--text); color: var(--surface);
    border-radius: 6px; padding: 5px 11px;
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    pointer-events: none; opacity: 0; transition: opacity 0.12s; white-space: nowrap;
  }

  #status {
    position: absolute;
    left: 50%;
    bottom: 78px;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.72);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    z-index: 11;
  }

  #ops-panel {
    position: absolute;
    left: 16px;
    top: 16px;
    width: 340px;
    max-height: calc(100vh - 32px);
    overflow: auto;
    z-index: 12;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border2);
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(80,100,160,0.14);
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .ops-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    background: #fff;
    margin-bottom: 8px;
  }

  .ops-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .ops-grid {
    display: grid;
    gap: 6px;
    grid-template-columns: 1fr 1fr;
  }

  .ops-row { display: grid; gap: 4px; }

  .ops-row label {
    font-size: 11px;
    color: var(--muted);
  }

  .ops-row input,
  .ops-row textarea {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px;
    background: #fff;
    color: var(--text);
    font: inherit;
    font-size: 11px;
  }

  .ops-row textarea {
    min-height: 60px;
    resize: vertical;
  }

  .kv-list {
    display: grid;
    gap: 6px;
  }

  .kv-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
    align-items: center;
  }

  .kv-del {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: #fff;
    color: #a33;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }

  .kv-del:hover {
    border-color: #e29a9a;
    background: #fff5f5;
  }

  .ops-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .ops-btn {
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px;
    font: inherit;
    font-size: 11px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
  }

  .ops-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--surface2);
  }

  .ops-btn.primary {
    background: #eef4ff;
    border-color: #c8d8ff;
    color: #2454cf;
  }

  @media (max-width: 1100px) {
    #ops-panel {
      width: 300px;
      top: 10px;
      left: 10px;
      max-height: calc(100vh - 20px);
    }
    #legend { right: 10px; bottom: 10px; }
    #controls { left: 50%; bottom: 10px; transform: translateX(-50%); }
    #status { bottom: 58px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="stats">
    <div class="stat-cell"><div class="n" id="s-nodes">0</div><div class="l">节点</div></div>
    <div class="stat-cell"><div class="n" id="s-links">0</div><div class="l">关系</div></div>
    <div class="stat-cell"><div class="n" id="s-zoom">1.00×</div><div class="l">缩放</div></div>
  </div>

  <svg id="graph-svg">
    <defs>
      <filter id="f-soft" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arr-end" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#b0b8d0"/>
      </marker>
      <marker id="arr-end-dimmed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#d9deec" fill-opacity="0.25"/>
      </marker>
    </defs>
    <g id="graph-root"></g>
  </svg>

  <div id="controls">
    <button class="ctrl-btn" id="btn-zoom-in">+</button>
    <button class="ctrl-btn" id="btn-zoom-out">−</button>
    <button class="ctrl-btn" id="btn-reset" style="font-size:13px">⟳</button>
    <button class="ctrl-btn" id="btn-shuffle" style="font-size:12px">⇄</button>
  </div>

  <div id="legend">
    <h3>节点类型</h3>
    <div class="legend-item"><div class="legend-dot" style="background:#0ea5c8"></div>Core</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c54e8"></div>Module</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0fa96b"></div>Service</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>Data</div>
    <div class="legend-item"><div class="legend-dot" style="background:#e8445a"></div>Agent</div>
  </div>

  <div id="info-panel">
    <button class="close-btn" id="panel-close">×</button>
    <div class="p-type" id="p-type"></div>
    <div class="p-name" id="p-name"></div>
    <div class="p-row"><span class="p-key">关联数</span><span class="p-val" id="p-conn"></span></div>
    <div class="p-row"><span class="p-key">权重</span><span class="p-val" id="p-weight"></span></div>
    <div class="p-row"><span class="p-key">编号</span><span class="p-val" id="p-id"></span></div>
    <div class="p-row"><span class="p-key">状态</span><span class="p-val" style="color:#0fa96b">● 活跃</span></div>
  </div>

  <div id="ops-panel">
    <div class="ops-card">
      <div class="ops-title">图谱加载</div>
      <div class="ops-grid">
        <div class="ops-row"><label>分组ID（group_id）</label><input id="groupId" placeholder="例如: product_demo"></div>
        <div class="ops-row"><label>分页大小（page_size）</label><input id="pageSize" value="300"></div>
      </div>
      <div class="ops-actions" style="grid-template-columns:1fr;">
        <button class="ops-btn primary" id="btnLoad">加载图谱</button>
      </div>
    </div>

    <div class="ops-card">
      <div class="ops-title">节点操作</div>
      <div class="ops-grid">
        <div class="ops-row"><label>节点ID（uid）</label><input id="nodeUid" placeholder="节点唯一ID"></div>
        <div class="ops-row"><label>名称（name）</label><input id="nodeName" placeholder="节点名称"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;"><label>标签（labels，逗号分隔）</label><input id="nodeLabels" placeholder="例如：Core,Service"></div>
      <div class="ops-row" style="margin-top:6px;"><label>描述（description）</label><input id="nodeDesc" placeholder="节点描述"></div>
      <div class="ops-row" style="margin-top:6px;">
        <label>属性（properties）</label>
        <div id="nodePropsList" class="kv-list"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <button class="ops-btn" type="button" id="btnNodePropAdd">+ 添加属性</button>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <label>元信息（meta）</label>
        <div id="nodeMetaList" class="kv-list"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <button class="ops-btn" type="button" id="btnNodeMetaAdd">+ 添加元信息</button>
      </div>
      <div class="ops-actions">
        <button class="ops-btn primary" id="btnNodeCreate">新增</button>
        <button class="ops-btn" id="btnNodeUpdate">更新</button>
        <button class="ops-btn" id="btnNodeDelete">删除</button>
      </div>
    </div>

    <div class="ops-card" style="margin-bottom:0;">
      <div class="ops-title">关系操作</div>
      <div class="ops-grid">
        <div class="ops-row"><label>关系ID（relation_id）</label><input id="relId" placeholder="点击图中的关系自动填充"></div>
        <div class="ops-row"><label>关系类型（rel_type）</label><input id="relType" placeholder="例如：RELATED"></div>
      </div>
      <div class="ops-grid" style="margin-top:6px;">
        <div class="ops-row"><label>源节点ID（source_uid）</label><input id="relSource" placeholder="源节点 uid"></div>
        <div class="ops-row"><label>目标节点ID（target_uid）</label><input id="relTarget" placeholder="目标节点 uid"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;"><label>描述（description）</label><input id="relDesc" placeholder="关系描述"></div>
      <div class="ops-row" style="margin-top:6px;">
        <label>属性（properties）</label>
        <div id="relPropsList" class="kv-list"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <button class="ops-btn" type="button" id="btnRelPropAdd">+ 添加关系属性</button>
      </div>
      <div class="ops-actions">
        <button class="ops-btn primary" id="btnRelCreate">新增</button>
        <button class="ops-btn" id="btnRelUpdate">更新</button>
        <button class="ops-btn" id="btnRelDelete">删除</button>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>
  <div id="status"></div>
</div>

<script>
let ROOT_PATH = "";
let INITIAL_GROUP_ID = "";
const RENDER_DEMO_DATA = false;
try {
  ROOT_PATH = __ROOT_PATH_JSON__;
  INITIAL_GROUP_ID = __INITIAL_GROUP_ID_JSON__;
} catch (_e) {
  ROOT_PATH = "";
  INITIAL_GROUP_ID = "";
}

const TYPE_META = {
  Core: { color: "#0ea5c8", bg: "rgba(14,165,200,0.10)", r: 16 },
  Module: { color: "#7c54e8", bg: "rgba(124,84,232,0.10)", r: 13 },
  Service: { color: "#0fa96b", bg: "rgba(15,169,107,0.10)", r: 11 },
  Data: { color: "#d97706", bg: "rgba(217,119,6,0.10)", r: 10 },
  Agent: { color: "#e8445a", bg: "rgba(232,68,90,0.10)", r: 9 },
};

const DEMO_NODES = [
  { id: 1, label: "Orchestrator", type: "Core", weight: 98 },
  { id: 2, label: "Planner", type: "Core", weight: 91 },
  { id: 3, label: "Memory", type: "Core", weight: 87 },
  { id: 4, label: "Retriever", type: "Module", weight: 75 },
  { id: 5, label: "Embedder", type: "Module", weight: 72 },
  { id: 6, label: "Reasoner", type: "Module", weight: 78 },
  { id: 7, label: "VectorDB", type: "Data", weight: 65 },
  { id: 8, label: "Cache", type: "Data", weight: 60 },
  { id: 9, label: "DocStore", type: "Data", weight: 62 },
  { id: 10, label: "API Gateway", type: "Service", weight: 83 },
  { id: 11, label: "Auth", type: "Service", weight: 70 },
  { id: 12, label: "Logger", type: "Service", weight: 55 },
  { id: 13, label: "Executor", type: "Agent", weight: 80 },
  { id: 14, label: "Validator", type: "Agent", weight: 68 },
  { id: 15, label: "Critic", type: "Agent", weight: 73 },
  { id: 16, label: "Scheduler", type: "Module", weight: 66 },
  { id: 17, label: "EventBus", type: "Service", weight: 71 },
  { id: 18, label: "Metrics", type: "Data", weight: 57 },
];

const DEMO_LINKS = [
  [1, 2, "dispatches"], [1, 3, "reads"], [1, 10, "routes"], [1, 13, "spawns"],
  [2, 4, "queries"], [2, 6, "invokes"], [2, 16, "schedules"],
  [3, 7, "indexes"], [3, 8, "caches"],
  [4, 7, "fetches"], [4, 5, "embeds"], [5, 7, "stores"],
  [6, 15, "reviews"], [6, 14, "checks"],
  [10, 11, "verifies"], [10, 12, "logs"], [10, 17, "publishes"],
  [13, 14, "submits"], [13, 15, "drafts"],
  [16, 17, "triggers"],
  [17, 12, "reports"], [17, 18, "tracks"],
  [8, 9, "persists"], [11, 3, "syncs"], [12, 18, "writes"],
  [14, 6, "refines"], [15, 2, "retries"], [9, 7, "mirrors"],
];

function apiBase() {
  return (ROOT_PATH || "").replace(/\/+$/, "");
}

function apiUrl(path) {
  return apiBase() + path;
}

function clean(v) {
  return String(v || "").trim();
}

function shouldRenderDemo() {
  return RENDER_DEMO_DATA;
}

function createKvRow(key = "", value = "") {
  const row = document.createElement("div");
  row.className = "kv-row";
  const keyInput = document.createElement("input");
  keyInput.placeholder = "key";
  keyInput.value = key;
  const valueInput = document.createElement("input");
  valueInput.placeholder = "value";
  valueInput.value = value;
  const delBtn = document.createElement("button");
  delBtn.type = "button";
  delBtn.className = "kv-del";
  delBtn.textContent = "×";
  delBtn.addEventListener("click", () => row.remove());
  row.appendChild(keyInput);
  row.appendChild(valueInput);
  row.appendChild(delBtn);
  return row;
}

function renderKv(listId, obj = {}) {
  const list = document.getElementById(listId);
  list.innerHTML = "";
  const entries = Object.entries(obj || {});
  if (!entries.length) {
    list.appendChild(createKvRow("", ""));
    return;
  }
  entries.forEach(([k, v]) => {
    list.appendChild(createKvRow(String(k), v == null ? "" : String(v)));
  });
}

function collectKv(listId) {
  const rows = Array.from(document.querySelectorAll(`#${listId} .kv-row`));
  const out = {};
  rows.forEach((row) => {
    const inputs = row.querySelectorAll("input");
    const key = clean(inputs[0]?.value);
    const val = clean(inputs[1]?.value);
    if (!key) return;
    out[key] = val;
  });
  return out;
}

function parseType(labels = [], uid = "") {
  const all = Array.isArray(labels) ? labels.map((x) => clean(x).toLowerCase()) : [];
  if (all.includes("core")) return "Core";
  if (all.includes("module")) return "Module";
  if (all.includes("service")) return "Service";
  if (all.includes("data")) return "Data";
  if (all.includes("agent")) return "Agent";
  const s = clean(uid).toLowerCase();
  if (s.includes("core")) return "Core";
  if (s.includes("service")) return "Service";
  if (s.includes("module")) return "Module";
  if (s.includes("data")) return "Data";
  return "Agent";
}

function typeDisplayName(type) {
  const map = {
    Core: "核心",
    Module: "模块",
    Service: "服务",
    Data: "数据",
    Agent: "智能体",
  };
  return map[type] || type || "";
}

function parseWeight(node) {
  const candidates = [node.weight, node.properties?.weight, node.properties?.score, node.meta?.score];
  for (const value of candidates) {
    const n = Number(value);
    if (Number.isFinite(n)) return Math.max(1, Math.min(100, Math.round(n)));
  }
  return 50;
}

function nodeLabel(node) {
  const name = clean(node.name);
  if (name) return name;
  return clean(node.uid) || "Node";
}

function relationLabel(rel) {
  return clean(rel.rel_type) || "RELATED";
}

function relationKey(rel, index) {
  const rid = clean(rel.relation_id);
  if (rid) return rid;
  return `${clean(rel.source_uid)}=>${clean(rel.target_uid)}:${relationLabel(rel)}:${index}`;
}

async function request(pathOrUrl, options = {}) {
  const method = (options.method || "GET").toUpperCase();
  const url = /^https?:\/\//.test(pathOrUrl) ? pathOrUrl : apiUrl(pathOrUrl);
  const init = { method, headers: { Accept: "application/json" } };
  if (options.body !== undefined) {
    init.headers["Content-Type"] = "application/json";
    init.body = options.body;
  }

  const res = await fetch(url, init);
  const text = await res.text();
  let data = {};
  if (text) {
    try {
      data = JSON.parse(text);
    } catch (_e) {
      throw new Error(`接口返回非 JSON: ${text.slice(0, 120)}`);
    }
  }
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

function setStatus(text, isError = false) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.style.color = isError ? "#c53030" : "var(--muted)";
}

function mapGraphData(nodesRaw, relsRaw) {
  const mappedNodes = (nodesRaw || []).map((n, idx) => {
    const type = parseType(n.labels, n.uid);
    const meta = TYPE_META[type] || TYPE_META.Agent;
    return {
      id: idx + 1,
      uid: clean(n.uid),
      label: nodeLabel(n),
      type,
      weight: parseWeight(n),
      color: meta.color,
      bg: meta.bg,
      r: meta.r,
      raw: n,
    };
  });

  const idMap = new Map(mappedNodes.map((n) => [n.uid, n.id]));
  const mappedLinks = [];
  (relsRaw || []).forEach((r, i) => {
    const s = idMap.get(clean(r.source_uid));
    const t = idMap.get(clean(r.target_uid));
    if (!s || !t) return;
    mappedLinks.push({
      source: s,
      target: t,
      relation: relationLabel(r),
      _key: relationKey(r, i),
      raw: r,
    });
  });
  return { nodes: mappedNodes, links: mappedLinks };
}

async function loadGraphByGroupId(groupId, onPage) {
  const nodesRaw = [];
  const relsRaw = [];
  const nodeSet = new Set();
  const relSet = new Set();
  const pageSize = Number(clean(document.getElementById("pageSize").value) || "300");
  let page = 1;

  while (true) {
    setStatus(`分页加载中: 第 ${page} 页`);
    const data = await request(`/group-graph/api/graph?group_id=${encodeURIComponent(groupId)}&page=${page}&page_size=${encodeURIComponent(pageSize)}`);

    for (const n of (data.nodes || [])) {
      const uid = clean(n.uid);
      if (!uid || nodeSet.has(uid)) continue;
      nodeSet.add(uid);
      nodesRaw.push(n);
    }

    for (const r of (data.relations || [])) {
      const key = relationKey(r, relsRaw.length);
      if (relSet.has(key)) continue;
      relSet.add(key);
      relsRaw.push(r);
    }

    const graph = mapGraphData(nodesRaw, relsRaw);
    if (onPage) onPage(graph, page);

    if (!data.nodes_has_more && !data.relations_has_more) break;
    page += 1;
  }

  setStatus(`加载完成: 节点 ${nodesRaw.length}，关系 ${relsRaw.length}`);
  return mapGraphData(nodesRaw, relsRaw);
}

function loadDemoGraph() {
  if (document.getElementById("groupId")) {
    document.getElementById("groupId").value = "";
  }
  setStatus("已加载示例图谱");
  const nodes = DEMO_NODES.map((n) => ({
    ...n,
    ...TYPE_META[n.type],
    raw: {
      uid: String(n.id),
      name: n.label,
      labels: [n.type],
      description: "",
      properties: { weight: n.weight },
      meta: {},
    },
  }));
  const links = DEMO_LINKS.map(([s, t, r], i) => ({
    source: s,
    target: t,
    relation: r,
    _key: `demo-${i}`,
    raw: {
      relation_id: `demo-${i}`,
      source_uid: String(s),
      target_uid: String(t),
      rel_type: r,
      description: "",
      properties: {},
    },
  }));
  return { nodes, links };
}

function fillNodeForm(nodeRaw) {
  if (!nodeRaw) return;
  document.getElementById("nodeUid").value = clean(nodeRaw.uid);
  document.getElementById("nodeName").value = clean(nodeRaw.name);
  document.getElementById("nodeLabels").value = Array.isArray(nodeRaw.labels) ? nodeRaw.labels.join(",") : "";
  document.getElementById("nodeDesc").value = clean(nodeRaw.description);
  renderKv("nodePropsList", nodeRaw.properties || {});
  renderKv("nodeMetaList", nodeRaw.meta || {});
}

function fillRelationForm(relRaw) {
  if (!relRaw) return;
  document.getElementById("relId").value = clean(relRaw.relation_id);
  document.getElementById("relSource").value = clean(relRaw.source_uid);
  document.getElementById("relTarget").value = clean(relRaw.target_uid);
  document.getElementById("relType").value = relationLabel(relRaw);
  document.getElementById("relDesc").value = clean(relRaw.description);
  renderKv("relPropsList", relRaw.properties || {});
}

function nodePayload() {
  const group_id = clean(document.getElementById("groupId").value);
  const uid = clean(document.getElementById("nodeUid").value);
  if (!group_id || !uid) throw new Error("group_id 和 uid 不能为空");
  return {
    group_id,
    uid,
    name: clean(document.getElementById("nodeName").value),
    labels: document.getElementById("nodeLabels").value.split(",").map((s) => clean(s)).filter(Boolean),
    description: clean(document.getElementById("nodeDesc").value),
    properties: collectKv("nodePropsList"),
    meta: collectKv("nodeMetaList"),
  };
}

function relationPayload() {
  const relation_id = clean(document.getElementById("relId").value);
  const group_id = clean(document.getElementById("groupId").value);
  const source_uid = clean(document.getElementById("relSource").value);
  const target_uid = clean(document.getElementById("relTarget").value);
  const rel_type = clean(document.getElementById("relType").value);
  if (!group_id || !source_uid || !target_uid || !rel_type) {
    throw new Error("group_id/source_uid/target_uid/rel_type 不能为空");
  }
  return {
    relation_id,
    group_id,
    source_uid,
    target_uid,
    rel_type,
    description: clean(document.getElementById("relDesc").value),
    properties: collectKv("relPropsList"),
  };
}

async function mutate(path, method, payload) {
  setStatus("执行中...");
  await request(path, { method, body: JSON.stringify(payload) });
  const gid = clean(document.getElementById("groupId").value);
  if (!gid) {
    setStatus("操作成功");
    return;
  }
  await loadAndRenderGroup(gid);
}

const svg = d3.select("#graph-svg");
const root = d3.select("#graph-root");
const defs = svg.select("defs");
const tip = document.getElementById("tooltip");

let sim = null;
let nodeSel = null;
let linkSel = null;
let edgeLabelSel = null;
let selected = null;
let graphNodes = [];

function clearScene() {
  root.selectAll("*").remove();
  defs.selectAll("linearGradient").remove();
}

function clearSel() {
  selected = null;
  if (nodeSel) nodeSel.classed("dimmed", false).classed("selected", false);
  if (linkSel) {
    linkSel
      .classed("dimmed", false)
      .classed("highlighted", false)
      .classed("dimmed-arrow", false)
      .classed("highlighted-arrow", false);
  }
  if (edgeLabelSel) edgeLabelSel.classed("dimmed", false).classed("highlighted", false);
  document.getElementById("info-panel").classList.remove("visible");
}

function render(nodes, links) {
  if (sim) sim.stop();
  clearScene();
  clearSel();

  graphNodes = nodes;

  document.getElementById("s-nodes").textContent = nodes.length;
  document.getElementById("s-links").textContent = links.length;

  links.forEach((l, i) => {
    const sn = nodes.find((n) => n.id === l.source);
    const tn = nodes.find((n) => n.id === l.target);
    const gid = `lg-${i}`;
    defs.append("linearGradient").attr("id", gid).attr("gradientUnits", "userSpaceOnUse")
      .call((g) => {
        g.append("stop").attr("offset", "0%").attr("stop-color", sn ? sn.color : "#7a82a0").attr("stop-opacity", 0.6);
        g.append("stop").attr("offset", "100%").attr("stop-color", tn ? tn.color : "#7a82a0").attr("stop-opacity", 0.6);
      });
    l._gid = gid;
  });

  sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id((d) => d.id).distance((d) => {
      const sid = d.source.id ?? d.source;
      const tid = d.target.id ?? d.target;
      const s = nodes.find((n) => n.id === sid);
      const t = nodes.find((n) => n.id === tid);
      return 80 + ((s?.r ?? 10) + (t?.r ?? 10)) * 1.9;
    }))
    .force("charge", d3.forceManyBody().strength(-460))
    .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2))
    .force("collision", d3.forceCollide().radius((d) => d.r + 24));

  linkSel = root.append("g").selectAll("line").data(links).join("line")
    .attr("class", "link")
    .attr("stroke", (d) => `url(#${d._gid})`)
    .attr("stroke-width", 1.6)
    .attr("stroke-opacity", 0.55)
    .attr("marker-end", "url(#arr-end)")
    .on("click", (e, d) => {
      e.stopPropagation();
      fillRelationForm(d.raw);
    });

  edgeLabelSel = root.append("g").selectAll("g").data(links).join("g")
    .attr("class", "edge-label-group")
    .on("click", (e, d) => {
      e.stopPropagation();
      fillRelationForm(d.raw);
    });

  edgeLabelSel.append("rect").attr("class", "edge-label-bg").attr("height", 13).attr("rx", 3).attr("opacity", 0.9);
  edgeLabelSel.append("text").attr("class", "edge-label-text").text((d) => d.relation);
  edgeLabelSel.each(function (d) {
    const g = d3.select(this);
    const sid = d.source.id ?? d.source;
    const sn = nodes.find((n) => n.id === sid);
    g.select("text").attr("fill", sn ? sn.color : "#7a82a0");
    const tw = g.select("text").node().getBBox().width + 8;
    g.select("rect").attr("width", tw).attr("x", -tw / 2).attr("y", -6.5);
  });

  nodeSel = root.append("g").selectAll("g").data(nodes).join("g")
    .attr("class", "node-group")
    .call(d3.drag()
      .on("start", (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on("drag", (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on("end", (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; }));

  nodeSel.append("circle").attr("class", "node-ring")
    .attr("r", (d) => d.r + 5)
    .attr("stroke", (d) => d.color).attr("stroke-width", 1.5)
    .attr("fill", "none").attr("opacity", 0.35)
    .style("animation-delay", (_d, i) => `${(i * 0.19) % 2.6}s`);

  nodeSel.append("circle").attr("r", (d) => d.r + 1).attr("fill", (d) => d.color).attr("fill-opacity", 0.12);
  nodeSel.append("circle").attr("class", "node-circle")
    .attr("r", (d) => d.r)
    .attr("fill", (d) => d.bg)
    .attr("stroke", (d) => d.color).attr("stroke-width", 2)
    .attr("filter", "url(#f-soft)");
  nodeSel.append("circle").attr("r", (d) => d.r * 0.3).attr("fill", (d) => d.color);
  nodeSel.append("text").attr("class", "node-label").attr("y", (d) => d.r + 15).attr("fill", (d) => d.color).text((d) => d.label);

  sim.on("tick", () => {
    linkSel.attr("x1", (d) => d.source.x).attr("y1", (d) => d.source.y).attr("x2", (d) => d.target.x).attr("y2", (d) => d.target.y);
    links.forEach((l) => {
      defs.select(`#${l._gid}`).attr("x1", l.source.x).attr("y1", l.source.y).attr("x2", l.target.x).attr("y2", l.target.y);
    });
    edgeLabelSel.attr("transform", (d) => {
      const mx = (d.source.x + d.target.x) / 2;
      const my = (d.source.y + d.target.y) / 2;
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      let a = Math.atan2(dy, dx) * 180 / Math.PI;
      if (a > 90 || a < -90) a += 180;
      return `translate(${mx},${my}) rotate(${a})`;
    });
    nodeSel.attr("transform", (d) => `translate(${d.x},${d.y})`);
  });

  nodeSel.on("click", (e, d) => {
    e.stopPropagation();
    fillNodeForm(d.raw);

    if (selected === d.id) { clearSel(); return; }
    selected = d.id;
    const nb = new Set([d.id]);
    links.forEach((l) => {
      const s = l.source.id ?? l.source;
      const t = l.target.id ?? l.target;
      if (s === d.id) nb.add(t);
      if (t === d.id) nb.add(s);
    });
    nodeSel.classed("dimmed", (n) => !nb.has(n.id)).classed("selected", (n) => n.id === d.id);
    const isRel = (l) => (l.source.id ?? l.source) === d.id || (l.target.id ?? l.target) === d.id;
    linkSel
      .classed("dimmed", (l) => !isRel(l))
      .classed("highlighted", isRel)
      .classed("dimmed-arrow", (l) => !isRel(l))
      .classed("highlighted-arrow", isRel);
    edgeLabelSel.classed("dimmed", (l) => !isRel(l)).classed("highlighted", isRel);

    const cc = links.filter(isRel).length;
    document.getElementById("p-type").textContent = typeDisplayName(d.type);
    document.getElementById("p-type").style.color = d.color;
    document.getElementById("p-name").textContent = d.label;
    document.getElementById("p-name").style.color = d.color;
    document.getElementById("p-conn").textContent = cc;
    document.getElementById("p-weight").textContent = d.weight + " / 100";
    document.getElementById("p-id").textContent = "#" + d.id;
    document.getElementById("info-panel").classList.add("visible");
  });

  nodeSel
    .on("mouseenter", (_e, d) => { tip.style.opacity = "1"; tip.style.background = d.color; tip.textContent = `${d.label} · ${d.type} · weight ${d.weight}`; })
    .on("mousemove", (e) => { tip.style.left = `${e.clientX + 14}px`; tip.style.top = `${e.clientY - 10}px`; })
    .on("mouseleave", () => { tip.style.opacity = "0"; });
}

const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (e) => {
  root.attr("transform", e.transform);
  document.getElementById("s-zoom").textContent = e.transform.k.toFixed(2) + "×";
});
svg.call(zoom);
svg.on("click", () => clearSel());
document.getElementById("panel-close").addEventListener("click", clearSel);

function shuffleGraph() {
  graphNodes.forEach((n) => {
    n.vx = (Math.random() - 0.5) * 100;
    n.vy = (Math.random() - 0.5) * 100;
  });
  if (sim) sim.alpha(0.8).restart();
}

async function loadAndRenderGroup(groupId) {
  const graph = await loadGraphByGroupId(groupId, (paged) => {
    render(paged.nodes, paged.links);
  });
  render(graph.nodes, graph.links);
}

document.getElementById("btn-zoom-in").addEventListener("click", () => svg.transition().duration(280).call(zoom.scaleBy, 1.35));
document.getElementById("btn-zoom-out").addEventListener("click", () => svg.transition().duration(280).call(zoom.scaleBy, 0.74));
document.getElementById("btn-reset").addEventListener("click", () => svg.transition().duration(460).call(zoom.transform, d3.zoomIdentity));
document.getElementById("btn-shuffle").addEventListener("click", shuffleGraph);

  try {
    const groupId = clean(document.getElementById("groupId").value);
    if (!groupId) {
      setStatus("group_id 不能为空", true);
      return;
    }
    await loadAndRenderGroup(groupId);

    setStatus(`加载失败: ${e.message}`, true);
  }
});

document.getElementById("btnNodePropAdd").addEventListener("click", () => {
  document.getElementById("nodePropsList").appendChild(createKvRow("", ""));
});

document.getElementById("btnNodeMetaAdd").addEventListener("click", () => {
  document.getElementById("nodeMetaList").appendChild(createKvRow("", ""));
});

document.getElementById("btnRelPropAdd").addEventListener("click", () => {
  document.getElementById("relPropsList").appendChild(createKvRow("", ""));
});

    await mutate("/group-graph/api/node", "POST", nodePayload());

});

    setStatus(`节点更新失败: ${e.message}`, true);

  try {

    await mutate("/group-graph/api/relation", "DELETE", { relation_id: payload.relation_id });
  } catch (e) {
    setStatus(`关系删除失败: ${e.message}`, true);
  }
});

window.addEventListener("resize", () => {
  if (!sim) return;
  sim.force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
  sim.alpha(0.3).restart();
});

(async function init() {
  try {
    renderKv("nodePropsList", {});
    renderKv("nodeMetaList", {});
    renderKv("relPropsList", {});

    const groupId = clean(INITIAL_GROUP_ID);
    if (groupId) {
      document.getElementById("groupId").value = groupId;
      await loadAndRenderGroup(groupId);
    } else {
      if (shouldRenderDemo()) {
        const graph = loadDemoGraph();
        render(graph.nodes, graph.links);
      } else {
        render([], []);
        setStatus("示例数据渲染已关闭，请输入 group_id 后加载图谱");
      }
    }
  } catch (e) {
    setStatus(`加载失败: ${e.message}`, true);
    if (shouldRenderDemo()) {
      const graph = loadDemoGraph();
      render(graph.nodes, graph.links);
    } else {
      render([], []);
    }
  }
})();
