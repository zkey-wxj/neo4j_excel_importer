<!doctype html>
<html lang="zh">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>D3 Graph — Neural Map</title>
		<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
		<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
		<style>
			@import url("https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap");

			*,
			*::before,
			*::after {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			:root {
				--bg: #f0f2f7;
				--surface: #ffffff;
				--surface2: #f5f7fb;
				--border: rgba(80, 100, 160, 0.14);
				--border2: rgba(80, 100, 160, 0.22);
				--text: #1a1d2e;
				--muted: #7a82a0;
				--faint: #b0b8d0;

				--cyan: #0ea5c8;
				--blue: #3b6ef5;
				--purple: #7c54e8;
				--amber: #d97706;
				--rose: #e8445a;
				--green: #0fa96b;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				overflow: hidden;
				background: var(--bg);
				font-family: "Syne", sans-serif;
				color: var(--text);
			}

			body::before {
				content: "";
				position: fixed;
				inset: 0;
				z-index: 0;
				pointer-events: none;
				background-image: radial-gradient(circle, rgba(100, 120, 200, 0.12) 1px, transparent 1px);
				background-size: 28px 28px;
			}

			#app {
				position: relative;
				width: 100vw;
				height: 100vh;
			}

			#graph-canvas {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				display: block;
			}

			#stats {
				position: absolute;
				top: 16px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				gap: 1px;
				z-index: 10;
				background: var(--border);
				border-radius: 10px;
				overflow: hidden;
				font-family: "JetBrains Mono", monospace;
				box-shadow: 0 1px 4px rgba(80, 100, 160, 0.1);
				max-width: calc(100vw - 760px);
				flex-wrap: nowrap;
			}
			.stat-cell {
				background: var(--surface);
				padding: 8px 16px;
				text-align: center;
			}
			.stat-spinner {
				display: none;
				align-items: center;
				justify-content: center;
				background: var(--surface);
				padding: 8px 12px;
			}
			.stat-spinner.show {
				display: flex;
			}
			.stat-spinner .spin-dot {
				width: 14px;
				height: 14px;
				border: 2px solid var(--border2);
				border-top-color: var(--blue);
				border-radius: 50%;
				animation: stats-spin 0.7s linear infinite;
			}
			@keyframes stats-spin {
				to {
					transform: rotate(360deg);
				}
			}
			.stat-cell .n {
				font-size: 15px;
				font-weight: 600;
				color: var(--blue);
			}
			.stat-clickable {
				cursor: pointer;
				transition: all 0.15s;
			}
			.stat-clickable:hover {
				background: var(--surface2);
			}
			.stat-clickable.active {
				background: rgba(233, 68, 90, 0.1);
			}
			.stat-clickable.active .n {
				color: var(--rose);
			}
			.stat-cell .l {
				font-size: 9px;
				color: var(--muted);
				letter-spacing: 0.08em;
				text-transform: uppercase;
				margin-top: 2px;
			}

			#controls {
				position: absolute;
				bottom: 28px;
				left: 50%;
				transform: translateX(-50%);
				display: flex;
				gap: 6px;
				z-index: 10;
			}
			.ctrl-btn {
				width: 34px;
				height: 34px;
				background: var(--surface);
				border: 1px solid var(--border2);
				border-radius: 8px;
				color: var(--muted);
				font-size: 16px;
				cursor: pointer;
				display: flex;
				align-items: center;
				justify-content: center;
				transition: all 0.15s;
				font-family: "JetBrains Mono", monospace;
				font-weight: 600;
				box-shadow: 0 1px 3px rgba(80, 100, 160, 0.08);
			}
			.ctrl-btn:hover {
				background: var(--surface2);
				border-color: var(--blue);
				color: var(--blue);
				box-shadow: 0 2px 8px rgba(59, 110, 245, 0.15);
			}

			#legend-wrap {
				position: absolute;
				bottom: 28px;
				right: 28px;
				display: flex;
				gap: 8px;
				z-index: 10;
			}
			.legend-box {
				background: var(--surface);
				border: 1px solid var(--border2);
				border-radius: 12px;
				padding: 12px 14px;
				box-shadow: 0 2px 8px rgba(80, 100, 160, 0.08);
				min-width: 140px;
				max-width: 200px;
				display: flex;
				flex-direction: column;
			}
			.legend-box .legend-content {
				overflow-y: auto;
				flex: 1;
			}
			.legend-box .legend-actions {
				flex-shrink: 0;
			}
			.legend-box > h5 {
				cursor: pointer;
				user-select: none;
			}
			.legend-box > h5::after {
				content: " ▾";
				font-size: 9px;
				color: var(--faint);
			}
			.legend-box.collapsed {
				padding-bottom: 0px;
			}
			.legend-box.collapsed > h5::after {
				content: " ▸";
			}
			.legend-box.collapsed .legend-content,
			.legend-box.collapsed .legend-actions,
			#minimap.collapsed {
				display: none;
			}

			.legend-box h5 {
				font-family: "JetBrains Mono", monospace;
				font-size: 9.5px;
				letter-spacing: 0.1em;
				color: var(--muted);
				text-transform: uppercase;
				margin-bottom: 10px;
			}
			#legendList,
			#relLegendListInner {
				max-height: 220px;
				overflow-y: auto;
				padding-right: 4px;
			}
			#legendList::-webkit-scrollbar,
			#relLegendListInner::-webkit-scrollbar {
				width: 4px;
			}
			#legendList::-webkit-scrollbar-track,
			#relLegendListInner::-webkit-scrollbar-track {
				background: transparent;
			}
			#legendList::-webkit-scrollbar-thumb,
			#relLegendListInner::-webkit-scrollbar-thumb {
				background: var(--border2);
				border-radius: 4px;
			}
			#legendList::-webkit-scrollbar-thumb:hover,
			#relLegendListInner::-webkit-scrollbar-thumb:hover {
				background: var(--muted);
			}
			.legend-item {
				display: flex;
				align-items: center;
				gap: 8px;
				font-family: "JetBrains Mono", monospace;
				font-size: 11.5px;
				color: var(--text);
				margin-bottom: 6px;
				padding: 3px 6px;
				border-radius: 6px;
				border: 1px solid transparent;
				cursor: pointer;
				user-select: none;
				transition: all 0.15s ease;
			}
			.legend-item:hover {
				background: var(--surface2);
				border-color: var(--border);
			}
			.legend-item.active {
				background: rgba(59, 110, 245, 0.08);
				border-color: rgba(59, 110, 245, 0.35);
			}
			.legend-dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				flex-shrink: 0;
			}
			.legend-actions {
				margin-top: 8px;
				padding-top: 10px;
				border-top: 1px solid var(--border);
			}
			.legend-reset-btn {
				width: 100%;
				border: 1px solid var(--border2);
				background: var(--surface2);
				color: var(--muted);
				border-radius: 6px;
				padding: 4px 8px;
				font-size: 11px;
				font-family: "JetBrains Mono", monospace;
				cursor: pointer;
			}
			.legend-reset-btn:hover {
				color: var(--blue);
				border-color: var(--blue);
				background: #eef3ff;
			}

			#search-panel {
				position: absolute;
				top: 16px;
				left: 364px;
				width: 220px;
				z-index: 11;
				background: var(--surface);
				border: 1px solid var(--border2);
				border-radius: 12px;
				padding: 10px 12px;
				box-shadow: 0 2px 8px rgba(80, 100, 160, 0.08);
				font-family: "JetBrains Mono", monospace;
			}
			#search-panel label {
				display: block;
				font-size: 10px;
				color: var(--muted);
				margin-bottom: 6px;
				letter-spacing: 0.06em;
				text-transform: uppercase;
			}
			#search-panel input {
				width: 100%;
				border: 1px solid var(--border2);
				border-radius: 7px;
				padding: 7px 8px;
				font: inherit;
				font-size: 11px;
				background: #fff;
				color: var(--text);
			}

			#status {
				font-family: "JetBrains Mono", monospace;
				font-size: 10px;
				color: var(--muted);
				border-top: 1px solid var(--border);
				padding: 6px 4px 2px;
				margin-top: 6px;
				text-align: right;
			}

			#ops-panel {
				position: absolute;
				left: 16px;
				top: 16px;
				width: 340px;
				max-height: calc(100vh - 32px);
				overflow: auto;
				z-index: 12;
				background: rgba(255, 255, 255, 0.92);
				border: 1px solid var(--border2);
				border-radius: 10px;
				box-shadow: 0 6px 20px rgba(80, 100, 160, 0.14);
				padding: 10px;
				font-family: "JetBrains Mono", monospace;
			}

			.ops-card {
				border: 1px solid var(--border);
				border-radius: 8px;
				padding: 8px;
				background: #fff;
				margin-bottom: 8px;
			}

			.ops-title {
				font-size: 12px;
				color: var(--text);
				font-weight: 700;
				margin-bottom: 6px;
			}

			.ops-grid {
				display: grid;
				gap: 6px;
				grid-template-columns: 1fr 1fr;
			}

			.ops-row {
				display: grid;
				gap: 4px;
			}

			.ops-row label {
				font-size: 11px;
				color: var(--muted);
			}

			.ops-row input,
			.ops-row textarea {
				width: 100%;
				border: 1px solid var(--border2);
				border-radius: 6px;
				padding: 6px;
				background: #fff;
				color: var(--text);
				font: inherit;
				font-size: 11px;
			}

			.ops-row textarea {
				min-height: 60px;
				resize: vertical;
			}

			.kv-list {
				display: grid;
				gap: 6px;
			}

			.kv-row {
				display: grid;
				grid-template-columns: 1fr 1fr auto;
				gap: 6px;
				align-items: center;
			}

			.kv-del {
				width: 26px;
				height: 26px;
				border: 1px solid var(--border2);
				border-radius: 6px;
				background: #fff;
				color: #a33;
				cursor: pointer;
				font-size: 12px;
				line-height: 1;
			}

			.kv-del:hover {
				border-color: #e29a9a;
				background: #fff5f5;
			}

			.ops-actions {
				display: grid;
				grid-template-columns: repeat(3, 1fr);
				gap: 6px;
				margin-top: 8px;
			}

			.ops-btn {
				border: 1px solid var(--border2);
				border-radius: 6px;
				padding: 6px;
				font: inherit;
				font-size: 11px;
				background: #fff;
				color: var(--text);
				cursor: pointer;
			}

			.ops-btn:hover {
				border-color: var(--blue);
				color: var(--blue);
				background: var(--surface2);
			}
			.ops-btn:disabled {
				opacity: 0.5;
				cursor: not-allowed;
				pointer-events: none;
			}

			.ops-btn.primary {
				background: #eef4ff;
				border-color: #c8d8ff;
				color: #2454cf;
			}

			/* ── 小地图 ── */
			#minimap {
				position: absolute;
				bottom: 16px;
				left: 364px;
				width: 180px;
				background: rgba(255, 255, 255, 0.88);
				border: 1px solid var(--border2);
				border-radius: 10px;
				z-index: 10;
				overflow: hidden;
				box-shadow: 0 2px 8px rgba(80, 100, 160, 0.1);
			}
			.minimap-content {
				height: 130px;
			}
			#minimap canvas {
				width: 100%;
				height: 100%;
				display: block;
			}
			#minimap .mm-viewport {
				position: absolute;
				border: 2px solid var(--blue);
				border-radius: 2px;
				pointer-events: none;
				opacity: 0.6;
			}

			/* ── 增强详情面板 ── */
			#detail-panel {
				position: absolute;
				top: 16px;
				right: 28px;
				width: 280px;
				max-height: calc(100vh - 32px);
				overflow-y: auto;
				background: var(--surface);
				border: 1px solid var(--border2);
				border-radius: 14px;
				padding: 18px;
				z-index: 11;
				opacity: 0;
				pointer-events: none;
				transform: translateX(12px);
				transition:
					opacity 0.22s ease,
					transform 0.22s ease;
				box-shadow: 0 4px 18px rgba(80, 100, 160, 0.1);
				font-family: "JetBrains Mono", monospace;
			}
			#detail-panel.visible {
				opacity: 1;
				pointer-events: auto;
				transform: translateX(0);
			}
			#detail-panel .d-close {
				position: absolute;
				top: 12px;
				right: 14px;
				background: none;
				border: none;
				color: var(--faint);
				font-size: 17px;
				cursor: pointer;
				padding: 2px 5px;
				border-radius: 4px;
			}
			#detail-panel .d-close:hover {
				color: var(--text);
				background: var(--surface2);
			}
			#detail-panel .d-type {
				font-size: 9.5px;
				letter-spacing: 0.12em;
				text-transform: uppercase;
				margin-bottom: 6px;
			}
			#detail-panel .d-name {
				font-size: 18px;
				font-weight: 700;
				line-height: 1.2;
				margin-bottom: 12px;
			}
			#detail-panel .d-uid {
				font-size: 10px;
				color: var(--muted);
				margin-bottom: 14px;
				word-break: break-all;
			}
			#detail-panel .d-section {
				margin-bottom: 12px;
			}
			#detail-panel .d-section-title {
				font-size: 10px;
				color: var(--muted);
				text-transform: uppercase;
				letter-spacing: 0.08em;
				margin-bottom: 6px;
				border-bottom: 1px solid var(--border);
				padding-bottom: 4px;
			}
			#detail-panel .d-row {
				display: flex;
				justify-content: space-between;
				padding: 3px 0;
				font-size: 11px;
			}
			#detail-panel .d-key {
				color: var(--muted);
			}
			#detail-panel .d-val {
				font-weight: 600;
				text-align: right;
				max-width: 60%;
				word-break: break-all;
			}
			#detail-panel .d-nei-item {
				display: flex;
				justify-content: space-between;
				align-items: center;
				padding: 3px 0;
				font-size: 10.5px;
				cursor: pointer;
				border-radius: 4px;
			}
			#detail-panel .d-nei-item:hover {
				background: var(--surface2);
			}
			#detail-panel .d-nei-rt {
				color: var(--muted);
				font-size: 9.5px;
			}
			#detail-panel .d-actions {
				display: flex;
				gap: 6px;
				margin-top: 8px;
			}
			#detail-panel .d-actions .ops-btn {
				flex: 1;
			}

			/* ── 关系类型筛选 ── */
			/* rel legend items */
			.rel-legend-item {
				display: flex;
				align-items: center;
				gap: 6px;
				font-size: 10.5px;
				color: var(--text);
				margin-bottom: 4px;
				padding: 2px 6px;
				border-radius: 4px;
				cursor: pointer;
				user-select: none;
				transition: all 0.12s;
			}
			.rel-legend-item:hover {
				background: var(--surface2);
			}
			.rel-legend-item.active {
				background: rgba(124, 84, 232, 0.08);
				border: 1px solid rgba(124, 84, 232, 0.3);
			}
			.rel-legend-dot {
				width: 16px;
				height: 3px;
				border-radius: 2px;
				flex-shrink: 0;
			}

			/* ── ops-panel 可折叠 ── */
			.ops-card .ops-title {
				cursor: pointer;
				user-select: none;
			}
			.ops-card .ops-title::after {
				content: " ▾";
				font-size: 10px;
				color: var(--faint);
			}
			.ops-card.collapsed .ops-title::after {
				content: " ▸";
			}
			.ops-card.collapsed .ops-grid,
			.ops-card.collapsed .ops-row,
			.ops-card.collapsed .ops-actions,
			.ops-card.collapsed .kv-list {
				display: none;
			}

			/* ── Toast 通知 ── */
			#toast-container {
				position: fixed;
				top: 20px;
				left: 50%;
				transform: translateX(-50%);
				z-index: 9999;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 8px;
				pointer-events: none;
			}
			.toast {
				pointer-events: auto;
				padding: 10px 18px;
				border-radius: 8px;
				font-family: "JetBrains Mono", monospace;
				font-size: 12px;
				color: var(--text);
				background: var(--surface);
				border: 1px solid var(--border2);
				box-shadow: 0 4px 14px rgba(80, 100, 160, 0.18);
				transform: translateY(-100%);
				opacity: 0;
				transition:
					transform 0.3s cubic-bezier(0.22, 1, 0.36, 1),
					opacity 0.3s ease;
				max-width: 360px;
				word-break: break-all;
			}
			.toast.show {
				transform: translateY(0);
				opacity: 1;
			}
			.toast.success {
				border-left: 3px solid var(--green);
			}
			.toast.error {
				border-left: 3px solid var(--rose);
			}

			/* ── 全屏 Loading ── */
			#fullscreen-loading {
				position: fixed;
				inset: 0;
				z-index: 99999;
				background: rgba(240, 242, 247, 0.92);
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 18px;
				opacity: 1;
				transition: opacity 0.35s ease;
				pointer-events: auto;
			}
			#fullscreen-loading.hide {
				opacity: 0;
				pointer-events: none;
			}
			#fullscreen-loading .spinner {
				width: 36px;
				height: 36px;
				border: 3px solid var(--border2);
				border-top-color: var(--blue);
				border-radius: 50%;
				animation: fl-spin 0.8s linear infinite;
			}
			@keyframes fl-spin {
				to {
					transform: rotate(360deg);
				}
			}
			#fullscreen-loading .loading-text {
				font-family: "JetBrains Mono", monospace;
				font-size: 12px;
				color: var(--muted);
				letter-spacing: 0.05em;
			}

			@media (max-width: 1100px) {
				#ops-panel {
					width: 300px;
					top: 10px;
					left: 10px;
					max-height: calc(100vh - 20px);
				}
				#legend-wrap {
					right: 10px;
					bottom: 10px;
				}
				#search-panel {
					left: 310px;
					top: 10px;
					width: 200px;
				}
				#minimap {
					left: 300px;
				}
				#detail-panel {
					right: 10px;
					top: 10px;
					width: 260px;
				}
				#controls {
					left: 50%;
					bottom: 10px;
					transform: translateX(-50%);
				}
			}
		</style>
	</head>
	<body>
		<div id="toast-container"></div>
		<div id="fullscreen-loading">
			<div class="spinner"></div>
			<div class="loading-text">图谱加载中...</div>
		</div>
		<div id="app">
			<div id="stats">
				<div class="stat-spinner" id="stat-spinner"><div class="spin-dot"></div></div>
				<div class="stat-cell">
					<div class="n" id="s-nodes">0</div>
					<div class="l">节点</div>
				</div>
				<div class="stat-cell">
					<div class="n" id="s-links">0</div>
					<div class="l">关系</div>
				</div>
				<div class="stat-cell stat-clickable" id="stat-orphans">
					<div class="n" id="s-orphans">-</div>
					<div class="l">孤立</div>
				</div>
				<div class="stat-cell">
					<div class="n" id="s-node-types">-</div>
					<div class="l">节点类型</div>
				</div>
				<div class="stat-cell">
					<div class="n" id="s-rel-types">-</div>

		<script>
			/* ═══════════════════════════════════════════════════════════════════
			 全局常量配置
			 ═══════════════════════════════════════════════════════════════════ */
			// 力导引布局：斥力推开节点防堆叠，连线距离控制相连节点间距，碰撞间距防止重叠，中心引力保持图谱居中
			const FORCE_CHARGE = -800,
				FORCE_LINK_DIST = 200,
				FORCE_COLLISION = 14,
				FORCE_PULL = 0.01;
			// 节点类型视觉映射：动态生成颜色和半径
			const TYPE_COLORS = d3.scaleOrdinal(d3.schemeCategory10);
			const TYPE_META = new Map();
			const DEMO_NAMES = ["Orchestrator", "Planner", "Memory", "Retriever", "Embedder", "Reasoner", "VectorDB", "Cache", "DocStore", "Gateway", "Auth", "Logger", "Executor", "Validator", "Critic", "Scheduler", "EventBus", "Metrics", "Router", "Parser", "Encoder", "Decoder", "Monitor", "Collector", "Dispatcher", "Registry", "Resolver", "Transformer", "Aggregator", "Connector", "Buffer", "Indexer", "Crawler", "Fetcher", "Loader", "Saver", "Tracker", "Analyzer", "Renderer", "Compiler", "Interpreter", "Assembler"];
			const DEMO_TYPES = ["System", "Component", "Database", "Model", "Task"];
			// 示例数据名称池、类型池、关系类型池：无后端时循环取值生成演示图谱
			const DEMO_RELS = ["dispatches", "reads", "routes", "spawns", "queries", "invokes", "schedules", "indexes", "caches", "fetches", "embeds", "stores", "reviews", "checks", "verifies", "logs", "publishes", "submits", "drafts", "triggers", "reports", "tracks", "persists", "syncs", "writes", "refines", "retries", "mirrors", "calls", "depends"];

			/* ═══════════════════════════════════════════════════════════════════
			 工具函数
			 ═══════════════════════════════════════════════════════════════════ */

			function getTypeMeta(type) {
				if (!TYPE_META.has(type)) {
					const c = TYPE_COLORS(type);
					const rgba = d3.color(c).rgb();
					const bg = `rgba(${rgba.r},${rgba.g},${rgba.b},0.10)`;
					TYPE_META.set(type, { color: c, bg: bg, r: Math.floor(10 + Math.random() * 4) });
				}
				return TYPE_META.get(type);
			}
			function clean(v) {
				// 字符串清洗：null/undefined 安全转换为 trimmed 字符串
				return String(v || "").trim();
			}
			function sleep(ms) {
				return new Promise((r) => setTimeout(r, ms));
			}
			function setStatus(t, err) {
				const el = document.getElementById("status");
				el.textContent = t;
				el.style.color = err ? "#c53030" : "var(--muted)";
			}
			function createKvRow(k = "", v = "") {
				const row = document.createElement("div");
				row.className = "kv-row";
				const ki = document.createElement("input");
				ki.placeholder = "key";
				ki.value = k;
				const vi = document.createElement("input");
				vi.placeholder = "value";
				vi.value = v;
				const d = document.createElement("button");
				d.type = "button";
				d.className = "kv-del";
				d.textContent = "×";
				d.onclick = () => row.remove();
				row.append(ki, vi, d);
				return row;
			}
			function renderKv(id, obj = {}) {
				const l = document.getElementById(id);
				l.innerHTML = "";
				const e = Object.entries(obj || {});
				if (!e.length) {
					l.appendChild(createKvRow());
					return;
				}
				e.forEach(([k, v]) => l.appendChild(createKvRow(String(k), v == null ? "" : String(v))));
			}
			function collectKv(id) {
				const o = {};
				document.querySelectorAll(`#${id} .kv-row`).forEach((r) => {
					const i = r.querySelectorAll("input");
					const k = clean(i[0]?.value),
						v = clean(i[1]?.value);
					if (k) o[k] = v;
				});
				return o;
			}
			// 节点类型解析：优先取第一个标签，否则默认 Node
			function parseType(labels, uid) {
				const a = Array.isArray(labels) ? labels.map((x) => clean(x)).filter(Boolean) : [];
				if (a.length > 0) return a[0];
				return "Node";
				// 属性权重提取：依次尝试 weight/score 字段，收敛到 1-100 区间
			}
			function parseWeight(n) {
				for (const v of [n.weight, n.properties?.weight, n.properties?.score, n.meta?.score]) {
					const x = Number(v);
					if (Number.isFinite(x)) return Math.max(1, Math.min(100, Math.round(x)));
				}
				return 50;
			}
			function nodeLabel(n) {
				return clean(n.name) || clean(n.uid) || "Node";
			}
			function relLabel(r) {
				return clean(r.rel_type) || "RELATED";
			}
			function relStoreKey(r) {
				// 将节点原始数据填充到左侧编辑表单，用于查看和编辑
				return `${clean(r.source_uid)}=>${clean(r.target_uid)}:${relLabel(r)}`;
			}
			function fillNodeForm(n) {
				if (!n) return;
				document.getElementById("nodeUid").value = clean(n.uid);
				document.getElementById("nodeName").value = clean(n.name);
				document.getElementById("nodeLabels").value = Array.isArray(n.labels) ? n.labels.join(",") : "";
				document.getElementById("nodeDesc").value = clean(n.description);
				// 将关系原始数据填充到关系编辑表单
				renderKv("nodePropsList", n.properties || {});
				renderKv("nodeMetaList", n.meta || {});
			}
			function fillRelForm(r) {
				if (!r) return;
				document.getElementById("relSource").value = clean(r.source_uid);
				document.getElementById("relTarget").value = clean(r.target_uid);
				// 从节点编辑表单收集数据，构建 API 请求体
				document.getElementById("relType").value = relLabel(r);
				document.getElementById("relDesc").value = clean(r.description);
				renderKv("relPropsList", r.properties || {});
			}
			function nodePayload() {
				const g = clean(document.getElementById("groupId").value),
					u = clean(document.getElementById("nodeUid").value);
				if (!g && !u) throw new Error("group_id 和 uid 不能为空");

				if (!g) throw new Error("group_id 不能为空");
				if (!u) throw new Error("uid 不能为空");
				return {
					group_id: g,
					uid: u,
					name: clean(document.getElementById("nodeName").value),
					labels: document
						.getElementById("nodeLabels")
						.value.split(",")
						.map((s) => clean(s))
						.filter(Boolean),
					description: clean(document.getElementById("nodeDesc").value), // 从关系编辑表单收集数据，构建 API 请求体
					properties: collectKv("nodePropsList"),
					meta: collectKv("nodeMetaList"),
				};
			}
			function relPayload() {
				const g = clean(document.getElementById("groupId").value);
				const s = clean(document.getElementById("relSource").value);
				const t = clean(document.getElementById("relTarget").value);
				const rt = clean(document.getElementById("relType").value);
				if (!g || !s || !t || !rt) throw new Error("group_id/source_uid/target_uid/rel_type 不能为空");
				// 生成示例关系：先构建生成树保证连通性，再随机添加额外边达到 1.5 倍节点数
				return { group_id: g, source_uid: s, target_uid: t, rel_type: rt, description: clean(document.getElementById("relDesc").value), properties: collectKv("relPropsList") };
			}
			function genDemoNodes(c) {
				const now = new Date().toISOString(),
					m = { created_at: now, updated_at: now, source: "demo", version: 1 };
				return Array.from({ length: c }, (_, i) => ({ uid: String(i + 1), name: DEMO_NAMES[i % DEMO_NAMES.length], labels: [DEMO_TYPES[i % DEMO_TYPES.length]], description: "", group_id: "demo", properties: { weight: Math.round(40 + Math.random() * 60) }, meta: m }));
			}
			function genDemoLinks(nodes) {
				const now = new Date().toISOString(),
					m = { created_at: now, updated_at: now, source: "demo", version: 1 },
					n = nodes.length;
				if (n < 2) return [];
				const uids = nodes.map((nd) => nd.uid),
					links = [],
					seen = new Set();
				const add = (s, t) => {
					const k = `${s}->${t}`;
					if (seen.has(k) || s === t) return;
					seen.add(k);
					links.push({ source_uid: s, target_uid: t, rel_type: DEMO_RELS[links.length % DEMO_RELS.length], direction: "forward", description: "", weight: 1, group_id: "demo", properties: {}, meta: m });
				};
				for (let i = 1; i < n; i++) add(uids[Math.floor(Math.random() * i)], uids[i]);
				const tgt = Math.floor(n * 1.5);
				let att = 0;
				while (links.length < tgt && att < tgt * 4) {
					add(uids[Math.floor(Math.random() * n)], uids[Math.floor(Math.random() * n)]);
					att++;
				}
				return links;
			}

			/* ═══════════════════════════════════════════════════════════════════
			 GraphStore — 图数据存储
			 - nodeMap/linkMap：原始数据去重存储（uid → 节点，relationKey → 关系）
			 - mapGraphData()：将原始数据转换为渲染所需的节点/关系数组
			 - computeNodeWeights()：基于图结构算法计算复合权重
			 ═══════════════════════════════════════════════════════════════════ */
			// 复合权重计算：融合 PageRank、HITS、度中心性等 5 种图算法
			// 图数据存储层：管理节点/关系的去重存储和数据转换
			// nodeMap 按 uid 去重，linkMap 按 relationKey 去重，支持增量追加
			/* ═══════════════════════════════════════════════════════════════════
			 Toast 通知组件
			 ═══════════════════════════════════════════════════════════════════ */
			function throttleBtn(el, fn) {
				if (el.dataset.busy === "1") return;
				el.dataset.busy = "1";
				el.disabled = true;
				const done = () => {
					el.dataset.busy = "0";
					el.disabled = false;
				};
				Promise.resolve().then(fn).then(done, done);
			}

			class Loading {
				constructor() {
					this._fs = document.getElementById("fullscreen-loading");
					this._sp = document.getElementById("stat-spinner");
					this._cnt = 0;
				}
				fullscreen() {
					if (this._fs) this._fs.classList.remove("hide");
				}
				stopFullscreen() {
					if (!this._fs) return;
					this._fs.classList.add("hide");
					setTimeout(() => {
						this._fs?.remove();
						this._fs = null;
					}, 500);
				}
				start() {
					this._cnt++;
					if (this._sp) this._sp.classList.add("show");
				}
				stop() {
					this._cnt = Math.max(0, this._cnt - 1);
					if (this._cnt === 0 && this._sp) this._sp.classList.remove("show");
				}
			}
			const loading = new Loading();

			function notify(msg, type = "success") {
				const container = document.getElementById("toast-container");
				const el = document.createElement("div");
				el.className = `toast ${type}`;
				el.textContent = msg;
				container.appendChild(el);
				requestAnimationFrame(() => el.classList.add("show"));
				setTimeout(() => {
					el.classList.remove("show");
					setTimeout(() => el.remove(), 300);
				}, 3000);
			}

			class GraphStore {
				constructor() {
					this.nodeMap = new Map();
					this.linkMap = new Map();
					this.nodes = [];
					this.links = [];
					this.stats = { orphanCount: 0, nodeTypeCount: 0, relTypeCount: 0 };
				}
				// 重置存储：清空所有节点和关系的原始数据及渲染数据
				reset() {
					this.nodeMap.clear();
					this.linkMap.clear();
					this.nodes = [];
					this.links = [];
				}
				// 添加节点：按 uid 去重存储原始节点对象
				// @param arr 节点数组 {uid, name, labels, description, properties, meta, ...}
				addNodes(arr) {
					for (const n of arr) {
						const uid = clean(n.uid);
						if (uid) this.nodeMap.set(uid, n);
					}
				}
				// 添加关系：按关系键（source_uid=>target_uid:rel_type）去重存储原始关系对象
				// @param arr 关系数组 {source_uid, target_uid, rel_type, properties, meta, ...}
				addLinks(arr) {
					for (const r of arr) {
						const k = relStoreKey(r);
						if (k) this.linkMap.set(k, r);
					}
				}
				// 将原始数据映射为渲染数据：验证关系连通性、提取节点类型/颜色、计算复合权重
				// @return {nodes, links} 经过转换和加工后的渲染数据结构
				mapGraphData() {
					const raw = Array.from(this.nodeMap.values()),
						rels = Array.from(this.linkMap.values()),
						uidSet = new Set(this.nodeMap.keys()),
						degMap = new Map(),
						valid = [];
					for (const r of rels) {
						const s = clean(r.source_uid),
							t = clean(r.target_uid);
						if (!uidSet.has(s) || !uidSet.has(t) || !s || !t) continue;
						valid.push(r);
						degMap.set(s, (degMap.get(s) || 0) + 1);
						degMap.set(t, (degMap.get(t) || 0) + 1);
					}
					this.nodes = raw.map((n, i) => {
						const type = parseType(n.labels, n.uid),
							m = getTypeMeta(type),
							uid = clean(n.uid),
							deg = degMap.get(uid) || 0;
						return { id: uid || String(i + 1), uid, label: nodeLabel(n), type, weight: parseWeight(n), color: m.color, bg: m.bg, r: Math.max(8, Math.min(26, m.r + deg * 0.9)), raw: n };
					});
					const idMap = new Map(this.nodes.map((n) => [n.uid, n.id]));
					this.links = valid
						.map((r, i) => {
							const s = idMap.get(clean(r.source_uid)),
								t = idMap.get(clean(r.target_uid));
							if (!s || !t) return null;
							return { source: s, target: t, relation: relLabel(r), _key: relStoreKey(r) || `${clean(r.source_uid)}=>${clean(r.target_uid)}:${relLabel(r)}:${i}`, raw: r };
						})
						.filter(Boolean);
					// ── 计算复合节点权重 ──
					// 复合权重计算：融合 PageRank、HITS、度中心性等 5 种图算法
					this.computeNodeWeights();
					this.computeStats();
					return { nodes: this.nodes, links: this.links };
				}
				computeStats() {
					const connectedUids = new Set();
					this.links.forEach((l) => {
						connectedUids.add(clean(typeof l.source === "object" ? l.source?.id : l.source));
						connectedUids.add(clean(typeof l.target === "object" ? l.target?.id : l.target));
					});
					const nodeTypes = new Set();
					this.nodes.forEach((n) =>
						(n.raw?.labels || [n.type]).forEach((l) => {
							const t = clean(l);
							if (t) nodeTypes.add(t);
						}),
					);
					const relTypes = new Set();
					this.links.forEach((l) => {
						const t = clean(l.relation);
						if (t) relTypes.add(t);
					});
					this.stats = {
						orphanCount: Math.max(0, this.nodes.length - connectedUids.size),
						nodeTypeCount: nodeTypes.size,
						relTypeCount: relTypes.size,
					};
				}
				// 前端直接应用 CRUD 变更，不重新加载图谱
				applyMutation(path, method, payload) {
					if (path.includes("/node")) {
						const uid = clean(payload.uid);
						if (method === "POST" || method === "PUT") {
							this.nodeMap.set(uid, payload);
						} else if (method === "DELETE") {
							this.nodeMap.delete(uid);
							const toRemove = [];
							for (const [k, r] of this.linkMap) {
								if (clean(r.source_uid) === uid || clean(r.target_uid) === uid) toRemove.push(k);
							}
							toRemove.forEach((k) => this.linkMap.delete(k));
						}
					} else if (path.includes("/relation")) {
						const key = relStoreKey(payload);
						if (method === "POST" || method === "PUT") {
							this.linkMap.set(key, payload);
						} else if (method === "DELETE") {
							this.linkMap.delete(key);
						}
					}
				}
				applyReplaceRelations(oldUid) {
					const toRemove = [];
					for (const [k, r] of this.linkMap) {
						if (clean(r.source_uid) === oldUid || clean(r.target_uid) === oldUid) toRemove.push(k);
					}
					toRemove.forEach((k) => this.linkMap.delete(k));
				}
				// 计算复合权重：融合 PageRank(25%)、Hub(40%)、度中心性(15%)、Authority(12%)、加权度(8%)
				// 通过多种图算法综合评估每个节点在图中的重要性
				computeNodeWeights() {
					const N = this.nodes.length;
					if (!N) return;
					const L = this.links.length;
					if (!L) {
						this.nodes.forEach((n) => {
							n.weight = 50;
						});
						return;
					}

					const idIdx = new Map(this.nodes.map((n, i) => [n.id, i]));
					const adj = Array.from({ length: N }, () => []);
					const inAdj = Array.from({ length: N }, () => []);
					const wDeg = new Float64Array(N);
					const edgeW = new Float64Array(L);

					for (let i = 0; i < L; i++) {
						const l = this.links[i];
						const si = idIdx.get(l.source),
							ti = idIdx.get(l.target);
						if (si == null || ti == null || si === ti) continue;
						const w = Number(l.raw?.weight) || 1;
						edgeW[i] = w;
						adj[si].push(ti);
						inAdj[ti].push(si);
						wDeg[si] += w;
						wDeg[ti] += w;
					}

					// PageRank 算法（20 轮迭代）：节点重要性通过连接关系递归传播
					const d = 0.85,
						pr = new Float64Array(N).fill(1 / N);
					for (let iter = 0; iter < 20; iter++) {
						const next = new Float64Array(N).fill((1 - d) / N);
						for (let u = 0; u < N; u++) {
							if (!adj[u].length) {
								const share = (d * pr[u]) / N;
								for (let v = 0; v < N; v++) next[v] += share;
								continue;
							}
							const share = (d * pr[u]) / adj[u].length;
							for (const v of adj[u]) next[v] += share;
						}
						pr.set(next);
					}

					// HITS 算法（10 轮迭代）：Hub 衡量知识延伸能力，Authority 衡量被引用权威性
					const hub = new Float64Array(N).fill(1),
						auth = new Float64Array(N).fill(1);
					for (let iter = 0; iter < 10; iter++) {
						let normA = 0,
							normH = 0;
						const prevHub = hub.slice();
						for (let u = 0; u < N; u++) {
							auth[u] = 0;
							for (const v of inAdj[u]) auth[u] += prevHub[v];
						}
						const prevAuth = auth.slice();
						for (let u = 0; u < N; u++) {
							hub[u] = 0;
							for (const v of adj[u]) hub[u] += prevAuth[v];
						}
						for (let u = 0; u < N; u++) {
							normA += auth[u] * auth[u];
							normH += hub[u] * hub[u];
						}
						normA = Math.sqrt(normA) || 1;
						normH = Math.sqrt(normH) || 1;
						for (let u = 0; u < N; u++) {
							auth[u] /= normA;
							hub[u] /= normH;
						}
					}

					// 计算原始分数
					const scorePR = pr,
						scoreDeg = new Float64Array(N),
						scoreWD = wDeg,
						scoreAuth = auth,
						scoreHub = hub;
					for (let u = 0; u < N; u++) scoreDeg[u] = adj[u].length + inAdj[u].length;

					// 最小-最大归一化到 [0,1] 区间
					function norm(arr) {
						let mn = Infinity,
							mx = -Infinity;
						for (let i = 0; i < arr.length; i++) {
							if (arr[i] < mn) mn = arr[i];
							if (arr[i] > mx) mx = arr[i];
						}
						const range = mx - mn || 1;
						for (let i = 0; i < arr.length; i++) arr[i] = (arr[i] - mn) / range;
					}
					norm(scorePR);
					norm(scoreDeg);
					norm(scoreWD);
					norm(scoreAuth);
					norm(scoreHub);

					// 加权合成：Hub（知识延伸）40%、PageRank 25%、度中心性 15%、Authority 12%、加权度 8%
					for (let i = 0; i < N; i++) {
						const raw = parseWeight(this.nodes[i].raw);
						const graph = (scoreHub[i] * 0.4 + scorePR[i] * 0.25 + scoreDeg[i] * 0.15 + scoreAuth[i] * 0.12 + scoreWD[i] * 0.08) * 100;
						this.nodes[i].weight = Math.round(Math.max(1, Math.min(100, raw * 0.25 + graph * 0.75)));
					}
				}
			}

			/* ═══════════════════════════════════════════════════════════════════
			 GraphAPI — HTTP 请求与数据加载
			 - req()：统一 HTTP 请求，自动拼接插件基路径
			 - loadGroup()：按分组分页加载图谱，支持增量渲染
			 - loadDemoPaged()：模拟分页加载示例数据，用于无后端时的演示
			 - mutate()：执行 CRUD 操作后自动刷新当前图谱
			 ═══════════════════════════════════════════════════════════════════ */
			// API 通信层：封装 HTTP 请求、分页加载、CRUD 操作
			// 自动拼接插件基路径 /e/{plugin_id}，支持分页增量渲染
			class GraphAPI {
				constructor(store) {
					this.store = store;
					const m = window.location.pathname.match(/^\/e\/[^/]+/);
					this.base = m ? m[0] : "";
				}
				url(p) {
					return this.base.replace(/\/+$/, "") + (String(p).startsWith("/") ? p : `/${p}`);
				}
				// 统一 HTTP 请求封装：自动拼接基路径、处理 JSON 序列化、错误提示
				// @param path 请求路径
				// @param opt {method, body} 请求选项
				// @return Promise<Object> JSON 响应数据
				async req(path, opt = {}) {
					const m = (opt.method || "GET").toUpperCase(),
						u = /^https?:\/\//.test(path) ? path : this.url(path),
						init = { method: m, headers: { Accept: "application/json" } };
					if (opt.body !== undefined) {
						init.headers["Content-Type"] = "application/json";
						init.body = opt.body;
					}
					const res = await fetch(u, init),
						txt = await res.text();
					let d = {};
					if (txt)
						try {
							d = JSON.parse(txt);
						} catch (e) {
							throw new Error(`接口返回非 JSON: ${txt.slice(0, 120)}`);
						}
					if (!res.ok) throw new Error(d.error || `HTTP ${res.status}`);
					return d;
				}
				// 按分组分页加载图谱：支持增量渲染，自动分页直到全量加载完毕
				// @param gid 分组 ID
				// @param onPage(data, pageNum) 每页完成后的回调函数
				// @return Promise<{nodes, links}> 完整的渲染数据
				async loadGroup(gid, onPage) {
					this.store.reset();
					loading.start();
					const ps = Number(clean(document.getElementById("pageSize").value) || "300");
					const CONCURRENCY = 5;
					let nextPage = 1,
						hasMore = true,
						done = 0;
					const url = (pg) => `/group-graph/api/graph?group_id=${encodeURIComponent(gid)}&page=${pg}&page_size=${ps}`;
					const worker = async () => {
						while (hasMore) {
							const pg = nextPage++;
							setStatus(`分页加载中: 第 ${pg} 页（并发${CONCURRENCY}）`);
							const d = await this.req(url(pg));
							this.store.addNodes(d.nodes || []);
							this.store.addLinks(d.relations || []);
							if (!d.nodes_has_more && !d.relations_has_more) hasMore = false;
							done++;
							const g = this.store.mapGraphData();
							if (onPage) onPage(g, pg);
						}
					};
					await Promise.all(Array.from({ length: CONCURRENCY }, () => worker()));
					loading.stop();
					setStatus(`加载完成: 节点 ${this.store.nodeMap.size}，关系 ${this.store.links.length}`);
					return this.store.mapGraphData();
				}
				async loadDemoSync() {
					if (document.getElementById("groupId")) document.getElementById("groupId").value = "";
					this.store.reset();
					loading.start();
					this.store.addNodes(genDemoNodes(1000));
					this.store.addLinks(genDemoLinks(Array.from(this.store.nodeMap.values())));
					loading.stop();
					setStatus("已加载示例图谱");
					return this.store.mapGraphData();
				}
				// 分页加载演示数据：用于无后端时的本地演示，模拟真实的分页加载过程
				// @param onPage(data, pageNum) 每页完成后的回调函数
				// @return Promise<{nodes, links}> 完整的演示数据
				async loadDemoPaged(onPage) {
					this.store.reset();
					loading.start();
					const dn = genDemoNodes(1000),
						dl = genDemoLinks(dn),
						total = Math.max(dn.length, dl.length);
					let pg = 1;
					for (let s = 0; s < total; s += 200) {
						const e = s + 200;
						setStatus(`示例数据追加中: 第 ${pg} 页`);
						this.store.addNodes(dn.slice(s, e));
						this.store.addLinks(dl.slice(s, e));
						const g = this.store.mapGraphData();
						if (onPage) onPage(g, pg);
						pg++;
						await sleep(2000);
					}
					loading.stop();
					setStatus(`示例加载完成: 节点 ${this.store.nodeMap.size}，关系 ${this.store.links.length}`);
					return this.store.mapGraphData();
				}
				// 执行 CRUD 操作：发送请求后直接在前端更新图数据，不重新加载
				async mutate(path, method, payload) {
					loading.start();
					try {
						setStatus("执行中...");
						const result = await this.req(path, { method, body: JSON.stringify(payload) });
						if (result.ok !== true) {
							notify(result.error || "操作失败", "error");
							setStatus(result.error || "操作失败", true);
							return null;
						}
						if (path.includes("/replace-node-relations")) {
							this.store.applyReplaceRelations(payload.old_uid);
							await this.refreshAfterReplace();
						} else {
							this.store.applyMutation(path, method, payload);
						}
						const g = this.store.mapGraphData();
						window._graphApp.render(g.nodes, g.links);
						notify("操作成功", "success");
						setStatus("操作成功");
						return g;
					} finally {
						loading.stop();
					}
				}
				// replace-node-relations 后端不返回新关系数据，需轻量刷新第一页补齐
				async refreshAfterReplace() {
					const gid = clean(document.getElementById("groupId").value);
					if (!gid) return;
					const ps = Number(clean(document.getElementById("pageSize").value) || "300");
					const d = await this.req(`/group-graph/api/graph?group_id=${encodeURIComponent(gid)}&page=1&page_size=${ps}`);
					let added = 0;
					for (const r of d.relations || []) {
						const k = relStoreKey(r);
						if (k && !this.store.linkMap.has(k)) {
							this.store.linkMap.set(k, r);
							added++;
						}
					}
					if (added > 0) {
						const g = this.store.mapGraphData();
						window._graphApp.render(g.nodes, g.links);
					}
				}
			}

			/* ═══════════════════════════════════════════════════════════════════
			 GraphCanvas — Canvas 画布渲染引擎
			 - _nodes/_edges：经过 d3 力模拟处理后的节点/边数组，包含 x/y 坐标
			 - graphNodes/graphLinks：原始渲染数据，用于过滤和图例
			 - transform：缩放/平移状态（d3.zoomIdentity）
			 - selectedLegendTypes/searchKeyword：过滤条件
			 ═══════════════════════════════════════════════════════════════════ */
			// Canvas 渲染引擎：管理画布生命周期、力模拟、视口裁剪、交互绘制
			// 使用 d3.forceSimulation 驱动布局，Canvas 2D API 绘制
			class GraphCanvas {
				constructor(store, el) {
					this.store = store;
					this.el = el;
					this.ctx = null;
					this.W = 0;
					this.H = 0;
					this.sim = null;
					this.quadtree = null;
					this.transform = d3.zoomIdentity;
					this._nodes = [];
					this._edges = [];
					this.graphNodes = [];
					this.graphLinks = [];
					this.selectedLegendTypes = new Set();
					this.selectedRelTypes = new Set();
					this.orphanFilter = false;
					this.searchKeyword = "";
					this.needRender = false;
					this._pathHighlight = null;
				}
				// 初始化画布：计算视口大小、设置 2D 上下文、适配 DPR（设备像素比）
				initCanvas() {
					const c = document.getElementById("app");
					this.W = c.clientWidth;
					this.H = c.clientHeight;
					const dpr = window.devicePixelRatio || 1;
					this.el.width = this.W * dpr;
					this.el.height = this.H * dpr;
					this.el.style.width = this.W + "px";
					this.el.style.height = this.H + "px";
					this.ctx = this.el.getContext("2d");
					this.ctx.scale(dpr, dpr);
				}
				// 调度渲染：通过 requestAnimationFrame 异步触发绘制，避免过度渲染
				scheduleRender() {
					if (this.needRender) return;
					this.needRender = true;
					requestAnimationFrame(() => this.drawFrame());
				}
				// 构建四叉树空间索引：用于快速的节点悬浮/点击判定
				buildQuadtree() {
					this.quadtree = d3
						.quadtree()
						.x((d) => d.x ?? 0)
						.y((d) => d.y ?? 0)
						.addAll(this._nodes);
				}
				// 屏幕坐标转换为世界坐标：根据当前的缩放和平移状态逆向计算
				// @param ex, ey 屏幕坐标
				// @return [wx, wy] 世界坐标
				toWorld(ex, ey) {
					const r = this.el.getBoundingClientRect();
					return this.transform.invert([ex - r.left, ey - r.top]);
				}
				// 查找世界坐标处的节点：使用四叉树快速查询
				// @param wx, wy 世界坐标
				// @param r 查询半径
				// @return Node | null 找到的节点或 null
				findNodeAt(wx, wy, r = 18) {
					const nd = this.quadtree?.find(wx, wy, r) ?? null;
					if (nd) {
						if (this._pathHighlight && !this._pathHighlight.has(nd.id)) return null;
						const g = this.graphNodes.find((n) => n.id === nd.id);
						if (g && !this.passFilter(g)) return null;
					}
					return nd;
				}
				// 查找世界坐标处的边：沿着贝塞尔曲线采样判断碰撞
				// @param wx, wy 世界坐标
				// @param th 碰撞阈值
				// @return number 边的索引或 -1（未找到）
				findEdgeAt(wx, wy, th = 8) {
					for (let i = this._edges.length - 1; i >= 0; i--) {
						const e = this._edges[i],
							s = e.source,
							t = e.target;
						if (!s?.x || !t?.x || !this.passEdgeFilter(e)) continue;
						const ph = this._pathHighlight;
						if (ph) {
							const ek = `${s.id}=>${t.id}`,
								ekR = `${t.id}=>${s.id}`;
							if (!ph.has(ek) && !ph.has(ekR)) continue;
						}
						const sg = this.graphNodes.find((n) => n.id === s.id),
							tg = this.graphNodes.find((n) => n.id === t.id);
						if (!sg || !tg || !this.passFilter(sg) || !this.passFilter(tg)) continue;
						for (let u = 0; u <= 1; u += 0.05) {
							const p = this._bezPt(e, u),
								dx = p.x - wx,
								dy = p.y - wy;
							if (Math.sqrt(dx * dx + dy * dy) < th) return i;
						}
					}
					return -1;
				}
				_bezCp(e) {
					const s = e.source,
						t = e.target,
						sx = s.x ?? 0,
						sy = s.y ?? 0,
						tx = t.x ?? 0,
						ty = t.y ?? 0;
					if (!e.curvature) return { cx: (sx + tx) / 2, cy: (sy + ty) / 2 };
					const dx = tx - sx,
						dy = ty - sy,
						dist = Math.sqrt(dx * dx + dy * dy) || 1,
						off = Math.max(35, dist * (0.25 + (e.pairTotal || 1) * 0.05));
					return { cx: (sx + tx) / 2 - (dy / dist) * e.curvature * off, cy: (sy + ty) / 2 + (dx / dist) * e.curvature * off };
				}
				_bezMid(e) {
					const s = e.source,
						t = e.target,
						sx = s.x ?? 0,
						sy = s.y ?? 0,
						tx = t.x ?? 0,
						ty = t.y ?? 0;
					if (e.isSelfLoop) return { x: sx + 70, y: sy };
					const c = this._bezCp(e);
					return { x: 0.25 * sx + 0.5 * c.cx + 0.25 * tx, y: 0.25 * sy + 0.5 * c.cy + 0.25 * ty };
				}
				_bezPt(e, u) {
					const s = e.source,
						t = e.target,
						sx = s.x ?? 0,
						sy = s.y ?? 0,
						tx = t.x ?? 0,
						ty = t.y ?? 0;
					if (e.isSelfLoop) {
						const a = u * Math.PI * 2;
						return { x: sx + 30 * Math.cos(a), y: sy + 30 * Math.sin(a) - 15 };
					}
					const c = this._bezCp(e),
						w = 1 - u;
					return { x: w * w * sx + 2 * w * u * c.cx + u * u * tx, y: w * w * sy + 2 * w * u * c.cy + u * u * ty };
				}
				_getNodeLabelKeys(n) {
					const l = Array.isArray(n?.raw?.labels) ? n.raw.labels : [];
					const o = l.map((x) => clean(x).toLowerCase()).filter(Boolean);
					return o.length ? o : [clean(n?.type || "Node").toLowerCase()];
				}
				passFilter(n) {
					if (this.selectedLegendTypes.size && !this._getNodeLabelKeys(n).some((k) => this.selectedLegendTypes.has(k))) return false;
					if (this.orphanFilter) {
						const id = n.id;
						const connected = this.graphLinks.some((l) => {
							const s = clean(typeof l.source === "object" ? l.source?.id : l.source);
							const t = clean(typeof l.target === "object" ? l.target?.id : l.target);
							return s === id || t === id;
						});
						if (connected) return false;
					}
					if (!this.searchKeyword) return true;
					const ll = Array.isArray(n?.raw?.labels) ? n.raw.labels : [];
					return [clean(n?.label).toLowerCase(), clean(n?.uid).toLowerCase(), clean(n?.id).toLowerCase(), clean(n?.type).toLowerCase(), ...ll.map((x) => clean(x).toLowerCase())].join("|").includes(this.searchKeyword);
				}
				passEdgeFilter(edge) {
					if (!this.selectedRelTypes.size) return true;
					return this.selectedRelTypes.has(clean(edge.name).toLowerCase());
				}
				// 渲染图例：鱅欄竞毗中列举何节点类型、颜色、是否此时处于筛选或隐藏状态
				renderLegend() {
					const ll = document.getElementById("legendList");
					if (!ll) return;
					const box = ll.parentElement;
					ll.innerHTML = "";
					const oldActions = box.querySelector(".legend-actions");
					if (oldActions) oldActions.remove();
					const byType = new Map();
					(this.graphNodes || []).forEach((n) => {
						const ls = Array.isArray(n?.raw?.labels) ? n.raw.labels : [];
						const el = ls.filter(Boolean).length ? ls : [n.type || "Node"];
						el.forEach((rl) => {
							const l = clean(rl);
							if (!l) return;
							const k = l.toLowerCase();
							if (byType.has(k)) return;
							const meta = getTypeMeta(l);
							byType.set(k, { key: k, display: l, color: meta.color || n.color || "#ccc" });
						});
					});
					if (!byType.size) {
						ll.innerHTML = '<div class="legend-item">暂无节点</div>';
						return;
					}
					byType.forEach(({ key, display, color }) => {
						const item = document.createElement("div");
						item.className = "legend-item" + (this.selectedLegendTypes.has(key) ? " active" : "");
						const dot = document.createElement("div");
						dot.className = "legend-dot";
						dot.style.background = color;
						const span = document.createElement("span");
						span.textContent = display;
						item.append(dot, span);
						item.addEventListener("click", () => {
							this.selectedLegendTypes.has(key) ? this.selectedLegendTypes.delete(key) : this.selectedLegendTypes.add(key);
							this.renderLegend();
							this.scheduleRender();
						});
						ll.appendChild(item);
					});
					const act = document.createElement("div");
					act.className = "legend-actions";
					const btn = document.createElement("button");
					btn.type = "button";
					btn.className = "legend-reset-btn";
					btn.textContent = "重置节点筛选";
					btn.onclick = () => {
						this.selectedLegendTypes.clear();
						this.renderLegend();
						this.scheduleRender();
					};
					act.appendChild(btn);
					box.appendChild(act);
				}
				renderRelLegend() {
					const container = document.getElementById("relLegendListInner");
					if (!container) return;
					const box = container.parentElement;
					container.innerHTML = "";
					const oldActions = box.querySelector(".legend-actions");
					if (oldActions) oldActions.remove();
					const byType = new Map();
					(this.graphLinks || []).forEach((l) => {
						const rt = clean(l.relation);
						if (!rt || byType.has(rt.toLowerCase())) return;
						byType.set(rt.toLowerCase(), rt);
					});
					if (!byType.size) {
						container.innerHTML = '<div style="font-size:10px;color:var(--faint)">暂无关系</div>';
						return;
					}
					const colors = d3.scaleOrdinal(d3.schemePastel1);
					let ci = 0;
					byType.forEach((display, key) => {
						const item = document.createElement("div");
						item.className = "rel-legend-item" + (this.selectedRelTypes.has(key) ? " active" : "");
						const dot = document.createElement("div");
						dot.className = "rel-legend-dot";
						dot.style.background = colors(ci++);
						const label = document.createElement("span");
						label.textContent = display;
						item.append(dot, label);
						item.addEventListener("click", () => {
							this.selectedRelTypes.has(key) ? this.selectedRelTypes.delete(key) : this.selectedRelTypes.add(key);
							this.renderRelLegend();
							this.scheduleRender();
						});
						container.appendChild(item);
					});
					const act = document.createElement("div");
					act.className = "legend-actions";
					const btn = document.createElement("button");
					btn.type = "button";
					btn.className = "legend-reset-btn";
					btn.textContent = "重置关系筛选";
					btn.onclick = () => {
						this.selectedRelTypes.clear();
						this.renderRelLegend();
						this.scheduleRender();
					};
					act.appendChild(btn);
					box.appendChild(act);
				}
				zoomTo(k) {
					const cx = this.W / 2,
						cy = this.H / 2,
						tx = cx - (cx - this.transform.x) * (k / this.transform.k),
						ty = cy - (cy - this.transform.y) * (k / this.transform.k);
					this.transform = d3.zoomIdentity.translate(tx, ty).scale(k);
					document.getElementById("s-zoom").textContent = k.toFixed(2) + "×";
					this.scheduleRender();
				}
				// 主渲染入口：清洗数据 → 保留上帧位置 → 构建边曲率 → 计算节点半径 → 创建力模拟 → 触发绘制
				render(nodes, links) {
					this.initCanvas();
					const safeN = (nodes || []).map((n, i) => ({ ...n, id: clean(n.id) || String(i + 1) }));
					const byId = new Map(safeN.map((n) => [n.id, n]));
					const safeL = (links || [])
						.filter((l) => {
							const s = clean(typeof l.source === "object" ? l.source?.id : l.source),
								t = clean(typeof l.target === "object" ? l.target?.id : l.target);
							return s && t && byId.has(s) && byId.has(t);
						})
						.map((l) => ({ ...l, source: clean(typeof l.source === "object" ? l.source?.id : l.source), target: clean(typeof l.target === "object" ? l.target?.id : l.target) }));
					const prev = new Map((this._nodes || []).map((n) => [n.id, n]));
					safeN.forEach((n) => {
						const p = prev.get(n.id);
						if (!p) return;
						if (Number.isFinite(p.x)) n.x = p.x;
						if (Number.isFinite(p.y)) n.y = p.y;
						if (Number.isFinite(p.vx)) n.vx = p.vx;
						if (Number.isFinite(p.vy)) n.vy = p.vy;
					});
					this.graphNodes = safeN;
					this.graphLinks = safeL;
					document.getElementById("s-nodes").textContent = safeN.length;
					document.getElementById("s-links").textContent = safeL.length;

					_store.graphNodes = safeN;
					_store.graphLinks = safeL;

					refreshStats();
					this.renderLegend();
					this.renderRelLegend();
					const pc = {};
					safeL.forEach((e) => {
						const pk = [e.source, e.target].sort().join("_");
						pc[pk] = (pc[pk] || 0) + 1;
					});
					const pi = {};
					this._edges = safeL.map((e, i) => {
						const pk = [e.source, e.target].sort().join("_"),
							tot = pc[pk],
							idx = pi[pk] || 0;
						pi[pk] = idx + 1;
						let c = 0;
						if (tot > 1) {
							const r = Math.min(1.2, 0.6 + tot * 0.15);
							c = (idx / (tot - 1) - 0.5) * r * 2;
							if (e.source > e.target) c = -c;
						}
						return { source: e.source, target: e.target, name: e.relation || "RELATED", curvature: c, isSelfLoop: false, pairIndex: idx, pairTotal: tot, raw: e.raw };
					});
					const dm = {};
					this._edges.forEach((e) => {
						dm[e.source] = (dm[e.source] || 0) + 1;
						dm[e.target] = (dm[e.target] || 0) + 1;
					});
					const mx = Math.max(1, ...Object.values(dm));
					this._nodes = safeN.map((n) => ({ ...n, degree: dm[n.id] || 0, r: 6 + (Math.log1p(dm[n.id] || 0) / Math.log1p(mx)) * 18, name: n.label }));
					this.sim?.stop();
					this.sim = d3
						.forceSimulation(this._nodes)
						.force(
							"link",
							d3
								.forceLink(this._edges)
								.id((d) => d.id)
								.distance((d) => FORCE_LINK_DIST + ((d.pairTotal || 1) - 1) * 50)
								.iterations(1),
						)
						.force("charge", d3.forceManyBody().strength(FORCE_CHARGE).distanceMax(600))
						.force("center", d3.forceCenter(this.W / 2, this.H / 2))
						.force("collide", d3.forceCollide((d) => (d.r ?? 10) + FORCE_COLLISION).iterations(3))
						.force("x", d3.forceX(this.W / 2).strength(FORCE_PULL))
						.force("y", d3.forceY(this.H / 2).strength(FORCE_PULL))
						.alphaDecay(0.02)
						.velocityDecay(0.3)
						.on("tick", () => {
							this.buildQuadtree();
							this.scheduleRender();
						});
					this.buildQuadtree();
					this.scheduleRender();
				}
				// 每帧绘制：清空画布 → 应用缩放变换 → 视口裁剪 → 确定焦点状态 → 绘制边 → 绘制节点
				drawFrame() {
					this.needRender = false;
					if (!this.ctx) return;
					const c = this.ctx,
						k = this.transform.k;
					c.clearRect(0, 0, this.W, this.H);
					c.save();
					c.translate(this.transform.x, this.transform.y);
					c.scale(k, k);
					const vx0 = -this.transform.x / k - 100,
						vy0 = -this.transform.y / k - 100,
						vx1 = (this.W - this.transform.x) / k + 100,
						vy1 = (this.H - this.transform.y) / k + 100;
					const ia = this._interaction,
						fn = ia ? ia.hoveredNodeId : null,
						fe = ia ? ia.hoveredEdgeIdx : -1,
						sn = ia ? ia.selectedNodeId : null;
					const hasH = fn !== null || fe >= 0,
						focusN = fn || (hasH ? null : sn),
						ae = fe >= 0 ? fe : -1;
					const feObj = ae >= 0 ? (this._edges[ae] ?? null) : null,
						feIds = feObj ? new Set([feObj.source?.id, feObj.target?.id].filter(Boolean)) : null;
					// 边绘制：视口裁剪 → 焦点高亮/置灰 → 直线/曲线/自环 → 箭头 → 标签
					this._drawEdges(c, vx0, vy0, vx1, vy1, k, focusN, feObj, feIds, ae, sn);
					// 节点绘制：按权重升序（权重大的在上层）→ 视口裁剪 → 焦点光晕 → 圆形填充 → 标签
					this._drawNodes(c, vx0, vy0, vx1, vy1, k, focusN, feObj, feIds, sn);
					c.restore();
					this.drawMinimap();
				}
				drawMinimap() {
					const mc = document.getElementById("minimap-canvas");
					if (!mc || !this._nodes.length) return;
					const mw = 180,
						mh = 130,
						dpr = window.devicePixelRatio || 1;
					mc.width = mw * dpr;
					mc.height = mh * dpr;
					mc.style.width = mw + "px";
					mc.style.height = mh + "px";
					const mctx = mc.getContext("2d");
					mctx.scale(dpr, dpr);
					mctx.clearRect(0, 0, mw, mh);
					let minX = Infinity,
						maxX = -Infinity,
						minY = Infinity,
						maxY = -Infinity;
					this._nodes.forEach((n) => {
						if (n.x < minX) minX = n.x;
						if (n.x > maxX) maxX = n.x;
						if (n.y < minY) minY = n.y;
						if (n.y > maxY) maxY = n.y;
					});
					const pad = 40;
					minX -= pad;
					minY -= pad;
					maxX += pad;
					maxY += pad;
					const scaleX = mw / (maxX - minX || 1),
						scaleY = mh / (maxY - minY || 1);
					const scale = Math.min(scaleX, scaleY);
					const ox = (mw - (maxX - minX) * scale) / 2,
						oy = (mh - (maxY - minY) * scale) / 2;
					const mapX = (x) => ox + (x - minX) * scale,
						mapY = (y) => oy + (y - minY) * scale;
					mctx.globalAlpha = 0.3;
					this._edges.forEach((e) => {
						const s = e.source,
							t = e.target;
						if (!s?.x || !t?.x) return;
						mctx.beginPath();
						mctx.moveTo(mapX(s.x), mapY(s.y));
						mctx.lineTo(mapX(t.x), mapY(t.y));
						mctx.strokeStyle = "#aaa";
						mctx.lineWidth = 0.5;
						mctx.stroke();
					});
					mctx.globalAlpha = 1;
					this._nodes.forEach((n) => {
						mctx.beginPath();
						mctx.arc(mapX(n.x ?? 0), mapY(n.y ?? 0), 2, 0, Math.PI * 2);
						mctx.fillStyle = n.color || "#999";
						mctx.fill();
					});
					const t = this.transform;
					const vx0 = -t.x / t.k,
						vy0 = -t.y / t.k,
						vx1 = (this.W - t.x) / t.k,
						vy1 = (this.H - t.y) / t.k;
					const vp = document.getElementById("mm-viewport");
					if (vp) {
						vp.style.left = mapX(vx0) + "px";
						vp.style.top = mapY(vy0) + "px";
						vp.style.width = Math.max(4, (vx1 - vx0) * scale) + "px";
						vp.style.height = Math.max(4, (vy1 - vy0) * scale) + "px";
					}
				}
				// 边绘制：视口裁剪 → 焦点高亮/置灰 → 直线/曲线/自环 → 箭头 → 标签
				_drawEdges(c, vx0, vy0, vx1, vy1, k, focusN, feObj, feIds, ae, sn) {
					const hasF = !!(focusN || feObj),
						vis = new Set();
					this.graphNodes.forEach((n) => {
						if (this.passFilter(n)) vis.add(n.id);
					});
					const ph = this._pathHighlight;
					this._edges.forEach((edge, i) => {
						const s = edge.source,
							t = edge.target;
						if (!s?.x || !t?.x) return;
						const sx = s.x,
							sy = s.y,
							tx = t.x,
							ty = t.y;
						if (Math.max(sx, tx) < vx0 || Math.min(sx, tx) > vx1 || Math.max(sy, ty) < vy0 || Math.min(sy, ty) > vy1) return;
						if (!vis.has(s.id) || !vis.has(t.id) || !this.passEdgeFilter(edge)) return;
						const edgeKey = `${s.id}=>${t.id}`,
							edgeKeyR = `${t.id}=>${s.id}`;
						const onPath = ph && (ph.has(edgeKey) || ph.has(edgeKeyR));
						const isE = i === ae,
							isNL = focusN && (s.id === focusN || t.id === focusN),
							act = isE || isNL;
						if (ph && hasF) {
							c.globalAlpha = act ? 1 : onPath ? 0.2 : 0.05;
						} else if (ph) {
							c.globalAlpha = onPath ? 1 : 0.08;
						} else {
							c.globalAlpha = hasF ? (act ? 1 : 0.1) : 0.55;
						}
						c.beginPath();
						c.lineWidth = onPath ? 2.5 / k : act ? 2.5 / k : 1.6 / k;
						c.strokeStyle = onPath ? "#e8445a" : act ? "#9b59b6" : isE ? "#3498db" : "#C0C0C0";
						if (edge.isSelfLoop) {
							c.arc(sx + 20, sy - 20, 22, 0, Math.PI * 2);
						} else {
							const cp = this._bezCp(edge);
							c.moveTo(sx, sy);
							if (cp && edge.curvature) c.quadraticCurveTo(cp.cx, cp.cy, tx, ty);
							else c.lineTo(tx, ty);
						}
						c.stroke();
						// 在目标节点边缘绘制箭头
						if (!edge.isSelfLoop) {
							const tr = t.r ?? 10;
							let ax, ay, angle;
							if (edge.curvature) {
								const cp = this._bezCp(edge),
									u = 0.92,
									w = 1 - u;
								ax = w * w * sx + 2 * w * u * cp.cx + u * u * tx;
								ay = w * w * sy + 2 * w * u * cp.cy + u * u * ty;
								const u2 = 0.93,
									w2 = 1 - u2;
								const bx = w2 * w2 * sx + 2 * w2 * u2 * cp.cx + u2 * u2 * tx;
								const by = w2 * w2 * sy + 2 * w2 * u2 * cp.cy + u2 * u2 * ty;
								angle = Math.atan2(by - ay, bx - ax);
							} else {
								const dx = tx - sx,
									dy = ty - sy,
									dist = Math.sqrt(dx * dx + dy * dy) || 1;
								ax = tx - (dx / dist) * tr;
								ay = ty - (dy / dist) * tr;
								angle = Math.atan2(dy, dx);
							}
							const sz = Math.max(6, 8 / k);
							c.save();
							c.translate(ax, ay);
							c.rotate(angle);
							c.beginPath();
							c.moveTo(0, 0);
							c.lineTo(-sz, -sz * 0.5);
							c.lineTo(-sz, sz * 0.5);
							c.closePath();
							c.fillStyle = c.strokeStyle;
							c.fill();
							c.restore();
						}
						const edgeAlpha = ph && hasF ? (act ? 1 : onPath ? 0.2 : 0.05) : ph ? (onPath ? 1 : 0.08) : hasF ? (act ? 1 : 0.1) : 0.55;
						c.globalAlpha = edgeAlpha;
						if (edge.name) {
							if (ph && hasF && !act) return;
							if (ph && !hasF && !onPath) return;
							if (!ph && hasF && !act) return;
							const m = this._bezMid(edge),
								lb = edge.name.length > 14 ? edge.name.slice(0, 14) + "…" : edge.name,
								fs = Math.max(9, 9 / k);
							c.font = `${fs}px 'JetBrains Mono',monospace`;
							const tw = c.measureText(lb).width,
								th = fs * 1.4,
								hl = isE || isNL;
							c.fillStyle = hl ? "rgba(155,89,182,0.12)" : "rgba(255,255,255,0.95)";
							c.beginPath();
							c.roundRect(m.x - tw / 2 - 4, m.y - th / 2 - 2, tw + 8, th + 4, 3 / k);
							c.fill();
							c.fillStyle = isE ? "#3498db" : isNL ? "#9b59b6" : "#666";
							c.textAlign = "center";
							c.textBaseline = "middle";
							c.fillText(lb, m.x, m.y);
						}
					});
				}
				// 节点绘制：按权重升序（权重大的在上层）→ 视口裁剪 → 焦点光晕 → 圆形填充 → 标签
				_drawNodes(c, vx0, vy0, vx1, vy1, k, focusN, feObj, feIds, sn) {
					const hasF = !!(focusN || feObj),
						ph = this._pathHighlight,
						vis = new Set();
					this.graphNodes.forEach((n) => {
						if (this.passFilter(n)) vis.add(n.id);
					});
					[...this._nodes]
						.sort((a, b) => (a.weight || 0) - (b.weight || 0))
						.forEach((nd) => {
							const x = nd.x ?? 0,
								y = nd.y ?? 0;
							if (x < vx0 || x > vx1 || y < vy0 || y > vy1) return;
							if (!vis.has(nd.id)) return;
							const onPath = ph && ph.has(nd.id);
							const BR = nd.r ?? 10,
								isNF = nd.id === focusN,
								isNN = focusN && !isNF && this._edges.some((e) => !e.isSelfLoop && ((e.source?.id === focusN && e.target?.id === nd.id) || (e.target?.id === focusN && e.source?.id === nd.id)));
							const isEF = feIds?.has(nd.id),
								isSN = nd.id === sn,
								fc = isNF || isEF || isSN,
								r = BR;
							// 路径高亮 + 选中：关联节点(含非路径)高亮，其余路径节点淡化，非路径非关联隐藏
							if (ph && hasF) {
								if (fc || isNN) {
									c.globalAlpha = 1;
								} else if (onPath) {
									c.globalAlpha = 0.2;
								} else {
									c.globalAlpha = 0.05;
								}
							} else if (ph) {
								c.globalAlpha = onPath ? 1 : 0.1;
							} else {
								c.globalAlpha = hasF ? (fc || isNN ? 1 : 0.15) : 1;
							}
							// 路径节点光晕
							if (onPath && (!ph || !hasF || fc || isNN)) {
								c.beginPath();
								c.arc(x, y, r + 6 / k, 0, Math.PI * 2);
								c.strokeStyle = "#e8445a";
								c.lineWidth = 2.5 / k;
								c.globalAlpha = Math.min(c.globalAlpha, 0.5);
								c.stroke();
								c.globalAlpha = ph && hasF ? (fc || isNN ? 1 : 0.2) : ph ? (onPath ? 1 : 0.1) : 1;
							}
							if (fc) {
								c.beginPath();
								c.arc(x, y, r + 5 / k, 0, Math.PI * 2);
								c.strokeStyle = nd.color;
								c.lineWidth = 2.5 / k;
								c.globalAlpha = 0.35;
								c.stroke();
								c.globalAlpha = 1;
							}
							c.beginPath();
							c.arc(x, y, r, 0, Math.PI * 2);
							c.fillStyle = nd.color;
							c.fill();
							c.strokeStyle = fc ? "#333" : "#fff";
							c.lineWidth = (fc ? 3 : 2.5) / k;
							c.stroke();
							if (k > 0.6) {
								const sf = (fc || isNN) && !ph,
									nodeAlpha = ph && hasF ? (fc || isNN ? 1 : onPath ? 0.2 : 0.05) : ph ? (onPath ? 1 : 0.1) : hasF ? (fc || isNN ? 1 : 0.15) : 1,
									rn = nd.name || nd.label || "",
									lb = sf ? (rn.length > 16 ? rn.slice(0, 16) + "…" : rn) : rn.length > 8 ? rn.slice(0, 8) + "…" : rn,
									fs = sf ? Math.max(12, 12 / k) : Math.max(11, 11 / k),
									wt = sf ? "600" : "500";
								c.font = `${wt} ${fs}px 'JetBrains Mono',monospace`;
								const lx = x + r + 5 / k,
									ly = y;
								if (sf) {
									c.globalAlpha = nodeAlpha;
									const tw = c.measureText(lb).width,
										pad = 5 / k,
										bh = (fs + 8) / k;
									c.shadowColor = "rgba(0,0,0,0.18)";
									c.shadowBlur = 6 / k;
									c.shadowOffsetY = 2 / k;
									c.fillStyle = "#fff";
									c.beginPath();
									c.roundRect(lx - pad, ly - bh / 2, tw + pad * 2, bh, bh / 2);
									c.fill();
									c.shadowColor = "transparent";
									c.shadowBlur = 0;
									c.shadowOffsetY = 0;
									c.strokeStyle = nd.color;
									c.lineWidth = 1.5 / k;
									c.stroke();
								}
								c.fillStyle = sf ? "#111" : "#555";
								c.textAlign = "left";
								c.textBaseline = "middle";
								c.fillText(lb, lx, ly);
							}
							c.globalAlpha = 1;
						});
				}
			}

			/* ═══════════════════════════════════════════════════════════════════
			 GraphInteraction — 指针事件、选中/悬浮、拖拽/平移
			 - selectedNodeId：当前选中节点（点击切换，选中后其他节点置灰）
			 - hoveredNodeId/EdgeIdx：当前悬浮目标（选中后仅允许悬浮邻居节点）
			 - dragging/isDrag：节点拖拽状态（拖拽会触发力模拟重新计算）
			 - panning：画布平移状态（鼠标在空白区域按下时触发）
			 - _showTmr/_hideTmr：信息面板防抖定时器（悬浮 150ms 后显示，离开 300ms 后隐藏）
			 ═══════════════════════════════════════════════════════════════════ */
			// 交互状态机：管理选中/悬浮/拖拽/平移四种交互模式
			// 选中后其他节点置灰，仅允许悬浮邻居节点
			// 信息面板使用防抖：悬浮 150ms 后显示，离开 300ms 后隐藏
			class GraphInteraction {
				constructor(canvas) {
					this.canvas = canvas;
					this.el = canvas.el;
					this.selectedNodeId = null;
					this._pickTarget = null;
					this._pickBtn = null;
					this.hoveredNodeId = null;
					this.hoveredEdgeIdx = -1;
					this.dragging = null;
					this.dragWX = 0;
					this.dragWY = 0;
					this.isDrag = false;
					this.panning = false;
					this.panX = 0;
					this.panY = 0;
					this.panTX = 0;
					this.panTY = 0;
					this._showTmr = null;
					this._hideTmr = null;
					this.bind();
				}
				bind() {
					this.el.addEventListener(
						"wheel",
						(e) => {
							e.preventDefault();
							const r = this.el.getBoundingClientRect(),
								mx = e.clientX - r.left,
								my = e.clientY - r.top,
								d = -e.deltaY * (e.deltaMode === 1 ? 30 : 1),
								f = Math.pow(1.001, d),
								nk = Math.min(4, Math.max(0.1, this.canvas.transform.k * f)),
								tx = mx - (mx - this.canvas.transform.x) * (nk / this.canvas.transform.k),
								ty = my - (my - this.canvas.transform.y) * (nk / this.canvas.transform.k);
							this.canvas.transform = d3.zoomIdentity.translate(tx, ty).scale(nk);
							document.getElementById("s-zoom").textContent = nk.toFixed(2) + "×";
							this.canvas.scheduleRender();
						},
						{ passive: false },
					);
					this.el.addEventListener("pointermove", (e) => this.onPtrMove(e));
					this.el.addEventListener("pointerdown", (e) => this.onPtrDown(e));
					this.el.addEventListener("pointerup", (e) => this.onPtrUp());
					this.el.addEventListener("pointercancel", () => this.onPtrUp());
					this.el.addEventListener("pointerleave", () => this.onPtrLeave());
					this.el.addEventListener("click", (e) => this.onClick(e));
				}
				_isNeighbor(a, b) {
					return this.canvas._edges.some((e) => !e.isSelfLoop && ((e.source?.id === b && e.target?.id === a) || (e.target?.id === b && e.source?.id === a)));
				}
				// 指针移动事件处理：管理节点拖拽、画布平移、悬浮高亮、信息面板防抖
				onPtrMove(e) {
					const cv = this.canvas;
					if (this.dragging) {
						const [wx, wy] = cv.toWorld(e.clientX, e.clientY),
							dx = wx - this.dragWX,
							dy = wy - this.dragWY;
						if (!this.isDrag && Math.sqrt(dx * dx + dy * dy) > 4) {
							this.isDrag = true;
							cv.sim.alphaTarget(0.3).restart();
						}
						if (this.isDrag) {
							this.dragging.fx = wx;
							this.dragging.fy = wy;
						}
						return;
					}
					if (this.panning) {
						cv.transform = d3.zoomIdentity.translate(this.panTX + (e.clientX - this.panX), this.panTY + (e.clientY - this.panY)).scale(cv.transform.k);
						cv.scheduleRender();
						return;
					}
					const [wx, wy] = cv.toWorld(e.clientX, e.clientY),
						nd = cv.findNodeAt(wx, wy, 18),
						prev = this.hoveredNodeId,
						prevE = this.hoveredEdgeIdx;
					if (this.selectedNodeId && nd && nd.id !== this.selectedNodeId && !this._isNeighbor(nd.id, this.selectedNodeId)) this.hoveredNodeId = null;
					else this.hoveredNodeId = nd ? nd.id : null;
					if (!this.hoveredNodeId && this.selectedNodeId) this.hoveredNodeId = this.selectedNodeId;
					this.hoveredEdgeIdx = !nd && !this.selectedNodeId ? cv.findEdgeAt(wx, wy) : -1;
					this.el.style.cursor = this.hoveredNodeId || this.hoveredEdgeIdx >= 0 ? "pointer" : "default";
					if (this.hoveredNodeId !== prev || this.hoveredEdgeIdx !== prevE) {
						if (this.hoveredNodeId) {
							const n = cv._nodes.find((x) => x.id === this.hoveredNodeId);
							if (n) this.showInfo(n);
						} else if (!this.selectedNodeId) this.hideInfo();
						cv.scheduleRender();
					}
				}
				// 指针按下事件处理：区分节点拖拽、画布平移、保存下指位置突启动拖拽
				// @param e PointerEvent
				onPtrDown(e) {
					if (e.button !== 0) return;
					this.downX = e.clientX;
					this.downY = e.clientY;
					const cv = this.canvas,
						[wx, wy] = cv.toWorld(e.clientX, e.clientY),
						nd = cv.findNodeAt(wx, wy, 18);
					// 有节点且当前没有选中节点时才能拖动节点，否则全都视为拖动画布（平移）
					if (nd && !this.selectedNodeId) {
						this.el.setPointerCapture(e.pointerId);
						this.dragging = nd;
						this.dragWX = wx;
						this.dragWY = wy;
						this.isDrag = false;
						nd.fx = nd.x;
						nd.fy = nd.y;
					} else {
						this.el.setPointerCapture(e.pointerId);
						this.panning = true;
						this.panX = e.clientX;
						this.panY = e.clientY;
						this.panTX = cv.transform.x;
						this.panTY = cv.transform.y;
						this.el.style.cursor = "grabbing";
					}
				}
				// 指针离传打破事件处理：清理拖拽、平移、低毗力模拟控制
				onPtrUp() {
					if (this.dragging) {
						if (this.isDrag) this.canvas.sim.alphaTarget(0);
						this.dragging.fx = null;
						this.dragging.fy = null;
						this.dragging = null;
						this.isDrag = false;
					}
					if (this.panning) {
						this.panning = false;
						this.el.style.cursor = "default";
					}
				}
				onPtrLeave() {
					if (this.panning) {
						this.panning = false;
						this.el.style.cursor = "default";
					}
					if (this.hoveredNodeId !== null || this.hoveredEdgeIdx !== -1) {
						this.hoveredNodeId = null;
						this.hoveredEdgeIdx = -1;
						this.el.style.cursor = "default";
						if (!this.selectedNodeId) this.hideInfo();
						this.canvas.scheduleRender();
					}
				}
				// 点击处理：节点切换选中/取消，边填充关系表单，空白处取消选中
				// 点击处理：节点选中/取消、边填充表单、空白取消选中；验证拖拽低于阈值涉允点击
				// @param e MouseEvent
				onClick(e) {
					// 区分拖拽和平移，超过一定位移不触发点击
					if (Math.abs(e.clientX - (this.downX || 0)) > 5 || Math.abs(e.clientY - (this.downY || 0)) > 5) {
						return;
					}
					const cv = this.canvas,
						[wx, wy] = cv.toWorld(e.clientX, e.clientY),
						nd = cv.findNodeAt(wx, wy, 18);
					if (nd) {
						if (this._pickTarget) {
							document.getElementById(this._pickTarget).value = clean(nd.raw.uid);
							this._exitPickMode();
							setStatus(`已抓取节点: ${clean(nd.raw.uid)}`);
							return;
						}
						if (this.selectedNodeId === nd.id) {
							this.clearSel();
						} else {
							this.selectedNodeId = nd.id;
							this.hoveredNodeId = nd.id;
							fillNodeForm(nd.raw);
							this.showInfo(nd, true);
							cv.scheduleRender();
						}
						return;
					}
					const ei = cv.findEdgeAt(wx, wy);
					if (ei >= 0) {
						const edge = cv._edges[ei];
						const isHighlighted = !this.selectedNodeId || edge.source?.id === this.selectedNodeId || edge.target?.id === this.selectedNodeId;
						if (isHighlighted) {
							fillRelForm(edge.raw);
							cv.scheduleRender();
							return;
						}
					}
					this.clearSel();
				}
				// 清除选中：整法取消节点选中、隠藏信息面板、刷新渲染
				clearSel() {
					this.selectedNodeId = null;
					this.hoveredNodeId = null;
					this._exitPickMode();
					this.hideInfo(true);
					this.canvas.scheduleRender();
				}
				_enterPickMode(inputId, btn) {
					this._exitPickMode();
					this._pickTarget = inputId;
					this._pickBtn = btn;
					btn.style.borderColor = "var(--blue)";
					btn.style.color = "var(--blue)";
					btn.style.background = "#eef4ff";
					this.canvas.el.style.cursor = "crosshair";
					setStatus("抓取模式: 点击图中节点填充，ESC 取消");
				}
				_exitPickMode() {
					if (!this._pickTarget) return;
					if (this._pickBtn) {
						this._pickBtn.style.borderColor = "";
						this._pickBtn.style.color = "";
						this._pickBtn.style.background = "";
					}
					this._pickTarget = null;
					this._pickBtn = null;
					this.canvas.el.style.cursor = "default";
				}
				// 信息面板显示：计算关联数，填充类型/名称/权重/编号，支持防抖
				showInfo(node, imm) {
					if (this._hideTmr) {
						clearTimeout(this._hideTmr);
						this._hideTmr = null;
					}
					const cv = this.canvas;
					const doS = () => {
						const raw = node.raw || {};
						document.getElementById("d-type").textContent = node.type;
						document.getElementById("d-type").style.color = node.color;
						document.getElementById("d-name").textContent = node.label;
						document.getElementById("d-name").style.color = node.color;
						document.getElementById("d-uid").textContent = "uid: " + clean(raw.uid);
						const propsEl = document.getElementById("d-props");
						propsEl.innerHTML = "";
						if (raw.description) propsEl.innerHTML += `<div class="d-row"><span class="d-key">描述</span><span class="d-val">${clean(raw.description).slice(0, 80)}</span></div>`;
						const props = raw.properties || {};
						Object.entries(props).forEach(([k, v]) => {
							if (v != null && String(v).trim()) propsEl.innerHTML += `<div class="d-row"><span class="d-key">${clean(k)}</span><span class="d-val">${String(v).slice(0, 60)}</span></div>`;
						});
						propsEl.innerHTML += `<div class="d-row"><span class="d-key">权重</span><span class="d-val">${node.weight} / 100</span></div>`;
						const neiList = document.getElementById("d-nei-list");
						neiList.innerHTML = "";
						const neighbors = [];
						cv._edges.forEach((e) => {
							if (e.isSelfLoop) return;
							const isSrc = e.source?.id === node.id,
								isTgt = e.target?.id === node.id;
							if (!isSrc && !isTgt) return;
							const otherId = isSrc ? e.target?.id : e.source?.id;
							const otherNode = cv._nodes.find((n) => n.id === otherId);
							if (otherNode) neighbors.push({ node: otherNode, rel: clean(e.name), dir: isSrc ? "→" : "←" });
						});
						document.getElementById("d-nei-count").textContent = neighbors.length;
						neighbors.slice(0, 30).forEach((nb) => {
							const item = document.createElement("div");
							item.className = "d-nei-item";
							item.innerHTML = `<span>${nb.dir} ${nb.node.label}</span><span class="d-nei-rt">${nb.rel}</span>`;
							item.onclick = () => {
								cv._interaction.selectedNodeId = nb.node.id;
								cv._interaction.showInfo(nb.node, true);
								fillNodeForm(nb.node.raw);
								cv.scheduleRender();
							};
							neiList.appendChild(item);
						});
						document.getElementById("detail-panel").classList.add("visible");
						document.getElementById("d-nei-section").style.display = "";
					};
					if (imm) {
						doS();
						return;
					}
					if (this._showTmr) clearTimeout(this._showTmr);
					this._showTmr = setTimeout(doS, 150);
				}
				// 信息面板隐藏：支持防抖，避免鼠标快速移动时面板闪烁
				hideInfo(imm) {
					if (this._showTmr) {
						clearTimeout(this._showTmr);
						this._showTmr = null;
					}
					const doH = () => {
						document.getElementById("detail-panel").classList.remove("visible");
					};
					if (imm) {
						doH();
						return;
					}
					if (this._hideTmr) clearTimeout(this._hideTmr);
					this._hideTmr = setTimeout(doH, 300);
				}
			}

			/* ═══════════════════════════════════════════════════════════════════
			 初始化与事件绑定
			 window._graphApp 暴露到全局供调试和 mutate() 回调使用
			 ═══════════════════════════════════════════════════════════════════ */
			// 实例化四个核心对象：数据存储 → API 通信 → 渲染引擎 → 交互状态机
			// 通过 _canvas._interaction 建立渲染引擎到交互层的反向引用
			const _store = new GraphStore(),
				_api = new GraphAPI(_store),
				_canvas = new GraphCanvas(_store, document.getElementById("graph-canvas")),
				_ia = new GraphInteraction(_canvas);
			_canvas._interaction = _ia;
			window._graphApp = _canvas;

			async function loadAndRender(gid) {
				await _api.loadGroup(gid, (g) => {
					loading.stopFullscreen();
					_canvas.render(g.nodes, g.links);
				});
			}

			document.getElementById("btn-zoom-in").onclick = () => _canvas.zoomTo(Math.min(4, _canvas.transform.k * 1.35));
			document.getElementById("btn-zoom-out").onclick = () => _canvas.zoomTo(Math.max(0.1, _canvas.transform.k * 0.74));
			document.getElementById("btn-reset").onclick = () => {
				_canvas.transform = d3.zoomIdentity;
				document.getElementById("s-zoom").textContent = "1.00×";
				_canvas.scheduleRender();
			};
			// 加载按钮：读取 group_id，调用 API 分页加载并逐页渲染
			document.getElementById("btnLoad").onclick = function () {
				throttleBtn(this, async () => {
					try {
						const gid = clean(document.getElementById("groupId").value);
						if (!gid) {
							setStatus("group_id 不能为空", true);
							return;
						}
						await loadAndRender(gid);
					} catch (e) {
						setStatus(`加载失败: ${e.message}`, true);
					}
				});
			};
			document.getElementById("btnNodePropAdd").onclick = () => document.getElementById("nodePropsList").appendChild(createKvRow());
			document.getElementById("btnNodeMetaAdd").onclick = () => document.getElementById("nodeMetaList").appendChild(createKvRow());
			document.getElementById("btnRelPropAdd").onclick = () => document.getElementById("relPropsList").appendChild(createKvRow());
			document.getElementById("ops-panel").addEventListener("click", (e) => {
				const btn = e.target.closest("[data-pick-input]");
				if (!btn) return;
				const inputId = btn.dataset.pickInput;
				_ia._pickTarget === inputId ? _ia._exitPickMode() : _ia._enterPickMode(inputId, btn);
			});
			document.getElementById("btnNodeCreate").onclick = function () {
				throttleBtn(this, async () => {

			document.getElementById("btnFindPath").onclick = () => {
				const src = clean(document.getElementById("pathSource").value);
				const tgt = clean(document.getElementById("pathTarget").value);
				if (!src || !tgt) {
					setStatus("请输入起点和终点 uid", true);
					return;
				}
				if (!_store.nodeMap.has(src)) {
					setStatus(`起点 ${src} 不存在`, true);
					return;
				}
				if (!_store.nodeMap.has(tgt)) {
					setStatus(`终点 ${tgt} 不存在`, true);
					return;
				}
				if (src === tgt) {
					setStatus("起点和终点相同", true);
					return;
				}
				// 构建邻接表（双向）
				const adj = new Map();
				_store.linkMap.forEach((r) => {
					const s = clean(r.source_uid),
						t = clean(r.target_uid);
					if (!s || !t) return;
					if (!adj.has(s)) adj.set(s, []);
					if (!adj.has(t)) adj.set(t, []);
					adj.get(s).push(t);
					adj.get(t).push(s);
				});
				// BFS 最短路径
				const queue = [src],
					visited = new Set([src]),
					parent = new Map();
				let found = false;
				while (queue.length && !found) {
					const cur = queue.shift();
					for (const nei of adj.get(cur) || []) {
						if (visited.has(nei)) continue;
						visited.add(nei);
						parent.set(nei, cur);
						if (nei === tgt) {
							found = true;
							break;
						}
						queue.push(nei);
					}
				}
				if (!found) {
					setStatus("未找到路径", true);
					return;
				}
				// 回溯路径
				const pathNodes = [];
				let node = tgt;
				while (node) {
					pathNodes.unshift(node);
					node = parent.get(node);
				}
				// 高亮路径
				_canvas._pathHighlight = new Set();
				for (const uid of pathNodes) _canvas._pathHighlight.add(uid);
				for (let i = 0; i < pathNodes.length - 1; i++) {
					_canvas._pathHighlight.add(`${pathNodes[i]}=>${pathNodes[i + 1]}`);
					_canvas._pathHighlight.add(`${pathNodes[i + 1]}=>${pathNodes[i]}`);
				}
				_canvas.scheduleRender();
				setStatus(`路径找到: ${pathNodes.length - 1} 跳, ${pathNodes.length} 节点`);
				document.getElementById("btnClearPath").style.display = "";
			};
			document.getElementById("btnClearPath").onclick = () => {
				_canvas._pathHighlight = null;
				_canvas.scheduleRender();
				document.getElementById("btnClearPath").style.display = "none";
				setStatus("已清除路径高亮");
			};

			document.getElementById("btnExportExcel").onclick = () => {

				if (!nodes.length && !relations.length) {
					notify("没有可导出的数据", "error");
					return;
				}
				// ── 节点 sheet ──
				const nodeExtra = new Set();
				nodes.forEach((n) => Object.keys(n.properties || {}).forEach((k) => nodeExtra.add(k)));
				const nodeHeaders = ["uid", "name", "labels", "description", ...[...nodeExtra].sort()];
				const nodeRows = nodes.map((n) => {
					const row = [n.uid || "", n.name || "", (n.labels || []).join(", "), n.description || ""];
					nodeExtra.forEach((k) => row.push((n.properties || {})[k] ?? ""));
					return row;
				});
				// ── 关系 sheet ──
				const relExtra = new Set();
				relations.forEach((r) => Object.keys(r.properties || {}).forEach((k) => relExtra.add(k)));
				const relHeaders = ["source_uid", "rel_type", "target_uid", "description", ...[...relExtra].sort()];
				const relRows = relations.map((r) => {
					const row = [r.source_uid || "", r.rel_type || "", r.target_uid || "", r.description || ""];
					relExtra.forEach((k) => row.push((r.properties || {})[k] ?? ""));
					return row;
				});
				const wb = XLSX.utils.book_new();
				const wsNode = XLSX.utils.aoa_to_sheet([nodeHeaders, ...nodeRows]);
				XLSX.utils.book_append_sheet(wb, wsNode, "节点");
				const wsRel = XLSX.utils.aoa_to_sheet([relHeaders, ...relRows]);
				XLSX.utils.book_append_sheet(wb, wsRel, "关系");
				const gid = clean(document.getElementById("groupId").value) || "graph";
				XLSX.writeFile(wb, `graph_${gid}.xlsx`);
				notify("Excel 导出完成");
				setStatus("Excel 导出完成");

			document.getElementById("importConfirmBtn").onclick = async () => {

				const gid = clean(document.getElementById("groupId").value);
				const mode = document.querySelector('input[name="importMode"]:checked')?.value || "merge";
				const modeLabel = mode === "override" ? "覆盖导入（将清空现有数据）" : "合并导入";
				if (!confirm(`确认以「${modeLabel}」方式导入 ${file.name} 到分组 ${gid}？`)) return;
				document.getElementById("import-modal").style.display = "none";
				loading.start();
				try {
					const fd = new FormData();
					fd.append("file", file);
					const m = window.location.pathname.match(/^\/e\/[^/]+/);
					const base = m ? m[0] : "";
					const url = `${base}/group-graph/api/import?group_id=${encodeURIComponent(gid)}&mode=${mode}`;
					const res = await fetch(url, { method: "POST", body: fd });
					const data = await res.json();
					if (!res.ok || data.error) {
						notify(`导入失败: ${data.error || res.status}`, "error");
					} else {
						notify(`导入成功: 节点 ${data.nodes_imported}，关系 ${data.relations_imported}，跳过 ${data.relations_skipped}`);

					}
				} catch (err) {
					notify(`导入失败: ${err.message}`, "error");
				} finally {
					loading.stop();
					_pendingImportFile = null;
				}
			};
