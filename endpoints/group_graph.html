<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D3 Graph — Neural Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f0f2f7;
    --surface:  #ffffff;
    --surface2: #f5f7fb;
    --border:   rgba(80,100,160,0.14);
    --border2:  rgba(80,100,160,0.22);
    --text:     #1a1d2e;
    --muted:    #7a82a0;
    --faint:    #b0b8d0;

    --cyan:     #0ea5c8;
    --blue:     #3b6ef5;
    --purple:   #7c54e8;
    --amber:    #d97706;
    --rose:     #e8445a;
    --green:    #0fa96b;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Syne', sans-serif;
    color: var(--text);
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image: radial-gradient(circle, rgba(100,120,200,0.12) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  #app { position: relative; width: 100vw; height: 100vh; }

  #graph-svg {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    cursor: grab;
  }
  #graph-svg:active { cursor: grabbing; }

  .link { fill: none; transition: stroke-opacity 0.25s, stroke-width 0.25s; }
  .link.dimmed     { stroke-opacity: 0.06 !important; }
  .link.highlighted { stroke-width: 2.5px !important; stroke-opacity: 1 !important; }
  .link.dimmed-arrow { marker-end: url(#arr-end-dimmed); }
  .link.highlighted-arrow { marker-end: url(#arr-end); }
  .link.filtered-out { opacity: 0 !important; stroke-opacity: 0 !important; pointer-events: none; }

  .edge-label-group { pointer-events: auto; cursor: pointer; }
  .edge-label-bg  { fill: var(--surface); stroke: var(--border2); stroke-width: 0.8; }
  .edge-label-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px; font-weight: 400; letter-spacing: 0.03em;
    dominant-baseline: middle; text-anchor: middle;
    fill: var(--muted);
    pointer-events: none;
  }
  .edge-label-group.dimmed   { opacity: 0.05; }
  .edge-label-group.highlighted .edge-label-text { font-weight: 600; }
  .edge-label-group.highlighted .edge-label-bg   { stroke: var(--border2); }
  .edge-label-group.filtered-out { opacity: 0 !important; pointer-events: none; }

  .node-group { cursor: pointer; }
  .node-ring { fill: none; }
  .node-group.dimmed  { opacity: 0.13; }
  .node-group.selected .node-circle { filter: drop-shadow(0 0 6px currentColor); }
  .node-group.filtered-out { opacity: 0 !important; pointer-events: none; }

  .node-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
    dominant-baseline: middle; text-anchor: middle;
    pointer-events: none;
  }


  #stats {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 1px; z-index: 10;
    background: var(--border); border-radius: 10px; overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    box-shadow: 0 1px 4px rgba(80,100,160,0.1);
  }
  .stat-cell { background: var(--surface); padding: 8px 16px; text-align: center; }
  .stat-cell .n { font-size: 15px; font-weight: 600; color: var(--blue); }
  .stat-cell .l { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 2px; }

  #controls {
    position: absolute; bottom: 28px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 6px; z-index: 10;
  }
  .ctrl-btn {
    width: 34px; height: 34px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 8px; color: var(--muted);
    font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
    box-shadow: 0 1px 3px rgba(80,100,160,0.08);
  }
  .ctrl-btn:hover {
    background: var(--surface2); border-color: var(--blue);
    color: var(--blue); box-shadow: 0 2px 8px rgba(59,110,245,0.15);
  }

  #legend {
    position: absolute; bottom: 28px; right: 28px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 12px; padding: 14px 18px; z-index: 10;
    box-shadow: 0 2px 8px rgba(80,100,160,0.08);
  }
  #legend h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.1em; color: var(--muted);
    text-transform: uppercase; margin-bottom: 10px;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px; color: var(--text); margin-bottom: 6px;
    padding: 3px 6px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    user-select: none;
    transition: all 0.15s ease;
  }
  .legend-item:hover { background: var(--surface2); border-color: var(--border); }
  .legend-item.active { background: rgba(59,110,245,0.08); border-color: rgba(59,110,245,0.35); }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
  }
  .legend-actions { margin-top: 6px; }
  .legend-reset-btn {
    width: 100%;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    cursor: pointer;
  }
  .legend-reset-btn:hover { color: var(--blue); border-color: var(--blue); background: #eef3ff; }

  #info-panel {
    position: absolute; top: 26px; right: 28px; width: 238px;
    background: var(--surface); border: 1px solid var(--border2);
    border-radius: 14px; padding: 20px; z-index: 10;
    opacity: 0; pointer-events: none;
    transform: translateX(12px);
    transition: opacity 0.22s ease, transform 0.22s ease;
    box-shadow: 0 4px 18px rgba(80,100,160,0.1);
  }
  #info-panel.visible { opacity: 1; pointer-events: auto; transform: translateX(0); }
  #info-panel .p-type {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 7px;
  }
  #info-panel .p-name {
    font-size: 20px; font-weight: 700; line-height: 1.15;
    margin-bottom: 14px; color: var(--text);
  }
  #info-panel .p-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
  }
  #info-panel .p-row:last-child { border-bottom: none; }
  #info-panel .p-key { color: var(--muted); }
  #info-panel .p-val { font-weight: 600; color: var(--text); }
  #info-panel .close-btn {
    position: absolute; top: 13px; right: 13px;
    background: none; border: none; color: var(--faint);
    font-size: 17px; cursor: pointer; font-family: 'Syne', sans-serif;
    line-height: 1; padding: 2px 5px; border-radius: 4px;
  }
  #info-panel .close-btn:hover { color: var(--text); background: var(--surface2); }

  #tooltip {
    position: absolute; z-index: 20;
    background: var(--text); color: var(--surface);
    border-radius: 6px; padding: 5px 11px;
    font-family: 'JetBrains Mono', monospace; font-size: 11.5px;
    pointer-events: none; opacity: 0; transition: opacity 0.12s; white-space: nowrap;
  }

  #status {
    position: absolute;
    left: 50%;
    bottom: 78px;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: rgba(255,255,255,0.72);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 10px;
    z-index: 11;
  }

  #ops-panel {
    position: absolute;
    left: 16px;
    top: 16px;
    width: 340px;
    max-height: calc(100vh - 32px);
    overflow: auto;
    z-index: 12;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--border2);
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(80,100,160,0.14);
    padding: 10px;
    font-family: 'JetBrains Mono', monospace;
  }

  .ops-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px;
    background: #fff;
    margin-bottom: 8px;
  }

  .ops-title {
    font-size: 12px;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 6px;
  }

  .ops-grid {
    display: grid;
    gap: 6px;
    grid-template-columns: 1fr 1fr;
  }

  .ops-row { display: grid; gap: 4px; }

  .ops-row label {
    font-size: 11px;
    color: var(--muted);
  }

  .ops-row input,
  .ops-row textarea {
    width: 100%;
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px;
    background: #fff;
    color: var(--text);
    font: inherit;
    font-size: 11px;
  }

  .ops-row textarea {
    min-height: 60px;
    resize: vertical;
  }

  .kv-list {
    display: grid;
    gap: 6px;
  }

  .kv-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 6px;
    align-items: center;
  }

  .kv-del {
    width: 26px;
    height: 26px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    background: #fff;
    color: #a33;
    cursor: pointer;
    font-size: 12px;
    line-height: 1;
  }

  .kv-del:hover {
    border-color: #e29a9a;
    background: #fff5f5;
  }

  .ops-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-top: 8px;
  }

  .ops-btn {
    border: 1px solid var(--border2);
    border-radius: 6px;
    padding: 6px;
    font: inherit;
    font-size: 11px;
    background: #fff;
    color: var(--text);
    cursor: pointer;
  }

  .ops-btn:hover {
    border-color: var(--blue);
    color: var(--blue);
    background: var(--surface2);
  }

  .ops-btn.primary {
    background: #eef4ff;
    border-color: #c8d8ff;
    color: #2454cf;
  }

  @media (max-width: 1100px) {
    #ops-panel {
      width: 300px;
      top: 10px;
      left: 10px;
      max-height: calc(100vh - 20px);
    }
    #legend { right: 10px; bottom: 10px; }
    #controls { left: 50%; bottom: 10px; transform: translateX(-50%); }
    #status { bottom: 58px; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="stats">
    <div class="stat-cell"><div class="n" id="s-nodes">0</div><div class="l">节点</div></div>
    <div class="stat-cell"><div class="n" id="s-links">0</div><div class="l">关系</div></div>
    <div class="stat-cell"><div class="n" id="s-zoom">1.00×</div><div class="l">缩放</div></div>
  </div>

  <svg id="graph-svg">
    <defs>
      <filter id="f-soft" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <marker id="arr-end" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#b0b8d0"/>
      </marker>
      <marker id="arr-end-dimmed" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
        <path d="M0,0 L8,3 L0,6 Z" fill="#d9deec" fill-opacity="0.25"/>
      </marker>
    </defs>
    <g id="graph-root"></g>
  </svg>

  <div id="controls">
    <button class="ctrl-btn" id="btn-zoom-in">+</button>
    <button class="ctrl-btn" id="btn-zoom-out">−</button>
    <button class="ctrl-btn" id="btn-reset" style="font-size:13px">⟳</button>
    <button class="ctrl-btn" id="btn-shuffle" style="font-size:12px">⇄</button>
  </div>

  <div id="legend">
    <h3>节点类型</h3>
    <div id="legendList"></div>
  </div>

  <div id="info-panel">
    <button class="close-btn" id="panel-close">×</button>
    <div class="p-type" id="p-type"></div>
    <div class="p-name" id="p-name"></div>
    <div class="p-row"><span class="p-key">关联数</span><span class="p-val" id="p-conn"></span></div>
    <div class="p-row"><span class="p-key">权重</span><span class="p-val" id="p-weight"></span></div>
    <div class="p-row"><span class="p-key">编号</span><span class="p-val" id="p-id"></span></div>
    <div class="p-row"><span class="p-key">状态</span><span class="p-val" style="color:#0fa96b">● 活跃</span></div>
  </div>

  <div id="ops-panel">
    <div class="ops-card">
      <div class="ops-title">图谱加载</div>
      <div class="ops-grid">
        <div class="ops-row"><label>分组ID（group_id）</label><input id="groupId" placeholder="例如: product_demo"></div>
        <div class="ops-row"><label>分页大小（page_size）</label><input id="pageSize" value="300"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;"><label>模糊检索（名称 / uid / 标签）</label><input id="searchKeyword" placeholder="输入关键词后自动过滤图谱"></div>
      <div class="ops-actions" style="grid-template-columns:1fr;">
        <button class="ops-btn primary" id="btnLoad">加载图谱</button>
      </div>
    </div>

    <div class="ops-card">
      <div class="ops-title">节点操作</div>
      <div class="ops-grid">
        <div class="ops-row"><label>节点ID（uid）</label><input id="nodeUid" placeholder="节点唯一ID"></div>
        <div class="ops-row"><label>名称（name）</label><input id="nodeName" placeholder="节点名称"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;"><label>标签（labels，逗号分隔）</label><input id="nodeLabels" placeholder="例如：Core,Service"></div>
      <div class="ops-row" style="margin-top:6px;"><label>描述（description）</label><input id="nodeDesc" placeholder="节点描述"></div>
      <div class="ops-row" style="margin-top:6px;">
        <label>属性（properties）</label>
        <div id="nodePropsList" class="kv-list"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <button class="ops-btn" type="button" id="btnNodePropAdd">+ 添加属性</button>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <label>元信息（meta）</label>
        <div id="nodeMetaList" class="kv-list"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <button class="ops-btn" type="button" id="btnNodeMetaAdd">+ 添加元信息</button>
      </div>
      <div class="ops-actions">
        <button class="ops-btn primary" id="btnNodeCreate">新增</button>
        <button class="ops-btn" id="btnNodeUpdate">更新</button>
        <button class="ops-btn" id="btnNodeDelete">删除</button>
      </div>
    </div>

    <div class="ops-card" style="margin-bottom:0;">
      <div class="ops-title">关系操作</div>
      <div class="ops-grid">
        <div class="ops-row"><label>源节点ID（source_uid）</label><input id="relSource" placeholder="源节点 uid（点击关系自动填充）"></div>
        <div class="ops-row"><label>关系类型（rel_type）</label><input id="relType" placeholder="例如：RELATED"></div>
      </div>
      <div class="ops-grid" style="margin-top:6px;">
        <div class="ops-row"><label>目标节点ID（target_uid）</label><input id="relTarget" placeholder="目标节点 uid（点击关系自动填充）"></div>
        <div class="ops-row"><label>说明</label><input value="按 source_uid + target_uid 编辑/删除关系" readonly></div>
      </div>
      <div class="ops-row" style="margin-top:6px;"><label>描述（description）</label><input id="relDesc" placeholder="关系描述"></div>
      <div class="ops-row" style="margin-top:6px;">
        <label>属性（properties）</label>
        <div id="relPropsList" class="kv-list"></div>
      </div>
      <div class="ops-row" style="margin-top:6px;">
        <button class="ops-btn" type="button" id="btnRelPropAdd">+ 添加关系属性</button>
      </div>
      <div class="ops-actions">
        <button class="ops-btn primary" id="btnRelCreate">新增</button>
        <button class="ops-btn" id="btnRelUpdate">更新</button>
        <button class="ops-btn" id="btnRelDelete">删除</button>
      </div>
    </div>
  </div>

  <div id="tooltip"></div>
  <div id="status"></div>
</div>

<script>
const RENDER_DEMO_DATA = false; // 是否渲染示例数据
const INITIAL_GROUP_ID = clean(new URLSearchParams(window.location.search).get("group_id"));
const DEMO_PAGE_SIZE = 6;
const DEMO_PAGE_DELAY_MS = 280;
const FORCE_CHARGE_STRENGTH = -280;
const FORCE_LINK_BASE_DISTANCE = 52;
const FORCE_LINK_RADIUS_FACTOR = 1.15;
const FORCE_COLLISION_PADDING = 10;
const FORCE_CENTER_PULL_STRENGTH = 0.035;

const TYPE_META = {
  Core: { color: "#0ea5c8", bg: "rgba(14,165,200,0.10)", r: 16 },
  Module: { color: "#7c54e8", bg: "rgba(124,84,232,0.10)", r: 13 },
  Service: { color: "#0fa96b", bg: "rgba(15,169,107,0.10)", r: 11 },
  Data: { color: "#d97706", bg: "rgba(217,119,6,0.10)", r: 10 },
  Agent: { color: "#e8445a", bg: "rgba(232,68,90,0.10)", r: 9 },
};

const DEMO_NODES = [
  { uid: "1", name: "Orchestrator", labels: ["Core"], description: "", group_id: "demo", properties: { weight: 98 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "2", name: "Planner", labels: ["Core"], description: "", group_id: "demo", properties: { weight: 91 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "3", name: "Memory", labels: ["Core"], description: "", group_id: "demo", properties: { weight: 87 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "4", name: "Retriever", labels: ["Module"], description: "", group_id: "demo", properties: { weight: 75 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "5", name: "Embedder", labels: ["Module"], description: "", group_id: "demo", properties: { weight: 72 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "6", name: "Reasoner", labels: ["Module"], description: "", group_id: "demo", properties: { weight: 78 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "7", name: "VectorDB", labels: ["Data"], description: "", group_id: "demo", properties: { weight: 65 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "8", name: "Cache", labels: ["Data"], description: "", group_id: "demo", properties: { weight: 60 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "9", name: "DocStore", labels: ["Data"], description: "", group_id: "demo", properties: { weight: 62 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "10", name: "API Gateway", labels: ["Service"], description: "", group_id: "demo", properties: { weight: 83 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "11", name: "Auth", labels: ["Service"], description: "", group_id: "demo", properties: { weight: 70 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "12", name: "Logger", labels: ["Service"], description: "", group_id: "demo", properties: { weight: 55 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },
  { uid: "13", name: "Executor", labels: ["Agent"], description: "", group_id: "demo", properties: { weight: 80 }, meta: { created_at: "2026-01-01T00:00:00Z", updated_at: "2026-01-01T00:00:00Z", source: "demo", version: 1 } },

/** 解析插件页面所在基础路径，例如 /e/{plugin_id}。 */
function apiBase() {
  const pathname = String(window.location.pathname || "");
  const match = pathname.match(/^\/e\/[^/]+/);
  return match ? match[0] : "";
}
const API_BASE = apiBase();

/** 将相对 API 路径拼接到当前插件基路径下。 */
function apiUrl(path) {
  const base = API_BASE.replace(/\/+$/, "");
  const suffix = String(path || "").startsWith("/") ? String(path || "") : `/${String(path || "")}`;
  return `${base}${suffix}`;
}

/** 统一字符串清洗，避免 null/undefined 影响 key 匹配。 */
function clean(v) {
  return String(v || "").trim();
}

/** 判断是否启用示例数据模式。 */
function shouldRenderDemo() {
  return RENDER_DEMO_DATA;
}

/** 创建属性编辑行（key/value + 删除按钮）。 */
function createKvRow(key = "", value = "") {
  const row = document.createElement("div");
  row.className = "kv-row";
  const keyInput = document.createElement("input");
  keyInput.placeholder = "key";
  keyInput.value = key;
  const valueInput = document.createElement("input");
  valueInput.placeholder = "value";
  valueInput.value = value;
  const delBtn = document.createElement("button");
  delBtn.type = "button";
  delBtn.className = "kv-del";
  delBtn.textContent = "×";
  delBtn.addEventListener("click", () => row.remove());
  row.appendChild(keyInput);
  row.appendChild(valueInput);
  row.appendChild(delBtn);
  return row;
}

/** 把对象渲染到属性编辑列表。 */
function renderKv(listId, obj = {}) {
  const list = document.getElementById(listId);
  list.innerHTML = "";
  const entries = Object.entries(obj || {});
  if (!entries.length) {
    list.appendChild(createKvRow("", ""));
    return;
  }
  entries.forEach(([k, v]) => {
    list.appendChild(createKvRow(String(k), v == null ? "" : String(v)));
  });
}

/** 从属性编辑列表收集为对象。 */
function collectKv(listId) {
  const rows = Array.from(document.querySelectorAll(`#${listId} .kv-row`));
  const out = {};
  rows.forEach((row) => {
    const inputs = row.querySelectorAll("input");
    const key = clean(inputs[0]?.value);
    const val = clean(inputs[1]?.value);
    if (!key) return;
    out[key] = val;
  });
  return out;
}

/** 根据 labels/uid 推断节点类型。 */
function parseType(labels = [], uid = "") {
  const all = Array.isArray(labels) ? labels.map((x) => clean(x).toLowerCase()) : [];
  if (all.includes("core")) return "Core";
  if (all.includes("module")) return "Module";
  if (all.includes("service")) return "Service";
  if (all.includes("data")) return "Data";
  if (all.includes("agent")) return "Agent";
  const s = clean(uid).toLowerCase();
  if (s.includes("core")) return "Core";
  if (s.includes("service")) return "Service";
  if (s.includes("module")) return "Module";
  if (s.includes("data")) return "Data";
  return "Agent";
}

/** 类型英文标识转中文展示名。 */
function typeDisplayName(type) {
  const map = {
    Core: "核心",
    Module: "模块",
    Service: "服务",
    Data: "数据",
    Agent: "智能体",
  };
  return map[type] || type || "";
}

/** 渲染图例并绑定类型筛选交互。 */
function renderLegend(nodes = []) {
  const legendList = document.getElementById("legendList");
  if (!legendList) return;
  legendList.innerHTML = "";
  const legendRoot = document.getElementById("legend");

  const byType = new Map();
  const toTypeKey = (label) => {
    const k = clean(label).toLowerCase();
    if (k === "core") return "Core";
    if (k === "module") return "Module";
    if (k === "service") return "Service";
    if (k === "data") return "Data";
    if (k === "agent") return "Agent";
    return "";
  };

  (nodes || []).forEach((node) => {
    const labels = Array.isArray(node?.raw?.labels) ? node.raw.labels : [];
    const effectiveLabels = labels.length ? labels : [node.type || "Agent"];
    effectiveLabels.forEach((rawLabel) => {
      const label = clean(rawLabel);
      if (!label) return;
      const key = label.toLowerCase();
      if (byType.has(key)) return;

      const typeKey = toTypeKey(label);
      const color = typeKey
        ? (TYPE_META[typeKey]?.color || node.color || TYPE_META.Agent.color)
        : (node.color || TYPE_META.Agent.color);
      const display = typeKey ? typeDisplayName(typeKey) : label;
      byType.set(key, { key, display, color });
    });
  });

  if (!byType.size) {
    const item = document.createElement("div");
    item.className = "legend-item";
    item.textContent = "暂无节点";
    legendList.appendChild(item);
    if (legendRoot) {
      const oldActions = legendRoot.querySelector(".legend-actions");
      if (oldActions) oldActions.remove();
    }
    return;
  }

  byType.forEach(({ key, display, color }) => {
    const item = document.createElement("div");
    item.className = "legend-item";
    if (selectedLegendTypes.has(key)) item.classList.add("active");
    item.dataset.typeKey = key;

    const dot = document.createElement("div");
    dot.className = "legend-dot";
    dot.style.background = color;

    const text = document.createElement("span");
    text.textContent = display;

    item.appendChild(dot);
    item.appendChild(text);
    item.addEventListener("click", () => {
      if (selectedLegendTypes.has(key)) {
        selectedLegendTypes.delete(key);
      } else {
        selectedLegendTypes.add(key);
      }
      renderLegend(graphNodes);
      applyTypeFilter();
      refreshSelectionStyles();
    });
    legendList.appendChild(item);
  });

  if (legendRoot) {
    const oldActions = legendRoot.querySelector(".legend-actions");
    if (oldActions) oldActions.remove();
    const actions = document.createElement("div");
    actions.className = "legend-actions";
    const resetBtn = document.createElement("button");
    resetBtn.type = "button";
    resetBtn.className = "legend-reset-btn";
    resetBtn.textContent = "重置筛选";
    resetBtn.addEventListener("click", () => {
      if (!selectedLegendTypes.size) return;
      selectedLegendTypes.clear();
      renderLegend(graphNodes);
      applyTypeFilter();
      refreshSelectionStyles();
      setStatus("已重置类型筛选");
    });
    actions.appendChild(resetBtn);
    legendRoot.appendChild(actions);
  }
}

/** 解析节点权重并收敛到 1~100。 */
function parseWeight(node) {
  const candidates = [node.weight, node.properties?.weight, node.properties?.score, node.meta?.score];
  for (const value of candidates) {
    const n = Number(value);
    if (Number.isFinite(n)) return Math.max(1, Math.min(100, Math.round(n)));
  }
  return 50;
}

/** 节点展示名：name > uid > Node。 */
function nodeLabel(node) {
  const name = clean(node.name);
  if (name) return name;
  return clean(node.uid) || "Node";
}

/** 关系展示名：rel_type > RELATED。 */
function relationLabel(rel) {
  return clean(rel.rel_type) || "RELATED";
}

/** 关系备用 key（用于缺少 relation_id 时兜底）。 */
function relationKey(rel, index) {
  return `${clean(rel.source_uid)}=>${clean(rel.target_uid)}:${relationLabel(rel)}:${index}`;
}

const graphStore = {
  nodeMap: new Map(),
  linkMap: new Map(),
  nodes: [],
  links: [],
};

/** 关系存储 key：优先 relation_id，其次 source/target/type。 */
function relationStoreKey(rel) {
  const relationId = clean(rel.relation_id);
  if (relationId) return `rid:${relationId}`;
  return `${clean(rel.source_uid)}=>${clean(rel.target_uid)}:${relationLabel(rel)}`;
}

/** 清空图谱缓存。 */
function resetGraphStore() {
  graphStore.nodeMap.clear();
  graphStore.linkMap.clear();
  graphStore.nodes = [];
  graphStore.links = [];
}

/** 发起请求并统一 JSON/异常处理。 */
async function request(pathOrUrl, options = {}) {
  const method = (options.method || "GET").toUpperCase();
  const url = /^https?:\/\//.test(pathOrUrl) ? pathOrUrl : apiUrl(pathOrUrl);
  const init = { method, headers: { Accept: "application/json" } };
  if (options.body !== undefined) {
    init.headers["Content-Type"] = "application/json";
    init.body = options.body;
  }

  const res = await fetch(url, init);
  const text = await res.text();
  let data = {};
  if (text) {
    try {
      data = JSON.parse(text);
    } catch (_e) {
      throw new Error(`接口返回非 JSON: ${text.slice(0, 120)}`);
    }
  }
  if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
  return data;
}

/** 更新底部状态提示。 */
function setStatus(text, isError = false) {
  const el = document.getElementById("status");
  el.textContent = text;
  el.style.color = isError ? "#c53030" : "var(--muted)";
}

/** 从 graphStore 派生可渲染节点/关系，并过滤缺失端点关系。 */
function mapGraphData() {
  const nodesRaw = Array.from(graphStore.nodeMap.values());
  const relsRaw = Array.from(graphStore.linkMap.values());
  const nodeUidSet = new Set(graphStore.nodeMap.keys());
  const degreeByUid = new Map();
  const droppedRels = [];
  const validRelsRaw = [];

  // 只过滤关系，不过滤节点：关系两端 uid 只要有一端不在 nodeMap 中则丢弃。
  relsRaw.forEach((r) => {
    const suid = clean(r.source_uid);
    const tuid = clean(r.target_uid);
    if (!nodeUidSet.has(suid) || !nodeUidSet.has(tuid) || !suid || !tuid) {
      droppedRels.push({ source_uid: suid, target_uid: tuid, rel_type: relationLabel(r) });
      return;
    }
    validRelsRaw.push(r);
    if (suid) degreeByUid.set(suid, (degreeByUid.get(suid) || 0) + 1);
    if (tuid) degreeByUid.set(tuid, (degreeByUid.get(tuid) || 0) + 1);
  });

  const mappedNodes = nodesRaw.map((n, idx) => {
    const type = parseType(n.labels, n.uid);
    const meta = TYPE_META[type] || TYPE_META.Agent;
    const uid = clean(n.uid);
    const degree = degreeByUid.get(uid) || 0;
    const dynamicR = Math.max(8, Math.min(26, meta.r + degree * 0.9));
    return {
      id: uid || String(idx + 1),
      uid,
      label: nodeLabel(n),
      type,
      weight: parseWeight(n),
      color: meta.color,
      bg: meta.bg,
      r: dynamicR,
      raw: n,
    };
  });

  const idMap = new Map(mappedNodes.map((n) => [n.uid, n.id]));
  const mappedLinks = [];
  validRelsRaw.forEach((r, i) => {
    const sUid = clean(r.source_uid);
    const tUid = clean(r.target_uid);
    const s = idMap.get(sUid);
    const t = idMap.get(tUid);
    if (!s || !t) {
      droppedRels.push({ source_uid: sUid, target_uid: tUid, rel_type: relationLabel(r) });
      return;
    }
    mappedLinks.push({
      // use mapped node ids (from idMap) for source/target so D3 keys match
      source: s,
      target: t,
      relation: relationLabel(r),
      _key: relationStoreKey(r) || relationKey(r, i),
      raw: r,
    });
  });
  if (droppedRels.length) {
    console.warn("[group-graph] skip invalid relations because endpoint node missing", droppedRels.slice(0, 20));
  }
  graphStore.nodes = mappedNodes;
  graphStore.links = mappedLinks;
  return { nodes: graphStore.nodes, links: graphStore.links };
}

/** 分页加载指定 group 的图谱数据并按页渲染。 */
async function loadGraphByGroupId(groupId, onPage) {
  resetGraphStore();
  const pageSize = Number(clean(document.getElementById("pageSize").value) || "300");
  let page = 1;

  while (true) {
    setStatus(`分页加载中: 第 ${page} 页`);
    const data = await request(`/group-graph/api/graph?group_id=${encodeURIComponent(groupId)}&page=${page}&page_size=${encodeURIComponent(pageSize)}`);

    for (const n of (data.nodes || [])) {
      const uid = clean(n.uid);
      if (!uid) continue;
      graphStore.nodeMap.set(uid, n);
    }

    for (const r of (data.relations || [])) {
      const key = relationStoreKey(r);
      if (!key) continue;
      graphStore.linkMap.set(key, r);
    }

    const graph = mapGraphData();
    if (onPage) onPage(graph, page);

    if (!data.nodes_has_more && !data.relations_has_more) break;
    page += 1;
  }

  setStatus(`加载完成: 节点 ${graphStore.nodeMap.size}，关系 ${graphStore.links.length}`);
  return mapGraphData();
}

/** 一次性加载示例数据。 */
function loadDemoGraph() {
  if (document.getElementById("groupId")) {
    document.getElementById("groupId").value = "";
  }
  resetGraphStore();
  DEMO_NODES.forEach((node) => {
    const uid = clean(node.uid);
    if (!uid) return;
    graphStore.nodeMap.set(uid, node);
  });
  DEMO_LINKS.forEach((rel) => {
    const key = relationStoreKey(rel);
    if (!key) return;
    graphStore.linkMap.set(key, rel);
  });
  setStatus("已加载示例图谱");
  return mapGraphData();
}

/** 延时工具函数。 */
function sleep(ms) {
  return new Promise((resolve) => {
    window.setTimeout(resolve, ms);
  });
}

/** 按页动态追加示例数据，模拟真实分页加载。 */
async function loadDemoGraphByPage(onPage) {
  resetGraphStore();
  const total = Math.max(DEMO_NODES.length, DEMO_LINKS.length);
  let page = 1;
  for (let start = 0; start < total; start += DEMO_PAGE_SIZE) {
    const end = start + DEMO_PAGE_SIZE;
    setStatus(`示例数据动态追加中: 第 ${page} 页`);

    DEMO_NODES.slice(start, end).forEach((node) => {
      const uid = clean(node.uid);
      if (!uid) return;
      graphStore.nodeMap.set(uid, node);
    });
    DEMO_LINKS.slice(start, end).forEach((rel) => {
      const key = relationStoreKey(rel);
      if (!key) return;
      graphStore.linkMap.set(key, rel);
    });

    const graph = mapGraphData();
    if (onPage) onPage(graph, page);
    page += 1;
    await sleep(DEMO_PAGE_DELAY_MS);
  }
  setStatus(`示例加载完成: 节点 ${graphStore.nodeMap.size}，关系 ${graphStore.links.length}（已过滤缺失端点关系）`);
  return mapGraphData();
}

/** 将节点信息填充到节点编辑表单。 */
function fillNodeForm(nodeRaw) {
  if (!nodeRaw) return;
  document.getElementById("nodeUid").value = clean(nodeRaw.uid);
  document.getElementById("nodeName").value = clean(nodeRaw.name);
  document.getElementById("nodeLabels").value = Array.isArray(nodeRaw.labels) ? nodeRaw.labels.join(",") : "";
  document.getElementById("nodeDesc").value = clean(nodeRaw.description);
  renderKv("nodePropsList", nodeRaw.properties || {});
  renderKv("nodeMetaList", nodeRaw.meta || {});
}

/** 将关系信息填充到关系编辑表单。 */
function fillRelationForm(relRaw) {
  if (!relRaw) return;
  document.getElementById("relSource").value = clean(relRaw.source_uid);
  document.getElementById("relTarget").value = clean(relRaw.target_uid);
  document.getElementById("relType").value = relationLabel(relRaw);
  document.getElementById("relDesc").value = clean(relRaw.description);
  renderKv("relPropsList", relRaw.properties || {});
}

/** 从节点编辑表单生成请求 payload。 */
function nodePayload() {
  const group_id = clean(document.getElementById("groupId").value);
  const uid = clean(document.getElementById("nodeUid").value);
  if (!group_id || !uid) throw new Error("group_id 和 uid 不能为空");
  return {
    group_id,
    uid,
    name: clean(document.getElementById("nodeName").value),
    labels: document.getElementById("nodeLabels").value.split(",").map((s) => clean(s)).filter(Boolean),
    description: clean(document.getElementById("nodeDesc").value),
    properties: collectKv("nodePropsList"),
    meta: collectKv("nodeMetaList"),
  };
}

/** 从关系编辑表单生成请求 payload。 */
function relationPayload() {
  const group_id = clean(document.getElementById("groupId").value);
  const source_uid = clean(document.getElementById("relSource").value);
  const target_uid = clean(document.getElementById("relTarget").value);
  const rel_type = clean(document.getElementById("relType").value);
  if (!group_id || !source_uid || !target_uid || !rel_type) {
    throw new Error("group_id/source_uid/target_uid/rel_type 不能为空");
  }
  return {
    group_id,
    source_uid,
    target_uid,
    rel_type,
    description: clean(document.getElementById("relDesc").value),
    properties: collectKv("relPropsList"),
  };
}

/** 执行写操作并在当前 group 下自动刷新图谱。 */
async function mutate(path, method, payload) {
  setStatus("执行中...");
  await request(path, { method, body: JSON.stringify(payload) });
  const gid = clean(document.getElementById("groupId").value);
  if (!gid) {
    setStatus("操作成功");
    return;
  }
  await loadAndRenderGroup(gid);
}

const svg = d3.select("#graph-svg");
const root = d3.select("#graph-root");
const defs = svg.select("defs");
const tip = document.getElementById("tooltip");

let sim = null;
let nodeSel = null;
let linkSel = null;
let edgeLabelSel = null;
let selected = null;
let graphNodes = [];
let graphLinks = [];
let linkForce = null;
let linkLayer = null;
let edgeLabelLayer = null;
let nodeLayer = null;
let selectedLegendTypes = new Set();
let searchKeyword = "";
let searchDebounceTimer = null;

/** 获取节点可用于筛选的标签 key 列表。 */
function getNodeLabelKeys(node) {
  const labels = Array.isArray(node?.raw?.labels) ? node.raw.labels : [];
  const out = [];
  labels.forEach((label) => {
    const s = clean(label).toLowerCase();
    if (s) out.push(s);
  });
  if (!out.length) {
    const fallback = clean(node?.type || "Agent").toLowerCase();
    if (fallback) out.push(fallback);
  }
  return out;
}

/** 判断节点是否通过当前图例筛选。 */
function passTypeFilter(node) {
  const hitType = !selectedLegendTypes.size || getNodeLabelKeys(node).some((k) => selectedLegendTypes.has(k));
  if (!hitType) return false;
  if (!searchKeyword) return true;
  const labelList = Array.isArray(node?.raw?.labels) ? node.raw.labels : [];
  const candidate = [
    clean(node?.label).toLowerCase(),
    clean(node?.uid).toLowerCase(),
    clean(node?.id).toLowerCase(),
    clean(node?.type).toLowerCase(),
    clean(node?.raw?.name).toLowerCase(),
    ...labelList.map((x) => clean(x).toLowerCase()),
  ].join("|");
  return candidate.includes(searchKeyword);
}

/** 应用类型筛选到节点、关系线和关系标签。 */
function applyTypeFilter() {
  if (!nodeSel || !linkSel || !edgeLabelSel) return;
  const visibleNodeIds = new Set();
  graphNodes.forEach((n) => {
    if (passTypeFilter(n)) visibleNodeIds.add(n.id);
  });
  nodeSel.classed("filtered-out", (n) => !visibleNodeIds.has(n.id));
  const isLinkVisible = (l) => {
    const s = linkEndpointId(l.source);
    const t = linkEndpointId(l.target);
    return visibleNodeIds.has(s) && visibleNodeIds.has(t);
  };
  linkSel.classed("filtered-out", (l) => !isLinkVisible(l));
  edgeLabelSel.classed("filtered-out", (l) => !isLinkVisible(l));
}

/** 确保三层画布分组存在：links / edge-labels / nodes。 */
function ensureSceneLayers() {
  if (!linkLayer) linkLayer = root.append("g").attr("data-layer", "links");
  if (!edgeLabelLayer) edgeLabelLayer = root.append("g").attr("data-layer", "edge-labels");
  if (!nodeLayer) nodeLayer = root.append("g").attr("data-layer", "nodes");
}

/** 统一取关系端点 id（兼容对象与字符串）。 */
function linkEndpointId(value) {
  if (value && typeof value === "object") return value.id;
  return value;
}

/** 基于关系 key 生成稳定渐变 id。 */
function gradientIdFromKey(key) {
  const text = String(key || "edge");
  let hash = 0;
  for (let i = 0; i < text.length; i += 1) {
    hash = (hash * 31 + text.charCodeAt(i)) >>> 0;
  }
  return `lg-${hash.toString(36)}`;
}

/** 刷新选中态相关高亮/置灰样式。 */
function refreshSelectionStyles() {
  if (!nodeSel || !linkSel || !edgeLabelSel) return;
  const visibleNodeIds = new Set();
  graphNodes.forEach((n) => {
    if (passTypeFilter(n)) visibleNodeIds.add(n.id);
  });
  const nodeVisible = (nodeId) => visibleNodeIds.has(nodeId);
  const relVisible = (l) => {
    const s = linkEndpointId(l.source);
    const t = linkEndpointId(l.target);
    return nodeVisible(s) && nodeVisible(t);
  };

  if (!selected) {
    nodeSel.classed("dimmed", false).classed("selected", false);
    linkSel
      .classed("dimmed", false)
      .classed("highlighted", false)
      .classed("dimmed-arrow", false)
      .classed("highlighted-arrow", false);
    edgeLabelSel.classed("dimmed", false).classed("highlighted", false);
    return;
  }
  if (!nodeVisible(selected)) {
    selected = null;
    nodeSel.classed("dimmed", false).classed("selected", false);
    linkSel
      .classed("dimmed", false)
      .classed("highlighted", false)
      .classed("dimmed-arrow", false)
      .classed("highlighted-arrow", false);
    edgeLabelSel.classed("dimmed", false).classed("highlighted", false);
    document.getElementById("info-panel").classList.remove("visible");
    return;
  }

  const neighbors = new Set([selected]);
  graphLinks.forEach((l) => {
    if (!relVisible(l)) return;
    const s = linkEndpointId(l.source);
    const t = linkEndpointId(l.target);
    if (s === selected) neighbors.add(t);
    if (t === selected) neighbors.add(s);
  });
  nodeSel.classed("dimmed", (n) => !neighbors.has(n.id)).classed("selected", (n) => n.id === selected);

  const isRel = (l) => relVisible(l) && (linkEndpointId(l.source) === selected || linkEndpointId(l.target) === selected);
  linkSel
    .classed("dimmed", (l) => relVisible(l) && !isRel(l))
    .classed("highlighted", isRel)
    .classed("dimmed-arrow", (l) => relVisible(l) && !isRel(l))
    .classed("highlighted-arrow", isRel);
  edgeLabelSel.classed("dimmed", (l) => relVisible(l) && !isRel(l)).classed("highlighted", isRel);
}

/** 将力导布局结果绘制到节点、边和标签。 */
function drawPositions() {
  if (linkSel) {
    linkSel
      .attr("x1", (d) => d.source.x)
      .attr("y1", (d) => d.source.y)
      .attr("x2", (d) => d.target.x)
      .attr("y2", (d) => d.target.y);
    linkSel.data().forEach((l) => {
      defs.select(`#${l._gid}`)
        .attr("x1", l.source.x)
        .attr("y1", l.source.y)
        .attr("x2", l.target.x)
        .attr("y2", l.target.y);
    });
  }

  if (edgeLabelSel) {
    edgeLabelSel.attr("transform", (d) => {
      const mx = (d.source.x + d.target.x) / 2;
      const my = (d.source.y + d.target.y) / 2;
      const dx = d.target.x - d.source.x;
      const dy = d.target.y - d.source.y;
      let a = Math.atan2(dy, dx) * 180 / Math.PI;
      if (a > 90 || a < -90) a += 180;
      return `translate(${mx},${my}) rotate(${a})`;
    });
  }

  if (nodeSel) {
    nodeSel.attr("transform", (d) => `translate(${d.x},${d.y})`);
  }
}

/** 清空当前选中节点。 */
function clearSel() {
  selected = null;
  refreshSelectionStyles();
  document.getElementById("info-panel").classList.remove("visible");
}

/**
 * 渲染前统一标准化节点/关系，并过滤掉端点不存在的关系。
 * 这里是最后一道防线，避免 forceLink 抛出 node not found。
 */
function sanitizeGraphForRender(nodes, links) {
  const normalizedNodes = (nodes || []).map((n) => {
    const id = clean(n.id);
    return { ...n, id };
  });
  const nodeById = new Map(normalizedNodes.map((n) => [n.id, n]));
  const safeLinks = [];
  const dropped = [];

  (links || []).forEach((l, i) => {
    const sourceId = clean(linkEndpointId(l.source));
    const targetId = clean(linkEndpointId(l.target));
    if (!sourceId || !targetId || !nodeById.has(sourceId) || !nodeById.has(targetId)) {
      dropped.push({
        source: sourceId,
        target: targetId,
        key: clean(l._key) || `link-${i}`,
      });
      return;
    }
    safeLinks.push({
      ...l,
      source: sourceId,
      target: targetId,
      _key: clean(l._key) || `link-${i}`,
    });
  });

  if (dropped.length) {
    console.warn("[group-graph] render filter dropped invalid links", dropped.slice(0, 20));
  }
  return { nodes: normalizedNodes, links: safeLinks };
}

/** 渲染图谱主流程（包含过滤、防错、布局与交互绑定）。 */
function render(nodes, links) {
  ensureSceneLayers();
  const sanitized = sanitizeGraphForRender(nodes, links);
  const safeNodes = sanitized.nodes;
  const safeLinks = sanitized.links;

  const prevById = new Map((graphNodes || []).map((n) => [n.id, n]));
  safeNodes.forEach((n) => {
    const prev = prevById.get(n.id);
    if (!prev) return;
    if (Number.isFinite(prev.x)) n.x = prev.x;
    if (Number.isFinite(prev.y)) n.y = prev.y;
    if (Number.isFinite(prev.vx)) n.vx = prev.vx;
    if (Number.isFinite(prev.vy)) n.vy = prev.vy;
    if (Number.isFinite(prev.fx)) n.fx = prev.fx;
    if (Number.isFinite(prev.fy)) n.fy = prev.fy;
  });

  graphNodes = safeNodes;
  graphLinks = safeLinks.map((l) => ({
    ...l,
    source: linkEndpointId(l.source),
    target: linkEndpointId(l.target),
  }));

  document.getElementById("s-nodes").textContent = safeNodes.length;
  document.getElementById("s-links").textContent = graphLinks.length;
  renderLegend(safeNodes);

  const nodeById = new Map(safeNodes.map((n) => [n.id, n]));
  graphLinks.forEach((l) => {
    l._gid = gradientIdFromKey(l._key);
  });

  defs.selectAll("linearGradient.edge-gradient").remove();
  linkLayer.selectAll("*").remove();
  edgeLabelLayer.selectAll("*").remove();
  nodeLayer.selectAll("*").remove();

  graphLinks.forEach(function (d) {
    const g = defs.append("linearGradient").attr("class", "edge-gradient").attr("id", d._gid).attr("gradientUnits", "userSpaceOnUse");
    g.append("stop").attr("class", "from-stop").attr("offset", "0%").attr("stop-opacity", 0.6);
    g.append("stop").attr("class", "to-stop").attr("offset", "100%").attr("stop-opacity", 0.6);
    const sid = linkEndpointId(d.source);
    const tid = linkEndpointId(d.target);
    const sn = nodeById.get(sid);
    const tn = nodeById.get(tid);
    g.select("stop.from-stop").attr("stop-color", sn ? sn.color : "#7a82a0");
    g.select("stop.to-stop").attr("stop-color", tn ? tn.color : "#7a82a0");
  });

  if (!linkForce) linkForce = d3.forceLink().id((d) => clean(d.id));
  linkForce.id((d) => clean(d.id));

  // 必须先更新 simulation nodes，再挂载 links，避免 forceLink 在旧节点上下文抛 node not found。
  if (!sim) {
    sim = d3.forceSimulation(safeNodes)
      .force("charge", d3.forceManyBody().strength(FORCE_CHARGE_STRENGTH))
      .force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2))
      .force("x", d3.forceX(window.innerWidth / 2).strength(FORCE_CENTER_PULL_STRENGTH))
      .force("y", d3.forceY(window.innerHeight / 2).strength(FORCE_CENTER_PULL_STRENGTH))
      .force("collision", d3.forceCollide().radius((d) => d.r + FORCE_COLLISION_PADDING));
  } else {
    sim.nodes(safeNodes);
    sim.force("charge", d3.forceManyBody().strength(FORCE_CHARGE_STRENGTH));
    sim.force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
    sim.force("x", d3.forceX(window.innerWidth / 2).strength(FORCE_CENTER_PULL_STRENGTH));
    sim.force("y", d3.forceY(window.innerHeight / 2).strength(FORCE_CENTER_PULL_STRENGTH));
    sim.force("collision", d3.forceCollide().radius((d) => d.r + FORCE_COLLISION_PADDING));
  }

  linkForce.distance((d) => {
    const sid = linkEndpointId(d.source);
    const tid = linkEndpointId(d.target);
    const s = nodeById.get(sid);
    const t = nodeById.get(tid);
    return FORCE_LINK_BASE_DISTANCE + ((s?.r ?? 10) + (t?.r ?? 10)) * FORCE_LINK_RADIUS_FACTOR;
  });
  try {
    linkForce.links(graphLinks);
  } catch (e) {
    const nodeIdSample = Array.from(nodeById.keys()).slice(0, 20);
    const badLinks = graphLinks
      .filter((l) => !nodeById.has(clean(linkEndpointId(l.source))) || !nodeById.has(clean(linkEndpointId(l.target))))
      .slice(0, 20)
      .map((l) => ({
        key: l._key,
        source: clean(linkEndpointId(l.source)),
        target: clean(linkEndpointId(l.target)),
      }));
    console.error("[group-graph] forceLink init failed", { message: e?.message, badLinks, nodeIdSample });
    throw e;
  }
  sim.force("link", linkForce);

  graphLinks.forEach(function (d) {
    linkLayer.append("line").attr("class", "link").datum(d);
  });
  linkSel = linkLayer.selectAll("line.link")
    .attr("stroke", (d) => `url(#${d._gid})`)
    .attr("stroke-width", 1.6)
    .attr("stroke-opacity", 0.55)
    .attr("marker-end", "url(#arr-end)")
    .on("click", (e, d) => {
      e.stopPropagation();
      fillRelationForm(d.raw);
    });

  graphLinks.forEach(function (d) {
    const g = edgeLabelLayer.append("g").attr("class", "edge-label-group").datum(d);
    g.append("rect").attr("class", "edge-label-bg").attr("height", 13).attr("rx", 3).attr("opacity", 0.9);
    g.append("text").attr("class", "edge-label-text");
  });
  edgeLabelSel = edgeLabelLayer.selectAll("g.edge-label-group").on("click", (e, d) => {
    e.stopPropagation();
    fillRelationForm(d.raw);
  });
  edgeLabelSel.select("text.edge-label-text").text((d) => d.relation);
  edgeLabelSel.each(function (d) {
    const g = d3.select(this);
    const sid = linkEndpointId(d.source);
    const sn = nodeById.get(sid);
    g.select("text").attr("fill", sn ? sn.color : "#7a82a0");
    const tw = g.select("text").node().getBBox().width + 8;
    g.select("rect").attr("width", tw).attr("x", -tw / 2).attr("y", -6.5);
  });

  safeNodes.forEach(function (d) {
    const g = nodeLayer.append("g").attr("class", "node-group").datum(d);
    g.append("circle").attr("class", "node-ring");
    g.append("circle").attr("class", "node-outer");
    g.append("circle").attr("class", "node-circle");
    g.append("circle").attr("class", "node-inner");
    g.append("text").attr("class", "node-label");
  });
  nodeSel = nodeLayer.selectAll("g.node-group");

  nodeSel.select("circle.node-ring")
    .attr("r", (d) => d.r + 5)
    .attr("stroke", (d) => d.color).attr("stroke-width", 1.5)
    .attr("fill", "none").attr("opacity", 0.35)
    .style("animation-delay", (_d, i) => `${(i * 0.19) % 2.6}s`);

  nodeSel.select("circle.node-outer").attr("r", (d) => d.r + 1).attr("fill", (d) => d.color).attr("fill-opacity", 0.12);
  nodeSel.select("circle.node-circle")
    .attr("r", (d) => d.r)
    .attr("fill", (d) => d.bg)
    .attr("stroke", (d) => d.color).attr("stroke-width", 2)
    .attr("filter", "url(#f-soft)");
  nodeSel.select("circle.node-inner").attr("r", (d) => d.r * 0.3).attr("fill", (d) => d.color);
  nodeSel.select("text.node-label").attr("y", (d) => d.r + 15).attr("fill", (d) => d.color).text((d) => d.label);

  nodeSel.call(d3.drag()
    .on("start", (e, d) => {
      if (!e.active) sim.alpha(0.2).restart();
      d.fx = d.x;
      d.fy = d.y;
    })
    .on("drag", (e, d) => {
      d.fx = e.x;
      d.fy = e.y;
      drawPositions();
    })
    .on("end", (e, d) => {
      if (!e.active) sim.alpha(0);
      d.fx = null;
      d.fy = null;
      sim.stop();
      drawPositions();
    }));

  sim.on("tick", drawPositions);
  sim.alpha(0.9);
  for (let i = 0; i < 120; i += 1) {
    sim.tick();
  }
  drawPositions();
  sim.stop();

  nodeSel.on("click", (e, d) => {
    e.stopPropagation();
    if (!passTypeFilter(d)) return;
    fillNodeForm(d.raw);

    if (selected === d.id) { clearSel(); return; }
    selected = d.id;
    const nb = new Set([d.id]);
    graphLinks.forEach((l) => {
      const s = linkEndpointId(l.source);
      const t = linkEndpointId(l.target);
      if (s === d.id) nb.add(t);
      if (t === d.id) nb.add(s);
    });
    nodeSel.classed("dimmed", (n) => !nb.has(n.id)).classed("selected", (n) => n.id === d.id);
    const isRel = (l) => linkEndpointId(l.source) === d.id || linkEndpointId(l.target) === d.id;
    linkSel
      .classed("dimmed", (l) => !isRel(l))
      .classed("highlighted", isRel)
      .classed("dimmed-arrow", (l) => !isRel(l))
      .classed("highlighted-arrow", isRel);
    edgeLabelSel.classed("dimmed", (l) => !isRel(l)).classed("highlighted", isRel);

    const cc = graphLinks.filter(isRel).length;
    document.getElementById("p-type").textContent = typeDisplayName(d.type);
    document.getElementById("p-type").style.color = d.color;
    document.getElementById("p-name").textContent = d.label;
    document.getElementById("p-name").style.color = d.color;
    document.getElementById("p-conn").textContent = cc;
    document.getElementById("p-weight").textContent = d.weight + " / 100";
    document.getElementById("p-id").textContent = "#" + d.id;
    document.getElementById("info-panel").classList.add("visible");
  });

  nodeSel
    .on("mouseenter", (_e, d) => { tip.style.opacity = "1"; tip.style.background = d.color; tip.textContent = `${d.label} · ${d.type} · weight ${d.weight}`; })
    .on("mousemove", (e) => { tip.style.left = `${e.clientX + 14}px`; tip.style.top = `${e.clientY - 10}px`; })
    .on("mouseleave", () => { tip.style.opacity = "0"; });

  applyTypeFilter();
  refreshSelectionStyles();
}

/** 模糊检索输入监听：前端本地过滤 + 防抖限流，避免输入时频繁执行筛选。 */
const searchInput = document.getElementById("searchKeyword");
if (searchInput) {
  searchInput.addEventListener("input", () => {
    const nextKeyword = clean(searchInput.value).toLowerCase();
    if (searchDebounceTimer) {
      window.clearTimeout(searchDebounceTimer);
    }
    searchDebounceTimer = window.setTimeout(() => {
      searchKeyword = nextKeyword;
      applyTypeFilter();
      refreshSelectionStyles();
      if (searchKeyword) {
        setStatus(`已按关键词过滤: ${searchKeyword}`);
      } else {
        setStatus("已清除关键词过滤");
      }
    }, 300);
  });
}

window.addEventListener("resize", () => {
  if (!sim) return;
  sim.force("center", d3.forceCenter(window.innerWidth / 2, window.innerHeight / 2));
  if (!linkForce) return;
  sim.alpha(0.25);
  for (let i = 0; i < 60; i += 1) {
    sim.tick();
  }
  drawPositions();
  sim.stop();
});

(async function init() {
  try {
    renderKv("nodePropsList", {});
    renderKv("nodeMetaList", {});
    renderKv("relPropsList", {});
    const groupId = clean(INITIAL_GROUP_ID);
    if (groupId && !shouldRenderDemo()) {
      document.getElementById("groupId").value = groupId;
      await loadAndRenderGroup(groupId);
    } else {
      if (shouldRenderDemo()) {
        await loadDemoGraphByPage((graph) => {
          render(graph.nodes, graph.links);
        });
      } else {
        render([], []);
        setStatus("请输入 group_id 后加载图谱");
      }
    }
  } catch (e) {
    setStatus(`加载失败: ${e.message}`, true);
    if (shouldRenderDemo()) {
      const graph = loadDemoGraph();
      render(graph.nodes, graph.links);
    } else {
      render([], []);
    }
  }
})();
</script>
