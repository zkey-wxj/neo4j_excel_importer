<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Group Graph 管理台</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root { --bg:#f5f7fb;--card:#fff;--line:#d8deea;--text:#23314a;--muted:#5f6f8e;--accent:#2463eb;--danger:#d93025;--ok:#188038; }
    body{margin:0;font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;color:var(--text);background:radial-gradient(circle at top right,#e9f0ff 0%,var(--bg) 50%)}
    .container{max-width:1320px;margin:0 auto;padding:16px;display:grid;gap:12px;grid-template-columns:360px 1fr}
    .card{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:0 6px 20px rgba(30,50,93,.05);padding:12px}
    .title{margin:0 0 10px;font-size:16px;font-weight:700}.row{display:grid;gap:8px;grid-template-columns:1fr;margin-bottom:8px}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}label{font-size:12px;color:var(--muted)}
    input,textarea,button{border:1px solid var(--line);border-radius:8px;font-size:13px;padding:8px;box-sizing:border-box;width:100%;background:#fff;color:var(--text)}
    textarea{min-height:64px;resize:vertical;font-family:Consolas,Monaco,monospace}button{cursor:pointer;font-weight:600}
    .btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-danger{background:#fff1f0;color:var(--danger);border-color:#f4b2ae}
    .btn-ok{background:#ebf7ef;color:var(--ok);border-color:#9fd3ad}.status{font-size:12px;margin-top:8px;min-height:18px;color:var(--muted)}
    #graph{height:720px;border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,#fff 0%,#f8faff 100%)}
    .legend{margin-top:8px;font-size:12px;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap}
    .chip{display:inline-flex;align-items:center;gap:6px;padding:2px 8px;border-radius:999px;border:1px solid var(--line);background:#fff}
    .kv-list{display:grid;gap:6px}
    .kv-row{display:grid;grid-template-columns:1fr 1fr 72px;gap:6px}
    .kv-btn{padding:6px}
    @media (max-width:980px){.container{grid-template-columns:1fr}#graph{height:520px}}
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h2 class="title">Group Graph 操作面板</h2>
      <div class="row grid2">
        <div><label>group_id</label><input id="groupId" placeholder="例如: product_demo" /></div>
        <div><label>limit</label><input id="limit" type="number" value="500" min="1" max="5000" /></div>
      </div>
      <div class="row"><button id="btnLoad" class="btn-primary">加载图谱</button></div>

      <div class="row">
        <label>节点操作</label>
        <input id="nodeUid" placeholder="uid" /><input id="nodeName" placeholder="name" />
        <input id="nodeLabels" placeholder="labels 逗号分隔，如 Person,Company" />
        <textarea id="nodeDesc" placeholder="description"></textarea>
        <label>节点属性（键值对）</label>
        <div id="nodePropsList" class="kv-list"></div>
        <button id="btnNodePropAdd" type="button">新增属性</button>
        <label>节点 Meta（键值对）</label>
        <div id="nodeMetaList" class="kv-list"></div>
        <button id="btnNodeMetaAdd" type="button">新增 Meta</button>
      </div>
      <div class="row grid2"><button id="btnNodeCreate" class="btn-ok">新增节点</button><button id="btnNodeUpdate">更新节点</button></div>
      <div class="row"><button id="btnNodeDelete" class="btn-danger">删除节点</button></div>

      <div class="row">
        <label>关系操作</label>
        <input id="relId" placeholder="relation_id（点击图中关系标签自动填充）" />
        <input id="relSource" placeholder="source_uid" /><input id="relTarget" placeholder="target_uid" />
        <input id="relType" placeholder="rel_type" /><textarea id="relDesc" placeholder="description"></textarea>
        <textarea id="relProps" placeholder='properties JSON，例如 {"weight": 0.6}'></textarea>
      </div>
      <div class="row grid2"><button id="btnRelCreate" class="btn-ok">新增关系</button><button id="btnRelUpdate">更新关系</button></div>
      <div class="row"><button id="btnRelDelete" class="btn-danger">删除关系</button></div>
      <div id="status" class="status">等待操作...</div>
    </div>

    <div class="card">
      <h2 class="title">D3.js 知识图谱</h2>
      <svg id="graph"></svg>
      <div class="legend"><span class="chip">节点: 可拖拽</span><span class="chip">单击节点: 自动填充节点表单</span><span class="chip">单击关系文本: 自动填充关系表单</span></div>
    </div>
  </div>

  <script>
    const ROOT_PATH = __ROOT_PATH_JSON__;
    const statusEl = document.getElementById("status"), svg = d3.select("#graph");
    const width = () => document.getElementById("graph").clientWidth, height = () => document.getElementById("graph").clientHeight;
    let current = { nodes: [], relations: [] };

    function setStatus(msg, isError = false) { statusEl.textContent = msg; statusEl.style.color = isError ? "#d93025" : "#5f6f8e"; }
    function clean(v) { return (v || "").trim(); }
    function createNodePropRow(key = "", value = "") {
      const row = document.createElement("div");
      row.className = "kv-row";
      row.innerHTML = `
        <input class="node-prop-key" placeholder="属性名" value="${escapeHtml(key)}" />
        <input class="node-prop-value" placeholder="属性值" value="${escapeHtml(value)}" />
        <button type="button" class="kv-btn btn-danger">删除</button>
      `;
      row.querySelector("button").addEventListener("click", () => row.remove());
      return row;
    }

    function escapeHtml(text) {
      return String(text || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll("\"", "&quot;");
    }

    function renderNodeProps(properties = {}) {
      const list = document.getElementById("nodePropsList");
      list.innerHTML = "";
      const entries = Object.entries(properties || {});
      if (!entries.length) {
        list.appendChild(createNodePropRow("", ""));
        return;
      }
      entries.forEach(([k, v]) => list.appendChild(createNodePropRow(k, v)));
    }

    function renderNodeMeta(meta = {}) {
      const list = document.getElementById("nodeMetaList");
      list.innerHTML = "";
      const entries = Object.entries(meta || {});
      if (!entries.length) {
        list.appendChild(createNodePropRow("", ""));
        return;
      }
      entries.forEach(([k, v]) => list.appendChild(createNodePropRow(k, v)));
    }

    function collectNodeProps() {
      const rows = Array.from(document.querySelectorAll("#nodePropsList .kv-row"));
      const props = {};
      rows.forEach((row) => {
        const key = clean(row.querySelector(".node-prop-key")?.value);
        const value = clean(row.querySelector(".node-prop-value")?.value);
        if (key) props[key] = value;
      });
      return props;
    }

    function collectNodeMeta() {
      const rows = Array.from(document.querySelectorAll("#nodeMetaList .kv-row"));
      const meta = {};
      rows.forEach((row) => {
        const key = clean(row.querySelector(".node-prop-key")?.value);
        const value = clean(row.querySelector(".node-prop-value")?.value);
        if (!key) return;
        if (key === "version") {
          const parsed = Number(value);
          if (!Number.isNaN(parsed) && Number.isFinite(parsed)) {
            meta[key] = Math.trunc(parsed);
            return;
          }
        }
        meta[key] = value;
      });
      return meta;
    }

    function readProps(text) {
      const raw = clean(text); if (!raw) return {};
      try { const obj = JSON.parse(raw); if (obj && typeof obj === "object" && !Array.isArray(obj)) return obj; } catch (_) {}
      throw new Error("properties 必须是合法 JSON 对象");
    }

    function buildUrl(path) {
      const base = (ROOT_PATH || "").replace(/\/+$/, "");
      const target = path.startsWith("/") ? path : `/${path}`;
      return `${base}${target}`;
    }

    async function request(path, options = {}) {
      const res = await fetch(buildUrl(path), { headers: { "Content-Type": "application/json" }, ...options });
      const text = await res.text(); let data = {};
      try { data = text ? JSON.parse(text) : {}; } catch (_) { data = { raw: text }; }
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data;
    }

    async function loadGraph() {
      const groupId = clean(document.getElementById("groupId").value), limit = clean(document.getElementById("limit").value) || "500";
      if (!groupId) return setStatus("group_id 不能为空", true);
      setStatus("加载中...");
      try {
        const data = await request(`/group-graph/api/graph?group_id=${encodeURIComponent(groupId)}&limit=${encodeURIComponent(limit)}`);
        current = data; renderGraph(data.nodes || [], data.relations || []);
        setStatus(`加载成功: 节点 ${data.nodes_count || 0}，关系 ${data.relations_count || 0}`);
      } catch (e) { setStatus(`加载失败: ${e.message}`, true); }
    }

    function renderGraph(nodes, relations) {
      svg.selectAll("*").remove(); const w = width(), h = height(); svg.attr("viewBox", `0 0 ${w} ${h}`);
      const nodeMap = new Map(nodes.map(n => [n.uid, { ...n }]));
      const edges = relations.filter(r => nodeMap.has(r.source_uid) && nodeMap.has(r.target_uid)).map(r => ({ ...r, source: nodeMap.get(r.source_uid), target: nodeMap.get(r.target_uid) }));
      const simulation = d3.forceSimulation([...nodeMap.values()]).force("link", d3.forceLink(edges).id(d => d.uid).distance(120)).force("charge", d3.forceManyBody().strength(-340)).force("center", d3.forceCenter(w / 2, h / 2)).force("collision", d3.forceCollide().radius(34));

      svg.append("defs").append("marker").attr("id", "arrow").attr("viewBox", "0 -5 10 10").attr("refX", 24).attr("refY", 0).attr("markerWidth", 6).attr("markerHeight", 6).attr("orient", "auto").append("path").attr("d", "M0,-5L10,0L0,5").attr("fill", "#6e7f9d");
      const link = svg.append("g").selectAll("line").data(edges).join("line").attr("stroke", "#8ea0bf").attr("stroke-width", 1.2).attr("marker-end", "url(#arrow)");
      const linkLabel = svg.append("g").selectAll("text").data(edges).join("text").attr("font-size", 11).attr("fill", "#5f6f8e").style("cursor", "pointer").text(d => d.rel_type || "RELATED").on("click", (_, d) => {
        document.getElementById("relId").value = d.id || "";
        document.getElementById("relSource").value = d.source_uid || "";
        document.getElementById("relTarget").value = d.target_uid || "";
        document.getElementById("relType").value = d.rel_type || "";
        document.getElementById("relDesc").value = d.description || "";
        document.getElementById("relProps").value = JSON.stringify(d.properties || {}, null, 2);
      });

      const node = svg.append("g").selectAll("g").data([...nodeMap.values()]).join("g").call(d3.drag().on("start", dragstarted).on("drag", dragged).on("end", dragended)).on("click", (_, d) => { document.getElementById("nodeUid").value = d.uid || ""; document.getElementById("nodeName").value = d.name || ""; document.getElementById("nodeLabels").value = (d.labels || []).join(","); document.getElementById("nodeDesc").value = d.description || ""; renderNodeProps(d.properties || {}); renderNodeMeta(d.meta || {}); });
      node.append("circle").attr("r", 22).attr("fill", "#dce8ff").attr("stroke", "#2b5fd9").attr("stroke-width", 1.5);
      node.append("text").attr("text-anchor", "middle").attr("dy", 4).attr("font-size", 11).attr("fill", "#1d2f52").text(d => (d.name || d.uid || "").slice(0, 10));

      simulation.on("tick", () => {
        link.attr("x1", d => d.source.x).attr("y1", d => d.source.y).attr("x2", d => d.target.x).attr("y2", d => d.target.y);
        linkLabel.attr("x", d => (d.source.x + d.target.x) / 2).attr("y", d => (d.source.y + d.target.y) / 2);
        node.attr("transform", d => `translate(${d.x},${d.y})`);
      });
      function dragstarted(event, d) { if (!event.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
      function dragged(event, d) { d.fx = event.x; d.fy = event.y; }
      function dragended(event, d) { if (!event.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
    }

    function nodePayload() {
      const group_id = clean(document.getElementById("groupId").value), uid = clean(document.getElementById("nodeUid").value);
      if (!group_id || !uid) throw new Error("group_id 和 uid 不能为空");
      return { group_id, uid, name: clean(document.getElementById("nodeName").value), labels: document.getElementById("nodeLabels").value.split(",").map(s => s.trim()).filter(Boolean), description: clean(document.getElementById("nodeDesc").value), properties: collectNodeProps(), meta: collectNodeMeta() };
    }
    function relPayload() {
      const relation_id = clean(document.getElementById("relId").value);
      const group_id = clean(document.getElementById("groupId").value), source_uid = clean(document.getElementById("relSource").value), target_uid = clean(document.getElementById("relTarget").value), rel_type = clean(document.getElementById("relType").value);
      if (!group_id || !source_uid || !target_uid || !rel_type) throw new Error("group_id/source_uid/target_uid/rel_type 不能为空");
      return { relation_id, group_id, source_uid, target_uid, rel_type, description: clean(document.getElementById("relDesc").value), properties: readProps(document.getElementById("relProps").value) };
    }

    async function mutate(url, method, payload) {
      setStatus("执行中...");
      try { await request(url, { method, body: JSON.stringify(payload) }); setStatus("操作成功，正在刷新图谱..."); await loadGraph(); }
      catch (e) { setStatus(`操作失败: ${e.message}`, true); }
    }

    document.getElementById("btnLoad").addEventListener("click", loadGraph);
    document.getElementById("btnNodePropAdd").addEventListener("click", () => {
      document.getElementById("nodePropsList").appendChild(createNodePropRow("", ""));
    });
    document.getElementById("btnNodeMetaAdd").addEventListener("click", () => {
      document.getElementById("nodeMetaList").appendChild(createNodePropRow("", ""));
    });
    document.getElementById("btnNodeCreate").addEventListener("click", async () => { try { await mutate("/group-graph/api/node", "POST", nodePayload()); } catch (e) { setStatus(e.message, true); } });
    document.getElementById("btnNodeUpdate").addEventListener("click", async () => { try { await mutate("/group-graph/api/node", "PUT", nodePayload()); } catch (e) { setStatus(e.message, true); } });
    document.getElementById("btnNodeDelete").addEventListener("click", async () => { try { const p = nodePayload(); await mutate("/group-graph/api/node", "DELETE", { group_id: p.group_id, uid: p.uid }); } catch (e) { setStatus(e.message, true); } });
    document.getElementById("btnRelCreate").addEventListener("click", async () => { try { await mutate("/group-graph/api/relation", "POST", relPayload()); } catch (e) { setStatus(e.message, true); } });
    document.getElementById("btnRelUpdate").addEventListener("click", async () => {
      try {
        const payload = relPayload();
        if (!payload.relation_id) throw new Error("更新关系时 relation_id 不能为空，请先点击图中的关系标签");
        await mutate("/group-graph/api/relation", "PUT", payload);
      } catch (e) { setStatus(e.message, true); }
    });
    document.getElementById("btnRelDelete").addEventListener("click", async () => {
      try {
        const payload = relPayload();
        if (!payload.relation_id) throw new Error("删除关系时 relation_id 不能为空，请先点击图中的关系标签");
        await mutate("/group-graph/api/relation", "DELETE", { relation_id: payload.relation_id });
      } catch (e) { setStatus(e.message, true); }
    });
    renderNodeProps({});
    renderNodeMeta({});
    window.addEventListener("resize", () => { if (current && current.nodes) renderGraph(current.nodes, current.relations || []); });
  </script>
</body>
</html>
