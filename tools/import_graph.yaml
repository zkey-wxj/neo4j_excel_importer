identity:
  name: import_graph
  author: wxj
  label:
    en_US: Import Graph from Excel
    zh_Hans: 从 Excel 导入图谱

description:
  human:
    en_US: >
      Parse graph tables from Excel/Markdown using mapping-driven headers, then import
      nodes and relationships into Neo4j with MERGE (idempotent). Title rows are converted
      to title nodes, and "包含" relations are auto-generated from title nodes to child nodes.
    zh_Hans: >
      基于字段映射解析 Excel/Markdown 图谱表格，并通过 MERGE 幂等写入 Neo4j。
      标题行会自动转换为标题节点，并自动生成“包含”关系连接到子节点。
  llm: >
    Parse mapped graph tables from Excel/Markdown and import nodes + relationships into Neo4j.
    Supports title-row to title-node conversion and auto "包含" edges. Returns import statistics.

parameters:
  - name: excel_url
    type: string
    required: false
    label:
      en_US: Excel File URL
      zh_Hans: Excel 文件 URL
    human_description:
      en_US: >
        Public URL of a .xlsx file. Parsing follows `mapping` definitions.
        If `mapping` is omitted, default headers are used:
        node table: NodeID | name | node_type | description;
        relation table: SourceID | RelationType | TargetID.
      zh_Hans: >
        指向 .xlsx 文件的公开 URL。解析会按 `mapping` 映射执行；
        不传 `mapping` 时使用默认表头：
        节点表 NodeID | name | node_type | description，
        关系表 SourceID | RelationType | TargetID。
    llm_description: >
      Public HTTPS URL of the .xlsx file. Header detection is mapping-driven.
      Title rows (first cell non-empty, others empty/nan) are treated as title nodes.
    form: llm

  - name: excel_text
    type: string
    required: false
    label:
      en_US: Excel Markdown Text
      zh_Hans: Excel Markdown 文本
    human_description:
      en_US: >
        Markdown table text converted from Excel. If provided, it is preferred over excel_url.
        Supports repeated headers inside one large block and title rows between sections.
      zh_Hans: >
        从 Excel 转换得到的 Markdown 表格文本。若提供则优先于 excel_url。
        支持同一大块内重复出现表头，也支持表头之间穿插标题行。
    llm_description: >
      Markdown table text for nodes and relations. Mapping-driven header detection.
      Repeated headers and section title rows are supported.
    form: llm

  - name: batch_size
    type: number
    required: false
    default: 500
    label:
      en_US: Batch Size
      zh_Hans: 批次大小
    human_description:
      en_US: Number of nodes/relationships written per Neo4j transaction (default 500).
      zh_Hans: 每次 Neo4j 事务写入的节点/关系数量（默认 500）。
    llm_description: Batch size for Neo4j writes (default 500).
    form: form

  - name: clear_before_import
    type: boolean
    required: false
    default: false
    label:
      en_US: Clear Database Before Import
      zh_Hans: 导入前清空数据库
    human_description:
      en_US: "WARNING: deletes ALL nodes and relationships before importing. Use with caution."
      zh_Hans: "警告：导入前删除数据库中所有节点和关系，请谨慎使用。"
    llm_description: If true, wipes the Neo4j database before importing.
    form: form

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: >
        Optional group identifier for this import batch. If omitted, the tool reuses the last group_id
        in current Dify session storage; if none exists, a new UUID will be generated.
      zh_Hans: >
        本次导入的可选分组标识。若不传，工具会优先复用当前 Dify 会话存储中的上次 group_id；
        若会话中不存在，则自动生成新的 UUID。
    llm_description: >
      Optional import group id. If absent, load from current session storage key `import_graph:last_group_id`,
      otherwise auto-generate a UUID.
    form: llm

  - name: mapping
    type: object
    required: false
    label:
      en_US: Field Mapping Object
      zh_Hans: 字段映射对象
    human_description:
      en_US: >
        JSON object for explicit field mapping. If omitted, the following default mapping is used:
        {
          "node": {
            "uid": "NodeID",
            "name": "name",
            "labels": ["node_type", "keywords"],
            "description": ["description", "definition", "说明", "备注", "简介"],
            "properties": ["level", "grade_range", "keywords", "teaching_tip"]
          },
          "relation": {
            "source_uid": "SourceID",
            "rel_type": "RelationType",
            "target_uid": "TargetID",
            "description": ["description", "说明", "备注", "简介"],
            "properties": []
          }
        }
      zh_Hans: >
        字段映射 JSON 对象。不传时使用以下默认映射：
        {
          "node": {
            "uid": "NodeID",
            "name": "name",
            "labels": ["node_type", "keywords"],
            "description": ["description", "definition", "说明", "备注", "简介"],
            "properties": ["level", "grade_range", "keywords", "teaching_tip"]
          },
          "relation": {
            "source_uid": "SourceID",
            "rel_type": "RelationType",
            "target_uid": "TargetID",
            "description": ["description", "说明", "备注", "简介"],
            "properties": []
          }
        }
    llm_description: >
      Optional mapping JSON object for node/relation fields:
      node.uid, node.name, node.labels, node.description, node.properties[],
      relation.source_uid, relation.rel_type, relation.target_uid, relation.description, relation.properties[].
    schema:
      type: object
      properties:
        node:
          type: object
          properties:
            uid:
              type: string
            name:
              type: string
            labels:
              type: array
              items:
                type: string
            description:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
            properties:
              type: array
              items:
                type: string
        relation:
          type: object
          properties:
            source_uid:
              type: string
            rel_type:
              type: string
            target_uid:
              type: string
            description:
              oneOf:
                - type: string
                - type: array
                  items:
                    type: string
            properties:
              type: array
              items:
                type: string
    form: llm

  - name: embedding_model
    type: model-selector
    scope: text-embedding
    required: false
    label:
      en_US: Embedding Model
      zh_Hans: 向量模型
    human_description:
      en_US: Optional Dify text-embedding model for generating node embeddings during import.
      zh_Hans: 可选 Dify text-embedding 模型，在导入时生成节点向量。
    llm_description: Optional text-embedding model selector for node embeddings.
    form: form

output_schema:
  type: object
  properties:
    group_id:
      type: string
      description: Group id used in current import and persisted in current Dify session storage.
    nodes_count:
      type: integer
      description: Number of merged nodes (including auto-generated title nodes).
    rels_count:
      type: integer
      description: Number of merged relationships (including auto-generated "包含" edges).
    skipped_rels:
      type: integer
      description: Number of relationships skipped because source or target node was missing.
    node_type_stats:
      type: object
      description: Mapping of source node_type values from parsed rows to counts.
    rel_type_stats:
      type: object
      description: Mapping of source relation type values to counts.
    summary:
      type: string
      description: Human-readable import summary.

extra:
  python:
    source: tools/import_graph.py
