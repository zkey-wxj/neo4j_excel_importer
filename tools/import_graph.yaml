identity:
  name: import_graph
  author: yourorg
  label:
    en_US: Import Graph from Excel
    zh_Hans: 从 Excel 导入图谱

description:
  human:
    en_US: >
      Parse a structured Excel file containing node tables (NodeID / name / node_type …)
      and relationship tables (SourceID / RelationType / TargetID), then import
      the graph into a Neo4j database via MERGE (idempotent).
    zh_Hans: >
      解析包含节点表（NodeID / name / node_type …）和关系表（SourceID / RelationType /
      TargetID）的结构化 Excel 文件，通过 MERGE 幂等写入 Neo4j 数据库。
  llm: >
    Parse a knowledge-graph Excel file and import nodes + relationships into Neo4j.
    Returns import statistics as structured variables (nodes_count, rels_count, skipped_rels).

parameters:
  - name: excel_url
    type: string
    required: false
    label:
      en_US: Excel File URL
      zh_Hans: Excel 文件 URL
    human_description:
      en_US: Public URL pointing to the .xlsx file (use this OR excel_file).
      zh_Hans: 指向 .xlsx 文件的公开 URL（与 excel_file 二选一）。
    llm_description: Public HTTPS URL of the Excel file to import.
    form: llm

  - name: excel_file
    type: files
    required: false
    label:
      en_US: Excel File (Upload)
      zh_Hans: Excel 文件（上传）
    human_description:
      en_US: Upload files directly (use this OR excel_url). Only the first .xlsx file will be used.
      zh_Hans: 直接上传文件（与 excel_url 二选一）。仅使用第一个 .xlsx 文件。
    llm_description: Uploaded files list. Only the first .xlsx file will be used.
    form: form

  - name: batch_size
    type: number
    required: false
    default: 500
    label:
      en_US: Batch Size
      zh_Hans: 批次大小
    human_description:
      en_US: Number of nodes/relationships written per Neo4j transaction (default 500).
      zh_Hans: 每次 Neo4j 事务写入的节点/关系数量（默认 500）。
    llm_description: Batch size for Neo4j writes (default 500).
    form: form

  - name: clear_before_import
    type: boolean
    required: false
    default: false
    label:
      en_US: Clear Database Before Import
      zh_Hans: 导入前清空数据库
    human_description:
      en_US: "WARNING: deletes ALL nodes and relationships before importing. Use with caution."
      zh_Hans: "警告：导入前删除数据库中所有节点和关系，请谨慎使用。"
    llm_description: If true, wipes the Neo4j database before importing.
    form: form

output_schema:
  type: object
  properties:
    nodes_count:
      type: integer
      description: Number of nodes successfully merged into Neo4j.
    rels_count:
      type: integer
      description: Number of relationships successfully merged into Neo4j.
    skipped_rels:
      type: integer
      description: Number of relationships skipped because source or target node was missing.
    node_type_stats:
      type: object
      description: Mapping of node_type → count.
    rel_type_stats:
      type: object
      description: Mapping of relation_type → count.
    summary:
      type: string
      description: Human-readable import summary.

extra:
  python:
    source: tools/import_graph.py
