identity:
  name: query_nodes_by_nids
  author: wxj
  label:
    en_US: Query Nodes By UIDs
    zh_Hans: 批量按 nid 查询节点

description:
  human:
    en_US: Query multiple KnowledgeNode records by a list of nids.
    zh_Hans: 根据 nid 列表批量查询节点信息。
  llm: Query multiple KnowledgeNode records by nids. Accepts comma-separated nid string. Returns matched nodes with optional group_id filter.

parameters:
  - name: nids
    type: string
    required: true
    label:
      en_US: NIDs
      zh_Hans: 节点 NID 列表
    human_description:
      en_US: Comma-separated nid values, e.g. "nid1,nid2,nid3".
      zh_Hans: 逗号分隔的 nid 列表，如 "nid1,nid2,nid3"。
    llm_description: Comma-separated nid values to query.
    form: llm

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional group_id filter.
      zh_Hans: 可选 group_id 过滤条件。
    llm_description: Optional group_id filter.
    form: llm

  - name: database
    type: string
    required: false
    label:
      en_US: Database Name
      zh_Hans: 数据库名称
    human_description:
      en_US: Optional Neo4j database name.
      zh_Hans: 可选 Neo4j 数据库名称。
    llm_description: Optional Neo4j database name.
    form: form

output_schema:
  type: object
  properties:
    count:
      type: integer
      description: Number of matched nodes.
    nodes:
      type: array
      description: Matched node list.
    missing_nids:
      type: array
      description: UIDs not found.
    summary:
      type: string
      description: Human-readable summary.
    request:
      type: object
      description: Request echo.

extra:
  python:
    source: tools/query_nodes_by_nids.py
