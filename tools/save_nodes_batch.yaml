identity:
  name: save_nodes_batch
  author: wxj
  label:
    en_US: Save Nodes Batch
    zh_Hans: 批量保存节点

description:
  human:
    en_US: Save node data to Neo4j in batch with JSON rows.
    zh_Hans: 使用 JSON 数组批量保存节点数据到 Neo4j。
  llm: Save nodes in batch. JSON items use nid/name/labels/description/group_id/properties/meta.

parameters:
  - name: nodes_json
    type: array
    required: true
    label:
      en_US: Nodes JSON
      zh_Hans: 节点 JSON
    human_description:
      en_US: JSON array of node objects. Fields must match import_graph write format.
      zh_Hans: 节点对象 JSON 数组，字段必须与 import_graph 写库格式一致。
    llm_description: Array of node objects. Each item uses nid, name, labels, description, group_id, properties, meta.
    schema:
      type: array
      items:
        type: object
        properties:
          nid:
            type: string
          name:
            type: string
          labels:
            type: array
            items:
              type: string
          description:
            type: string
          group_id:
            type: string
          properties:
            type: object
          meta:
            type: object
            properties:
              created_at:
                type: string
              updated_at:
                type: string
              source:
                type: string
              version:
                type: integer
        required:
          - nid
    form: llm

  - name: batch_size
    type: number
    required: false
    default: 500
    label:
      en_US: Batch Size
      zh_Hans: 批次大小
    human_description:
      en_US: Number of rows per Neo4j transaction.
      zh_Hans: 每次 Neo4j 事务写入的行数。
    llm_description: Batch size for node writes.
    form: form

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this batch. Used when an item has no group_id. If omitted, uses the default from provider config.
      zh_Hans: 本批次写入的可选默认分组 ID；当某条节点未提供 group_id 时使用；不填时取插件默认配置。
    llm_description: Optional default group id for this batch. Falls back to provider default when not set.
    form: llm

  - name: embedding_model
    type: model-selector
    scope: text-embedding
    required: false
    label:
      en_US: Embedding Model
      zh_Hans: 向量模型
    human_description:
      en_US: Optional text-embedding model. When set, generates embeddings for all saved nodes.
      zh_Hans: 可选的向量模型，设置后为所有保存的节点生成向量。
    llm_description: Optional text-embedding model. Generates node embeddings when provided.
    form: form

output_schema:
  type: object
  properties:
    nodes_count:
      type: integer
      description: Number of nodes merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_nodes_batch.py
