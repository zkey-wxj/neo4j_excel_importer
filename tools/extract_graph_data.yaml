identity:
  name: extract_graph_data
  author: wxj
  label:
    en_US: Extract Graph Data
    zh_Hans: 提取图谱数据

description:
  human:
    en_US: Parse Markdown tables into structured node and relation data without writing to Neo4j.
    zh_Hans: 将 Markdown 表格解析为结构化的节点和关系数据，不写入 Neo4j。
  llm: |
    Parse Markdown table text into nodes and relations. Returns structured JSON.
    Node table header: | uid | name | labels | description |
    Relation table header: | source_uid | rel_type | target_uid |
    Additional columns are collected into properties.
    Title-only rows become section title nodes.

parameters:
  - name: text
    type: string
    required: true
    label:
      en_US: Markdown Text
      zh_Hans: Markdown 文本
    human_description:
      en_US: Markdown table text containing node and relation data.
      zh_Hans: 包含节点和关系数据的 Markdown 表格文本。
    llm_description: |
      Markdown table content with node and relation data.
      The tool auto-detects node tables and relation tables by header row.
      Node table header example: | uid | name | labels | description |
      Relation table header example: | source_uid | rel_type | target_uid |
      Tables can have additional columns beyond the standard fields; they will be stored into corresponding fields according to the mapping.
      A title-only row (other columns empty) is treated as a section title node.
    form: llm

  - name: export_format
    type: select
    required: false
    default: "不导出"
    options:
      - value: "不导出"
        label:
          en_US: "No Export"
          zh_Hans: "不导出"
      - value: "excel"
        label:
          en_US: "Excel"
          zh_Hans: "Excel"
      - value: "json"
        label:
          en_US: "JSON"
          zh_Hans: "JSON"
    label:
      en_US: Export Format
      zh_Hans: 导出格式
    human_description:
      en_US: "Export format for the extracted data. Options: No Export, Excel, JSON."
      zh_Hans: "提取数据的导出格式。可选：不导出、Excel、JSON。"
    llm_description: >
      Export format for the extracted data. "不导出" means only return JSON in the tool output
      without generating a file. "excel" generates an .xlsx file with Nodes and Relations sheets.
      "json" generates a .json file. Default is "不导出".
    form: form

  - name: mapping
    type: string
    required: false
    label:
      en_US: Field Mapping
      zh_Hans: 字段映射
    human_description:
      en_US: Optional JSON string overriding the default node/relation field mapping.
      zh_Hans: 可选的 JSON 字符串，覆盖默认的节点/关系字段映射。
    llm_description: |
      Optional JSON string to customize field mapping. Default mapping:
      {"node":{"uid":"uid","name":"name","labels":["labels"],"description":["description"],"properties":["grade_range","*"]},"relation":{"source_uid":"source_uid","rel_type":"rel_type","target_uid":"target_uid","description":["description"],"properties":["*"]}}
      In properties, "*" means collect all remaining columns not already mapped to standard fields.
    form: llm

output_schema:
  type: object
  properties:
    nodes_count:
      type: integer
      description: Number of extracted nodes.
    relations_count:
      type: integer
      description: Number of extracted relations.
    skipped_rels:
      type: integer
      description: Number of relations skipped due to missing nodes.
    node_type_stats:
      type: object
      description: Node label distribution.
    rel_type_stats:
      type: object
      description: Relation type distribution.
    nodes:
      type: array
      description: Extracted node objects.
    relations:
      type: array
      description: Extracted relation objects.
    summary:
      type: string
      description: Human-readable extraction summary.

extra:
  python:
    source: tools/extract_graph_data.py
