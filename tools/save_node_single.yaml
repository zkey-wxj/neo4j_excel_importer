identity:
  name: save_node_single
  author: wxj
  label:
    en_US: Save Single Node
    zh_Hans: 保存单跳节点数据

description:
  human:
    en_US: Save one node object to Neo4j.
    zh_Hans: 保存单个节点对象到 Neo4j。
  llm: Save one node. JSON must use nodeId/name/labels/description/groupId/properties.

parameters:
  - name: node_json
    type: object
    required: true
    label:
      en_US: Node JSON
      zh_Hans: 节点 JSON
    human_description:
      en_US: JSON object with node fields matching import_graph write format.
      zh_Hans: 节点 JSON 对象，字段与 import_graph 写库格式一致。
    llm_description: Object with nodeId, name, labels, description, groupId, properties.
    schema:
      type: object
      properties:
        nodeId:
          type: string
        name:
          type: string
        labels:
          type: array
          items:
            type: string
        description:
          type: string
        groupId:
          type: string
        properties:
          type: object
      required:
        - nodeId
    form: llm

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this write. Used when node_json has no groupId/group_id.
      zh_Hans: 本次写入的可选默认分组 ID；当 node_json 未提供 groupId/group_id 时使用。
    llm_description: Optional default group id for this write operation.
    form: llm

output_schema:
  type: object
  properties:
    nodes_count:
      type: integer
      description: Number of nodes merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_node_single.py
