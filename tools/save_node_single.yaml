identity:
  name: save_node_single
  author: wxj
  label:
    en_US: Save Single Node
    zh_Hans: 保存单跳节点数据

description:
  human:
    en_US: Save one node object to Neo4j.
    zh_Hans: 保存单个节点对象到 Neo4j。
  llm: Save one node. JSON uses uid/name/labels/description/group_id/properties/meta.

parameters:
  - name: node_json
    type: object
    required: true
    label:
      en_US: Node JSON
      zh_Hans: 节点 JSON
    human_description:
      en_US: JSON object with node fields matching import_graph write format.
      zh_Hans: 节点 JSON 对象，字段与 import_graph 写库格式一致。
    llm_description: Object with uid, name, labels, description, group_id, properties, meta.
    schema:
      type: object
      properties:
        uid:
          type: string
        name:
          type: string
        labels:
          type: array
          items:
            type: string
        description:
          type: string
        group_id:
          type: string
        properties:
          type: object
        meta:
          type: object
          properties:
            created_at:
              type: string
            updated_at:
              type: string
            source:
              type: string
            version:
              type: integer
      required:
        - uid
    form: llm

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this write. Used when node_json has no group_id.
      zh_Hans: 本次写入的可选默认分组 ID；当 node_json 未提供 group_id 时使用。
    llm_description: Optional default group id for this write operation.
    form: llm

  - name: embedding_model
    type: model-selector
    scope: text-embedding
    required: false
    label:
      en_US: Embedding Model
      zh_Hans: 向量模型
    human_description:
      en_US: Optional Dify text-embedding model for generating node embedding.
      zh_Hans: 可选 Dify text-embedding 模型，用于生成节点向量。
    llm_description: Optional text-embedding model selector.
    form: form

output_schema:
  type: object
  properties:
    nodes_count:
      type: integer
      description: Number of nodes merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_node_single.py
