identity:
  name: save_node_single
  author: wxj
  label:
    en_US: Save Single Node
    zh_Hans: 保存单跳节点数据

description:
  human:
    en_US: Save one node object to Neo4j.
    zh_Hans: 保存单个节点对象到 Neo4j。
  llm: Save one node. JSON must use nodeId/name/labels/description/groupId/properties.

parameters:
  - name: node_json
    type: object
    required: true
    label:
      en_US: Node JSON
      zh_Hans: 节点 JSON
    human_description:
      en_US: JSON object with node fields matching import_graph write format.
      zh_Hans: 节点 JSON 对象，字段与 import_graph 写库格式一致。
    llm_description: Object with nodeId, name, labels, description, groupId, properties.
    form: llm

output_schema:
  type: object
  properties:
    nodes_count:
      type: integer
      description: Number of nodes merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_node_single.py
