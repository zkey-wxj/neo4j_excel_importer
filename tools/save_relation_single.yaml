identity:
  name: save_relation_single
  author: wxj
  label:
    en_US: Save Single Relation
    zh_Hans: 保存单条关系数据

description:
  human:
    en_US: Save one relation object to Neo4j.
    zh_Hans: 保存单条关系对象到 Neo4j。
  llm: Save one relation. JSON uses source_nid/target_nid/rel_type/direction/description/group_id/properties/meta.

parameters:
  - name: relation_json
    type: object
    required: true
    label:
      en_US: Relation JSON
      zh_Hans: 关系 JSON
    human_description:
      en_US: >
        Relation object. Required fields: source_nid, target_nid, rel_type.
        Optional fields: direction, description, group_id, properties, meta.
      zh_Hans: >
        关系对象。必填字段：source_nid、target_nid、rel_type。
        可选字段：direction、description、group_id、properties、meta。
    llm_description: >
      Object fields:
      source_nid(string, required), target_nid(string, required), rel_type(string, required),
      direction(forward|bidirectional, optional), description(string, optional),
      group_id(string, optional), properties(object, optional), meta(object, optional).
    schema:
      type: object
      properties:
        source_nid:
          type: string
        target_nid:
          type: string
        rel_type:
          type: string
        direction:
          type: string
          enum: [forward, bidirectional]
        description:
          type: string
        group_id:
          type: string
        properties:
          type: object
        meta:
          type: object
          properties:
            created_at:
              type: string
            updated_at:
              type: string
            source:
              type: string
            version:
              type: integer
      required:
        - source_nid
        - target_nid
        - rel_type
    form: llm

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this write. Used when relation_json has no group_id.
      zh_Hans: 本次写入的可选默认分组 ID；当 relation_json 未提供 group_id 时使用。
    llm_description: Optional default group id for this write operation.
    form: llm

output_schema:
  type: object
  properties:
    rels_count:
      type: integer
      description: Number of relationships merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_relation_single.py
