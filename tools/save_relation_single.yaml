identity:
  name: save_relation_single
  author: wxj
  label:
    en_US: Save Single Relation
    zh_Hans: 保存单条关系数据

description:
  human:
    en_US: Save one relation object to Neo4j.
    zh_Hans: 保存单条关系对象到 Neo4j。
  llm: Save one relation. JSON must use src/tgt/relType/description/groupId/properties.

parameters:
  - name: relation_json
    type: object
    required: true
    label:
      en_US: Relation JSON
      zh_Hans: 关系 JSON
    human_description:
      en_US: >
        Relation object. Required fields: src, tgt, relType.
        Optional fields: description, groupId, properties.
      zh_Hans: >
        关系对象。必填字段：src、tgt、relType。
        可选字段：description、groupId、properties。
    llm_description: >
      Object fields:
      src(string, required), tgt(string, required), relType(string, required),
      description(string, optional), groupId(string, optional), properties(object, optional).
    schema:
      type: object
      properties:
        src:
          type: string
        tgt:
          type: string
        relType:
          type: string
        description:
          type: string
        groupId:
          type: string
        properties:
          type: object
      required:
        - src
        - tgt
        - relType
    form: llm

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this write. Used when relation_json has no groupId/group_id.
      zh_Hans: 本次写入的可选默认分组 ID；当 relation_json 未提供 groupId/group_id 时使用。
    llm_description: Optional default group id for this write operation.
    form: llm

output_schema:
  type: object
  properties:
    rels_count:
      type: integer
      description: Number of relationships merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_relation_single.py
