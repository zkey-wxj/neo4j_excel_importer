identity:
  name: save_relations_batch
  author: wxj
  label:
    en_US: Save Relations Batch
    zh_Hans: 批量保存关系

description:
  human:
    en_US: Save relation data to Neo4j in batch with JSON rows.
    zh_Hans: 使用 JSON 数组批量保存关系数据到 Neo4j。
  llm: Save relations in batch. JSON items must use src/tgt/relType/description/groupId/properties.

parameters:
  - name: relations_json
    type: array
    required: true
    label:
      en_US: Relations JSON
      zh_Hans: 关系 JSON
    human_description:
      en_US: >
        Array of relation objects.
        Each item required: src, tgt, relType.
        Optional: description, groupId, properties.
      zh_Hans: >
        关系对象数组。
        每项必填：src、tgt、relType。
        可选：description、groupId、properties。
    llm_description: >
      Array item fields:
      src(string, required), tgt(string, required), relType(string, required),
      description(string, optional), groupId(string, optional), properties(object, optional).
    schema:
      type: array
      items:
        type: object
        properties:
          src:
            type: string
          tgt:
            type: string
          relType:
            type: string
          description:
            type: string
          groupId:
            type: string
          properties:
            type: object
        required:
          - src
          - tgt
          - relType
    form: llm

  - name: batch_size
    type: number
    required: false
    default: 500
    label:
      en_US: Batch Size
      zh_Hans: 批次大小
    human_description:
      en_US: Number of rows per Neo4j transaction.
      zh_Hans: 每次 Neo4j 事务写入的行数。
    llm_description: Batch size for relation writes.
    form: form

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this batch. Used when an item has no groupId/group_id.
      zh_Hans: 本批次写入的可选默认分组 ID；当某条关系未提供 groupId/group_id 时使用。
    llm_description: Optional default group id for this batch write operation.
    form: llm

output_schema:
  type: object
  properties:
    rels_count:
      type: integer
      description: Number of relationships merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_relations_batch.py
