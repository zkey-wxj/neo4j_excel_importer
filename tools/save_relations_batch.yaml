identity:
  name: save_relations_batch
  author: wxj
  label:
    en_US: Save Relations Batch
    zh_Hans: 批量保存关系

description:
  human:
    en_US: Save relation data to Neo4j in batch with JSON rows.
    zh_Hans: 使用 JSON 数组批量保存关系数据到 Neo4j。
  llm: Save relations in batch. JSON items use source_nid/target_nid/rel_type/direction/description/group_id/properties/meta.

parameters:
  - name: relations_json
    type: array
    required: true
    label:
      en_US: Relations JSON
      zh_Hans: 关系 JSON
    human_description:
      en_US: >
        Array of relation objects.
        Each item required: source_nid, target_nid, rel_type.
        Optional: direction, description, group_id, properties, meta.
      zh_Hans: >
        关系对象数组。
        每项必填：source_nid、target_nid、rel_type。
        可选：direction、description、group_id、properties、meta。
    llm_description: >
      Array item fields:
      source_nid(string, required), target_nid(string, required), rel_type(string, required),
      direction(forward|bidirectional, optional), description(string, optional),
      group_id(string, optional), properties(object, optional), meta(object, optional).
    schema:
      type: array
      items:
        type: object
        properties:
          source_nid:
            type: string
          target_nid:
            type: string
          rel_type:
            type: string
          direction:
            type: string
            enum: [forward, bidirectional]
          description:
            type: string
          group_id:
            type: string
          properties:
            type: object
          meta:
            type: object
            properties:
              created_at:
                type: string
              updated_at:
                type: string
              source:
                type: string
              version:
                type: integer
        required:
          - source_nid
          - target_nid
          - rel_type
    form: llm

  - name: batch_size
    type: number
    required: false
    default: 500
    label:
      en_US: Batch Size
      zh_Hans: 批次大小
    human_description:
      en_US: Number of rows per Neo4j transaction.
      zh_Hans: 每次 Neo4j 事务写入的行数。
    llm_description: Batch size for relation writes.
    form: form

  - name: group_id
    type: string
    required: false
    label:
      en_US: Group ID
      zh_Hans: 分组 ID
    human_description:
      en_US: Optional default group id for this batch. Used when an item has no group_id. If omitted, uses the default from provider config.
      zh_Hans: 本批次写入的可选默认分组 ID；当某条关系未提供 group_id 时使用；不填时取插件默认配置。
    llm_description: Optional default group id for this batch. Falls back to provider default when not set.
    form: llm

output_schema:
  type: object
  properties:
    rels_count:
      type: integer
      description: Number of relationships merged into Neo4j.
    summary:
      type: string
      description: Human-readable save summary.

extra:
  python:
    source: tools/save_relations_batch.py
