<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Neo4j-style graph background -->
  <rect width="64" height="64" rx="12" fill="#1A1A2E"/>
  <!-- Nodes -->
  <circle cx="32" cy="14" r="7" fill="#00C4A7"/>
  <circle cx="14" cy="46" r="7" fill="#4D9DE0"/>
  <circle cx="50" cy="46" r="7" fill="#E84393"/>
  <!-- Edges -->
  <line x1="32" y1="21" x2="14" y2="39" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="32" y1="21" x2="50" y2="39" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
  <line x1="21"  y1="46" x2="43" y2="46" stroke="#ffffff" stroke-width="2" stroke-opacity="0.6"/>
  <!-- Excel arrow hint -->
  <rect x="26" y="8" width="12" height="2" rx="1" fill="#FFD700" opacity="0.7"/>
</svg>
